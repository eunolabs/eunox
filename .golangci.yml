version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - gocritic
    - revive
    - gosec
    - misspell
    - unconvert
    - unparam
    - noctx

linters-settings:
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
  revive:
    rules:
      - name: exported
        arguments:
          - "checkPrivateReceivers"
  gosec:
    excludes:
      - G404 # Allow math/rand for non-crypto uses (test helpers)

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - unparam
        - noctx
    - path: kms_stub\.go
      linters:
        - unparam
        - noctx
