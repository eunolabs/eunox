version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - gocritic
    - revive
    - gosec
    - misspell
    - unconvert
    - unparam
    - noctx
    - contextcheck

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
    revive:
      rules:
        - name: exported
          arguments:
            - "checkPrivateReceivers"
    gosec:
      excludes:
        - G404 # Allow math/rand for non-crypto uses (test helpers)

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - unparam
          - noctx
          - contextcheck
      - path: kms_stub\.go
        linters:
          - unparam
          - noctx
      # Pre-existing contextcheck suppressions for background/lifecycle patterns
      # where context is intentionally created from lifecycle ctx rather than passed.
      - path: pkg/audit/transport\.go
        linters:
          - contextcheck
      - path: pkg/killswitch/redis\.go
        text: "handlePubSubMessage"
        linters:
          - contextcheck
      - path: pkg/lifecycle/lifecycle\.go
        linters:
          - contextcheck
      # async_pipeline.go deliberately falls back to context.Background() when the
      # parent context is already cancelled, so the inner pipeline write still completes.
      - path: pkg/audit/async_pipeline\.go
        linters:
          - contextcheck
      # tracingTransport.RoundTrip must use req.Context() – the request carries its own
      # context per the http.RoundTripper contract; not a "non-inherited" context.
      - path: internal/gateway/jwks_verifier\.go
        text: "Non-inherited new context"
        linters:
          - contextcheck
      # slog.Handler interface requires slog.Record by value; cannot change the signature.
      - path: pkg/audit/async_pipeline_test\.go
        text: "hugeParam"
        linters:
          - gocritic
