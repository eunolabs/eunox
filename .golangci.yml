version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - gocritic
    - revive
    - gosec
    - misspell
    - unconvert
    - unparam
    - noctx
    - contextcheck

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
    revive:
      rules:
        - name: exported
          arguments:
            - "checkPrivateReceivers"
    gosec:
      excludes:
        - G404 # Allow math/rand for non-crypto uses (test helpers)

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - unparam
          - noctx
          - contextcheck
      - path: kms_stub\.go
        linters:
          - unparam
          - noctx
      # Pre-existing contextcheck suppressions for background/lifecycle patterns
      # where context is intentionally created from lifecycle ctx rather than passed.
      - path: pkg/audit/transport\.go
        linters:
          - contextcheck
      - path: pkg/killswitch/redis\.go
        text: "handlePubSubMessage"
        linters:
          - contextcheck
      - path: pkg/lifecycle/lifecycle\.go
        linters:
          - contextcheck
