# Capability Issuer — minimal Deployment (LEGACY / reference only).
#
# ⚠  USE capability-issuer-deployment.yaml INSTEAD.
#
# This file is the original simple manifest and lacks Sprint 3 sandbox
# hardening (AppArmor, SELinux, seccomp, resource limits, secret scrubbing,
# read-only root filesystem).  It is retained as a reference baseline.
#
# Both this file and capability-issuer-deployment.yaml define the same
# Deployment and Service names.  If you apply this file after
# capability-issuer-deployment.yaml, kubectl apply will update the same
# objects in-place, silently removing all Sprint 3 security hardening.
# Always apply exactly one of the two.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: capability-issuer
  namespace: euno-system
  labels:
    app: capability-issuer
    component: control-plane
spec:
  replicas: 2
  selector:
    matchLabels:
      app: capability-issuer
  template:
    metadata:
      labels:
        app: capability-issuer
        component: control-plane
    spec:
      serviceAccountName: capability-issuer
      containers:
      - name: capability-issuer
        image: eunoacr.azurecr.io/capability-issuer:v1.0.0
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 3001
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3001"
        # Declare the deployment availability tier so the issuer's
        # config schema enforces the matching infrastructure (REDIS_URL
        # is required for multi-replica). Switch to
        # "multi-region-active-active" and set ISSUER_REGION when adding
        # a second region — see docs/MULTI_REGION_ISSUER.md.
        - name: EUNO_DEPLOYMENT_TIER
          value: "multi-replica"
        - name: AZURE_KEYVAULT_URL
          valueFrom:
            configMapKeyRef:
              name: euno-config
              key: keyvault-url
        - name: AZURE_KEYVAULT_KEY_NAME
          value: "capability-signing-key"
        - name: AZURE_AD_TENANT_ID
          valueFrom:
            configMapKeyRef:
              name: euno-config
              key: azure-tenant-id
        - name: AZURE_AD_CLIENT_ID
          valueFrom:
            configMapKeyRef:
              name: euno-config
              key: azure-client-id
        - name: ISSUER_DID
          valueFrom:
            configMapKeyRef:
              name: euno-config
              key: issuer-did
        - name: DEFAULT_TOKEN_TTL
          value: "900"
        # Distributed coordination — REQUIRED for the multi-replica issuer
        # so the per-subject issuance rate limiter (F-1) shares state
        # across pods (otherwise the effective budget is multiplied by
        # the replica count).
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: euno-config
              key: redis-url
        - name: ISSUANCE_RATE_LIMIT_ENABLED
          value: "true"
        - name: ISSUANCE_RATE_LIMIT_FAIL_CLOSED
          value: "true"
        - name: AZURE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: issuer-secrets
              key: azure-client-secret
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 10
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: capability-issuer
  namespace: euno-system
  labels:
    app: capability-issuer
spec:
  type: ClusterIP
  ports:
  - port: 3001
    targetPort: 3001
    protocol: TCP
    name: http
  selector:
    app: capability-issuer
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: capability-issuer
  namespace: euno-system
  annotations:
    azure.workload.identity/client-id: "<AZURE_CLIENT_ID>"
