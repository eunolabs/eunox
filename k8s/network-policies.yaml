# Sprint 1: Network Policy for Agent Sandbox
# Implements the core security principle: "the model is not your boundary"
#
# Exit Criteria from execution-plan.md:
# - Agent container can call test endpoint through Gateway
# - Agent fails to reach disallowed endpoints
# - Running `curl` to unauthorized URL from within container should be blocked
#
# Sprint 2: Ensures ALL external communications funnel through Gateway
# Sprint 3: Extends policies to issuer and gateway services
#
# ── Egress hardening (Task 5) ──────────────────────────────────────────────────
#
# This file is the PRODUCTION BASE manifest.  It does NOT contain any
# 0.0.0.0/0 or ::/0 egress rules.
#
# Broad "allow-all-internet" rules that are sometimes needed during initial
# bring-up are kept in a SEPARATE overlay file:
#
#   k8s/network-policies-dev-overlay.yaml
#
# Apply that overlay in dev/staging clusters ONLY.  Never apply it in
# production.
#
# ── How to configure external endpoints ────────────────────────────────────────
#
# 1. Managed Redis (Azure Cache, ElastiCache, Memorystore):
#    Add an ipBlock rule scoped to your managed Redis private endpoint CIDR
#    under the gateway and issuer egress sections below.  Example:
#
#      - to:
#        - ipBlock:
#            cidr: 10.20.30.0/28   # replace with actual private endpoint CIDR
#        ports:
#        - protocol: TCP
#          port: 6380               # Azure Cache TLS port
#
# 2. External backend services (gateway proxy targets):
#    Choose one of:
#    Option A — add explicit ipBlock rules for each backend CIDR.
#    Option B — remove the ipBlock rules and route via an egress gateway
#               (Istio, Cilium Egress Gateway, or equivalent).
#    Option C — if every backend is in-cluster, the `podSelector: {}`
#               rule under gateway egress already covers them.
#
# 3. KMS / identity providers (issuer):
#    Add explicit ipBlock rules for your cloud provider's service CIDRs
#    (Azure Key Vault, AWS KMS, GCP Cloud KMS) or use private endpoints /
#    VPC service controls so no public internet egress is required.

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-network-policy
  namespace: euno-system
spec:
  # Apply to all pods with role=agent label
  podSelector:
    matchLabels:
      role: agent
  policyTypes:
  - Egress
  egress:
  # Allow DNS resolution (required for service discovery)
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53

  # Allow traffic to Envoy Shard Router (H-1 gateway front-door).
  # Agents send all tool calls to envoy-shard-router:3002 which then
  # forwards them to the correct gateway shard pod.
  - to:
    - podSelector:
        matchLabels:
          app: envoy-shard-router
    ports:
    - protocol: TCP
      port: 3002
    # ── Gap 6 / P2 — TLS listener port ──────────────────────────────────────
    # Uncomment when Envoy is configured with a TLS listener (cert-manager or
    # service mesh) and GATEWAY_URL is changed to https://envoy-shard-router:8443.
    # - protocol: TCP
    #   port: 8443

  # Allow traffic to Tool Gateway directly.
  # This permits direct-to-gateway calls (e.g. if GATEWAY_URL is changed to
  # gateway:3002 to bypass the Envoy router) and health-check traffic.
  # It does not provide automatic failover — the application must be
  # reconfigured to use this path.
  - to:
    - podSelector:
        matchLabels:
          app: gateway
    ports:
    - protocol: TCP
      port: 3002

  # Allow traffic to Capability Issuer (for token acquisition)
  - to:
    - podSelector:
        matchLabels:
          app: issuer
    ports:
    - protocol: TCP
      port: 3001

  # Sprint 1: All other egress traffic is BLOCKED by default
  # This implements the requirement: "Running curl to an unauthorized URL
  # from within the container should be blocked"
  #
  # Ingress: default-deny - agents do not need inbound traffic from other pods.
  # Kubernetes kubelet health probes bypass NetworkPolicy (node-level traffic),
  # so removing pod ingress rules reduces lateral-movement risk.
---
# Network Policy for Tool Gateway
# Allows gateway to communicate with backend services and agents
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gateway-network-policy
  namespace: euno-system
spec:
  podSelector:
    matchLabels:
      app: gateway
  policyTypes:
  - Egress
  - Ingress

  egress:
  # Allow DNS
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53

  # Allow to Capability Issuer (for public key retrieval)
  - to:
    - podSelector:
        matchLabels:
          app: issuer
    ports:
    - protocol: TCP
      port: 3001

  # Allow to in-cluster Redis (distributed revocation, kill-switch,
  # maxCalls, DPoP replay store).  Required for HA correctness across
  # replicas.
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379

  # Managed Redis (Azure Cache for Redis, AWS ElastiCache, GCP Memorystore):
  # Add an ipBlock rule here scoped to the private endpoint CIDR of your
  # managed Redis instance.  Example (replace CIDR and port with actual values):
  #
  # - to:
  #   - ipBlock:
  #       cidr: 10.0.0.0/28    # replace with managed Redis private endpoint CIDR
  #   ports:
  #   - protocol: TCP
  #     port: 6380              # Azure Cache TLS; use 6379 for non-TLS
  #
  # See k8s/network-policies-dev-overlay.yaml for the broad fallback used in
  # dev/staging clusters where the managed Redis CIDR is not yet known.

  # Allow to in-cluster backend services on HTTP/HTTPS.
  # If every backend the gateway proxies lives in-cluster, this rule covers
  # all proxy targets without requiring any ipBlock rules.
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80

  # External backend services (gateway proxy targets):
  # Add explicit ipBlock rules here for each external backend CIDR, or
  # route outbound traffic through an egress gateway instead.  Example:
  #
  # - to:
  #   - ipBlock:
  #       cidr: 203.0.113.0/24   # replace with actual backend CIDR
  #   ports:
  #   - protocol: TCP
  #     port: 443
  #
  # See k8s/network-policies-dev-overlay.yaml for the broad fallback used in
  # dev/staging clusters where backend CIDRs are not yet known.

  ingress:
  # Allow from agents (tool calls on the public port)
  - from:
    - podSelector:
        matchLabels:
          role: agent
    ports:
    - protocol: TCP
      port: 3002

  # Allow from within namespace (other services, health-check scrapers)
  - from:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 3002

  # Allow admin API traffic on port 3003 from pods labelled role=ops.
  # The admin Service (gateway-admin) is ClusterIP-only and requires
  # ADMIN_API_KEY, so this rule is defence-in-depth: it narrows which pods
  # can even attempt a connection.  Label ops pods with role=ops to grant access.
  - from:
    - podSelector:
        matchLabels:
          role: ops
    ports:
    - protocol: TCP
      port: 3003
---
# Network Policy for Capability Issuer
# Allows issuer to communicate with Azure services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: issuer-network-policy
  namespace: euno-system
spec:
  podSelector:
    matchLabels:
      app: issuer
  policyTypes:
  - Egress
  - Ingress

  egress:
  # Allow DNS
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53

  # Cloud identity provider / KMS endpoints (Azure Key Vault, Azure AD,
  # AWS KMS, GCP Cloud KMS, etc.):
  # Add explicit ipBlock rules here scoped to your cloud provider's service
  # CIDRs or private endpoint IPs.  Using private endpoints is strongly
  # preferred because it removes the need for any public internet egress.
  #
  # Example for a private Azure Key Vault endpoint:
  # - to:
  #   - ipBlock:
  #       cidr: 10.1.2.3/32      # replace with private endpoint IP
  #   ports:
  #   - protocol: TCP
  #     port: 443
  #
  # See k8s/network-policies-dev-overlay.yaml for the broad fallback used in
  # dev/staging clusters where endpoint CIDRs are not yet known.

  # Allow to in-cluster Redis (distributed per-subject issuance rate
  # limiter).  Required so multi-replica issuers share rate-limit state.
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379

  # Managed Redis (Azure Cache, ElastiCache, Memorystore):
  # Add an ipBlock rule here scoped to the private endpoint CIDR.  Example:
  #
  # - to:
  #   - ipBlock:
  #       cidr: 10.0.0.0/28    # replace with managed Redis private endpoint CIDR
  #   ports:
  #   - protocol: TCP
  #     port: 6380              # Azure Cache TLS; use 6379 for non-TLS
  #
  # See k8s/network-policies-dev-overlay.yaml for the broad fallback.

  ingress:
  # Allow from agents (for token requests)
  - from:
    - podSelector:
        matchLabels:
          role: agent
    ports:
    - protocol: TCP
      port: 3001

  # Allow from gateway (for public key retrieval)
  - from:
    - podSelector:
        matchLabels:
          app: gateway
    ports:
    - protocol: TCP
      port: 3001

  # Allow from within namespace
  - from:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 3001
---
# Network Policy for Envoy Shard Router (H-1).
# The router is the primary ingress point for agent traffic; it must be able
# to reach the gateway shard pods and may only be reached from agent pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: envoy-shard-router-network-policy
  namespace: euno-system
spec:
  podSelector:
    matchLabels:
      app: envoy-shard-router
  policyTypes:
  - Ingress
  - Egress

  ingress:
  # Accept traffic from agent pods on the public listen port (3002 → 8080).
  - from:
    - podSelector:
        matchLabels:
          role: agent
    ports:
    - protocol: TCP
      port: 8080

  egress:
  # Allow DNS resolution.
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53

  # Allow forwarding to gateway shard pods (port 3002).
  - to:
    - podSelector:
        matchLabels:
          app: gateway
    ports:
    - protocol: TCP
      port: 3002
---
# Network Policy for Redis (distributed coordination backend).
# Only the gateway and issuer pods may connect; no other pod (and in
# particular not agent pods) may reach Redis.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-network-policy
  namespace: euno-system
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
  - Ingress
  - Egress

  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: gateway
    - podSelector:
        matchLabels:
          app: issuer
    ports:
    - protocol: TCP
      port: 6379

  egress:
  # Allow DNS only; Redis itself does not need outbound traffic.
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
