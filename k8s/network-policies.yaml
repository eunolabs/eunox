# Sprint 1: Network Policy for Agent Sandbox
# Implements the core security principle: "the model is not your boundary"
#
# Exit Criteria from execution-plan.md:
# - Agent container can call test endpoint through Gateway
# - Agent fails to reach disallowed endpoints
# - Running `curl` to unauthorized URL from within container should be blocked
#
# Sprint 2: Ensures ALL external communications funnel through Gateway
# Sprint 3: Extends policies to issuer and gateway services

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-network-policy
  namespace: euno-system
spec:
  # Apply to all pods with role=agent label
  podSelector:
    matchLabels:
      role: agent
  policyTypes:
  - Egress
  egress:
  # Allow DNS resolution (required for service discovery)
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53

  # Allow traffic to Tool Gateway ONLY
  - to:
    - podSelector:
        matchLabels:
          app: tool-gateway
    ports:
    - protocol: TCP
      port: 3002

  # Allow traffic to Capability Issuer (for token acquisition)
  - to:
    - podSelector:
        matchLabels:
          app: capability-issuer
    ports:
    - protocol: TCP
      port: 3001

  # Sprint 1: All other egress traffic is BLOCKED by default
  # This implements the requirement: "Running curl to an unauthorized URL
  # from within the container should be blocked"
  #
  # Ingress: default-deny - agents do not need inbound traffic from other pods.
  # Kubernetes kubelet health probes bypass NetworkPolicy (node-level traffic),
  # so removing pod ingress rules reduces lateral-movement risk.
---
# Network Policy for Tool Gateway
# Allows gateway to communicate with backend services and agents
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gateway-network-policy
  namespace: euno-system
spec:
  podSelector:
    matchLabels:
      app: tool-gateway
  policyTypes:
  - Egress
  - Ingress

  egress:
  # Allow DNS
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53

  # Allow to Capability Issuer (for public key retrieval)
  - to:
    - podSelector:
        matchLabels:
          app: capability-issuer
    ports:
    - protocol: TCP
      port: 3001

  # Allow to in-cluster Redis (distributed revocation, kill-switch,
  # maxCalls, DPoP replay store).  Required for HA correctness across
  # replicas.
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379

  # Allow to managed Redis endpoints (Azure Cache for Redis, AWS
  # ElastiCache, GCP Memorystore) when operators override `redis-url` in
  # the `gateway-config` ConfigMap to point at an external service.
  # Standard Redis: 6379, TLS (e.g. Azure Cache): 6380.
  #
  # PRODUCTION HARDENING: replace 0.0.0.0/0 with the specific CIDR of
  # your managed Redis endpoint or private endpoint IP range.  The
  # broad allow is acceptable only during initial deployment; narrow
  # it once the managed Redis CIDR is known.
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        # replace with managed Redis private endpoint CIDR in production
        # Exclude in-cluster pod / service CIDRs is recommended in
        # production; left unset here because cluster CIDRs vary.
    - ipBlock:
        cidr: ::/0
    ports:
    - protocol: TCP
      port: 6379
    - protocol: TCP
      port: 6380

  # Allow to in-cluster backend services on HTTP/HTTPS
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80

  # Allow egress to external backend services for authorized proxy requests.
  #
  # PRODUCTION HARDENING — choose ONE of these options:
  #
  # Option A (recommended): restrict to explicit backend CIDRs.
  # Replace the broad 0.0.0.0/0 rules below with the specific CIDR block(s)
  # of your backend services:
  #
  #   - to:
  #     - ipBlock:
  #         cidr: 10.20.30.0/24      # replace with actual backend CIDR
  #     ports:
  #     - protocol: TCP
  #       port: 443
  #
  # Option B: use an egress gateway / service mesh.
  # Remove these rules entirely and route all outbound traffic through
  # an Istio egress gateway or equivalent so external destinations are
  # allow-listed in mesh policy rather than in NetworkPolicy.
  #
  # Option C: service-selector-only (in-cluster backends only).
  # If every backend the gateway proxies lives in the same namespace,
  # the `podSelector: {}` rule above already covers them — remove
  # these ipBlock rules.
  #
  # DEVELOPMENT / STAGING FALLBACK (not recommended for production):
  # The broad rules below allow any internet destination on 80/443.
  # Restrict these per environment using one of the options above
  # (e.g. via Kustomize patches or Helm values that override this file
  # per environment) rather than editing this shared base directly.
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        # exclude: []  # Add cluster pod/service CIDRs here to prevent
        #               # bypassing internal policies via this rule.
    - ipBlock:
        cidr: ::/0
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80

  ingress:
  # Allow from agents
  - from:
    - podSelector:
        matchLabels:
          role: agent
    ports:
    - protocol: TCP
      port: 3002

  # Allow from within namespace
  - from:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 3002
---
# Network Policy for Capability Issuer
# Allows issuer to communicate with Azure services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: issuer-network-policy
  namespace: euno-system
spec:
  podSelector:
    matchLabels:
      app: capability-issuer
  policyTypes:
  - Egress
  - Ingress

  egress:
  # Allow DNS
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53

  # Allow to Azure services (Key Vault, Azure AD) over internet TCP/443
  # In production, restrict to specific Azure service CIDRs or use private endpoints
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
    ports:
    - protocol: TCP
      port: 443

  # Allow to in-cluster Redis (distributed per-subject issuance rate
  # limiter).  Required so multi-replica issuers share rate-limit state.
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379

  # Allow to managed Redis endpoints (Azure Cache for Redis, AWS
  # ElastiCache, GCP Memorystore) when operators override `redis-url`
  # in the `issuer-config` ConfigMap to point at an external service.
  # Standard Redis: 6379, TLS (e.g. Azure Cache): 6380.
  #
  # PRODUCTION HARDENING: replace 0.0.0.0/0 with the specific CIDR of
  # your managed Redis endpoint or private endpoint IP range.  The
  # broad allow is acceptable only during initial deployment; narrow
  # it once the managed Redis CIDR is known.
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        # replace with managed Redis private endpoint CIDR in production
    - ipBlock:
        cidr: ::/0
    ports:
    - protocol: TCP
      port: 6379
    - protocol: TCP
      port: 6380

  ingress:
  # Allow from agents (for token requests)
  - from:
    - podSelector:
        matchLabels:
          role: agent
    ports:
    - protocol: TCP
      port: 3001

  # Allow from gateway (for public key retrieval)
  - from:
    - podSelector:
        matchLabels:
          app: tool-gateway
    ports:
    - protocol: TCP
      port: 3001

  # Allow from within namespace
  - from:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 3001
---
# Network Policy for Redis (distributed coordination backend).
# Only the gateway and issuer pods may connect; no other pod (and in
# particular not agent pods) may reach Redis.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-network-policy
  namespace: euno-system
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
  - Ingress
  - Egress

  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: tool-gateway
    - podSelector:
        matchLabels:
          app: capability-issuer
    ports:
    - protocol: TCP
      port: 6379

  egress:
  # Allow DNS only; Redis itself does not need outbound traffic.
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
