# Redis for distributed coordination across multi-replica gateway and issuer
# pods.  Without a shared Redis the per-replica in-memory fallbacks split
# brain on:
#   - token revocation              (RedisRevocationStore)
#   - kill-switch propagation       (RedisKillSwitchManager)
#   - per-token maxCalls counters   (RedisCallCounterStore)
#   - DPoP proof replay defense     (RedisDpopReplayStore)
#   - per-subject issuance rate limiting (issuance-rate-limiter)
#
# ⚠️  DEV / PILOT ONLY — NOT SUITABLE FOR PRODUCTION ⚠️
# ────────────────────────────────────────────────────────────────────────────
# This file provisions a SINGLE-NODE, in-memory Redis with NO replication,
# NO persistence, and NO automatic failover.  A pod restart or node eviction
# permanently erases all revocation entries, kill-switch state, call counters,
# and DPoP nonces.
#
# Under the gateway's default fail-closed settings a Redis outage causes
# 100 % of enforcement decisions to be denied until Redis recovers.  Under
# fail-open settings all revocations and call limits are bypassed.
#
# For PRODUCTION deployments you MUST replace this with a high-availability
# managed Redis offering:
#   • Azure Cache for Redis — Standard C1+ tier (primary/replica) or Premium
#     tier (cluster mode) with geo-replication for multi-region deployments.
#   • AWS ElastiCache (Redis OSS) — cluster mode enabled with ≥ 2 shards and
#     Multi-AZ automatic failover.
#   • GCP Memorystore for Redis — Standard tier (read replicas + automatic
#     failover) or Cluster tier for horizontal scale.
#   • Self-managed: Redis Sentinel (≥ 3 sentinels, quorum 2) or Redis Cluster
#     (≥ 6 nodes: 3 primaries + 3 replicas).
#
# Set REDIS_URL in namespace-and-config.yaml (and the per-store overrides
# REVOCATION_REDIS_URL, KILL_SWITCH_REDIS_URL, CALL_COUNTER_REDIS_URL) to
# point at your HA Redis endpoint.  See docs/DEPLOYMENT.md §"Redis HA for
# production" for Sentinel and Cluster URL formats and startup-validation
# behaviour.
#
# Once a managed Redis is wired, delete or ignore the Deployment and Service
# resources below — they are only needed for local / CI / pilot clusters.
#
# References:
#   - docs/DEPLOYMENT.md §"Redis HA for production"
#   - docs/PRODUCTION_DEPLOYMENT_CHECKLIST.md ("Redis instance provisioned")
#   - docs/MULTI_REGION_ISSUER.md             (REDIS_URL per-region)
#   - docs/DISTRIBUTED_REVOCATION.md
#   - docs/DISTRIBUTED_KILL_SWITCH.md
#   - docs/architecture-review-2026-05.md     CR-3
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: redis
  namespace: euno-system
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: euno-system
  labels:
    app: redis
    component: coordination
    # Mark this Deployment as development/pilot only so infrastructure scanners
    # and admission controllers can enforce that production clusters do not run
    # single-node Redis.  See docs/DEPLOYMENT.md §"Redis HA for production".
    euno.dev/dev-only: 'true'
  annotations:
    # This single-node Redis is NOT suitable for production.  Replace with
    # a managed HA offering (Azure Cache for Redis Standard+, AWS ElastiCache
    # cluster mode, GCP Memorystore Standard tier, or Redis Sentinel/Cluster).
    euno.dev/dev-only-reason: >-
      Single-node Redis with no replication or automatic failover.
      A pod restart causes all revocation, kill-switch, call-counter, and DPoP
      state to be lost and blocks enforcement until Redis recovers.
      See docs/DEPLOYMENT.md §"Redis HA for production" for HA alternatives.
spec:
  # Single replica: the in-memory Redis store is not horizontally replicated;
  # for HA Redis use a managed offering (see header comment).
  replicas: 1
  strategy:
    # Avoid two Redis pods racing for the same data during rollouts.
    type: Recreate
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        component: coordination
    spec:
      serviceAccountName: redis
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:7.2-alpine
          imagePullPolicy: IfNotPresent
          args:
            # Disable on-disk persistence: every key Euno writes to Redis is
            # short-lived (revocation TTLs, kill-switch entries, replay
            # nonces, rate-limit windows) and a fresh start is acceptable.
            - "redis-server"
            - "--save"
            - ""
            - "--appendonly"
            - "no"
            - "--maxmemory"
            - "200mb"
            - "--maxmemory-policy"
            - "allkeys-lru"
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            privileged: false
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          emptyDir:
            sizeLimit: 256Mi
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 16Mi
      enableServiceLinks: false
      hostNetwork: false
      hostPID: false
      hostIPC: false
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: euno-system
  labels:
    app: redis
    component: coordination
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
  selector:
    app: redis
