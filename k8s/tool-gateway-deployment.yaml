# Tool Gateway — simple Deployment (NON-SHARDED alternative).
#
# ⚠  CHOOSE ONE gateway manifest, never apply both:
#
#   tool-gateway.yaml             ← StatefulSet with Envoy shard router (H-1).
#                                   Pairs with envoy-shard-router.yaml and the
#                                   StatefulSet-targeted HPA in ha-policies.yaml.
#                                   Use this for production / multi-replica.
#
#   tool-gateway-deployment.yaml  ← This file. Plain Deployment, no sharding.
#                                   Simpler to operate; suitable for
#                                   single-region pilots without shard routing.
#                                   If you use this, change ha-policies.yaml
#                                   scaleTargetRef back to kind: Deployment.
#
# Applying both creates two controllers (StatefulSet + Deployment) fighting
# over the same pod selector and a conflicting Service/tool-gateway definition.
#
# Sprint 3 Sandbox Hardening settings are present in both files.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tool-gateway
  namespace: euno-system
  labels:
    app: tool-gateway
    version: v1.0.0
    component: data-plane
spec:
  replicas: 3
  selector:
    matchLabels:
      app: tool-gateway
  template:
    metadata:
      labels:
        app: tool-gateway
        version: v1.0.0
      annotations:
        # Sprint 3: AppArmor profile annotation
        container.apparmor.security.beta.kubernetes.io/tool-gateway: localhost/euno-restricted
    spec:
      # Sprint 3: Service account with no API token (config injected via env)
      serviceAccountName: tool-gateway-sa
      automountServiceAccountToken: false

      # Task 7: Topology spread + anti-affinity so replica count translates into
      # real failure-domain redundancy.
      #
      # topologySpreadConstraints spread pods across availability zones first,
      # then nodes within a zone.  `DoNotSchedule` on the zone constraint
      # prevents all three replicas landing in one AZ during an AZ restart or
      # initial rollout.
      #
      # The hostname constraint is `ScheduleAnyway` so a small cluster with
      # fewer nodes than replicas (e.g. dev / CI) can still schedule pods.
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: tool-gateway
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: tool-gateway

      affinity:
        podAntiAffinity:
          # Hard: refuse to place two gateway pods on the same node.  The
          # gateway is the data-plane critical path; co-location means a
          # single node failure cuts availability in half.
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: tool-gateway
            topologyKey: kubernetes.io/hostname

      # Sprint 3: Security context at pod level
      securityContext:
        runAsNonRoot: true
        runAsUser: 1002
        runAsGroup: 1002
        fsGroup: 1002
        # SELinux options
        seLinuxOptions:
          level: "s0:c123,c456"
          type: "euno_restricted.process"
        seccompProfile:
          type: RuntimeDefault

      containers:
      - name: tool-gateway
        image: eunoacr.azurecr.io/tool-gateway:v1.0.0
        imagePullPolicy: Always

        ports:
        - name: http
          containerPort: 3002
          protocol: TCP
        - name: admin
          containerPort: 3003
          protocol: TCP

        # Sprint 3: Environment variable scrubbing - no sensitive data
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3002"
        - name: ADMIN_PORT
          value: "3003"
        # Bind the admin server to the pod's IP (downward API) so it is
        # only reachable via the ClusterIP `tool-gateway-admin` Service
        # below, not via the public LoadBalancer. The gateway config
        # schema rejects production rollouts that leave ADMIN_HOST as a
        # wildcard (0.0.0.0 / ::) — defence in depth on top of the
        # ClusterIP-only Service. See docs/PRODUCTION_DEPLOYMENT_CHECKLIST.md
        # § 1.5 "Admin Surface".
        - name: ADMIN_HOST
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        # Declare the deployment availability tier so the gateway's
        # config schema enforces the matching infrastructure (REDIS_URL
        # is required for multi-replica). See
        # docs/PRODUCTION_DEPLOYMENT_CHECKLIST.md § "Redis availability tiers".
        - name: EUNO_DEPLOYMENT_TIER
          value: "multi-replica"
        # R-6: read keys from the issuer JWKS endpoint, not the
        # deprecated single-key endpoint. Schema rejects production
        # rollouts that point at ISSUER_PUBLIC_KEY_URL alone.
        - name: ISSUER_JWKS_URL
          value: "http://capability-issuer:3001/.well-known/jwks.json"
        - name: BACKEND_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: gateway-config
              key: backend-service-url
        - name: POLICY_VERSION
          value: "1.0.0"
        - name: ENABLE_DETAILED_LOGGING
          value: "false"

        # F-2: DPoP / RFC 9449 sender-constrained tokens. After the
        # documented DPoP migration `true` is the production default and
        # the schema rejects production rollouts that disable it.
        - name: DPOP_REQUIRED
          value: "true"

        # Distributed coordination (Redis) — REQUIRED for multi-replica HA.
        # Without REDIS_URL, revocation entries, kill-switch state, maxCalls
        # counters, and DPoP replay nonces fall back to per-pod in-memory
        # stores, so a token revoked / killed on one replica is still
        # accepted by the others (split-brain authorization).  Defaults to
        # the in-cluster Redis shipped in `redis.yaml`; override the
        # `redis-url` ConfigMap key for managed Redis in production.
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: gateway-config
              key: redis-url
        # Fail-closed on Redis unavailability for revocation lookups: a
        # network blip must NOT silently re-enable revoked tokens.  Set to
        # "true" only if availability is more important than revocation
        # freshness in your environment.
        - name: REVOCATION_FAIL_OPEN
          value: "false"

        # Sprint 3: Secrets via Kubernetes secrets, not environment variables
        - name: ADMIN_API_KEY
          valueFrom:
            secretKeyRef:
              name: gateway-secrets
              key: admin-api-key

        # Evidence signing — production must record a tamper-evident
        # trail of authorization refusals. `deny` alone meets the
        # production checklist requirement; switch to "allow,deny" for
        # full coverage. The signing key is mounted from a Kubernetes
        # secret, never baked into the image.
        - name: EVIDENCE_SIGNED_DECISIONS
          value: "deny"
        - name: EVIDENCE_SIGNING_KEY_FILE
          value: "/var/run/secrets/euno/evidence-signing-key.pem"
        - name: EVIDENCE_SIGNING_ALGORITHM
          value: "RS256"

        # Sprint 3: Resource limits (CPU and memory via cgroups)
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 1000m
            memory: 2Gi

        # Sprint 3: Security context at container level
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1002
          runAsGroup: 1002
          privileged: false
          procMount: Default

        # Sprint 3: Volume mounts - only necessary paths
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /app/.npm
        # Evidence-signing private key, mounted read-only from a
        # Kubernetes Secret so it never sits on the image filesystem.
        - name: evidence-signing-key
          mountPath: /var/run/secrets/euno
          readOnly: true

        # Health checks
        livenessProbe:
          httpGet:
            path: /health/live
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3

      # Sprint 3: Volumes - writable tmpfs for temporary files only
      volumes:
      - name: tmp
        emptyDir:
          medium: Memory
          sizeLimit: 100Mi
      - name: cache
        emptyDir:
          medium: Memory
          sizeLimit: 50Mi
      # Evidence-signing key — projected from the gateway-secrets Secret
      # so the file at EVIDENCE_SIGNING_KEY_FILE resolves at boot. The
      # Secret must contain key `evidence-signing-key.pem`.
      - name: evidence-signing-key
        secret:
          secretName: gateway-secrets
          items:
          - key: evidence-signing-key.pem
            path: evidence-signing-key.pem
          defaultMode: 0400

      # Sprint 3: Additional pod-level restrictions
      enableServiceLinks: false
      hostNetwork: false
      hostPID: false
      hostIPC: false

---
# Service Account without Kubernetes API access
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tool-gateway-sa
  namespace: euno-system
automountServiceAccountToken: false

---
# Service for main gateway port
apiVersion: v1
kind: Service
metadata:
  name: tool-gateway
  namespace: euno-system
  labels:
    app: tool-gateway
spec:
  type: LoadBalancer
  ports:
  - port: 3002
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: tool-gateway

---
# Service for admin API (ClusterIP only - internal)
apiVersion: v1
kind: Service
metadata:
  name: tool-gateway-admin
  namespace: euno-system
  labels:
    app: tool-gateway
spec:
  type: ClusterIP
  ports:
  - port: 3003
    targetPort: admin
    protocol: TCP
    name: admin
  selector:
    app: tool-gateway

---
# ConfigMap for non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: euno-system
data:
  backend-service-url: "https://your-backend-service.com"
  # Distributed coordination (Redis) — REQUIRED so revocation, kill-switch,
  # maxCalls counters, and DPoP replay defense propagate across all
  # tool-gateway replicas.  Defaults to the in-cluster Redis from
  # `redis.yaml`; override with a managed Redis URL for production.
  redis-url: "redis://redis.euno-system.svc.cluster.local:6379"
