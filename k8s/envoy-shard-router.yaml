# Envoy Shard Router for Gateway Horizontal Sharding (H-1)
#
# This manifest deploys a 2-replica Envoy proxy in front of the
# gateway StatefulSet.  Its job is to extract the `sub` claim from the
# Bearer JWT in the `Authorization` header, compute the target shard index
# using the same FNV-1a % SHARD_COUNT algorithm as the gateway, and route
# each agent's requests deterministically to the matching StatefulSet pod.
#
# ## Why Envoy, not the Kubernetes Service?
#
# The standard `kube-proxy` ClusterIP load balancer is round-robin with no
# L7 session-affinity based on JWT claims.  We need content-based routing:
#
#   1. The Lua HTTP filter decodes the JWT payload (base64, no signature
#      verification — routing is best-effort, security lives in the gateway).
#   2. It extracts the `sub` claim and computes shard_index = fnv1a32(sub) % N,
#      using exactly the same FNV-1a algorithm as computeAgentShardIndex()
#      in packages/common/src/shard.ts.
#   3. Envoy routes to `tool_gateway_pod_<N>` cluster — one cluster per
#      StatefulSet pod, each with its own stable DNS name.
#
# This guarantees that the shard index Envoy computes matches the shard index
# the gateway computes in ShardLocalCallCounterStore, so every agent's traffic
# reaches the owning pod and is counted locally with zero Redis round-trips.
#
# ## Failure modes
#
# - If the JWT is malformed or missing, the Lua filter sets no shard-index
#   header and the fallback route sends the request to any healthy pod via the
#   headless Service (DNS round-robin).  The gateway falls back to the Redis
#   call-counter store for those requests.
# - If the Envoy router is unavailable, traffic can fall back to the ClusterIP
#   Service (gateway:3002).  Availability is preserved; the cost is the
#   Redis hot-key returning.
#
# ## Scaling (adding or removing shards)
#
# When changing the shard count:
#   1. Update SHARD_COUNT in the Lua inline_code below.
#   2. Add / remove the matching per-pod route entries and clusters.
#   3. Update spec.replicas of the gateway StatefulSet and
#      GATEWAY_SHARD_COUNT on the pods to match.
#   Keep all three in sync; a mismatch causes counter drift until the next
#   window elapses.
#
# Run as a Deployment (not StatefulSet) — the router is stateless.  Scale
# independently of the gateway replicas.
#
# See docs/HORIZONTAL_SHARDING.md for the full architecture.

---
# ConfigMap with the Envoy bootstrap configuration.
apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-shard-router-config
  namespace: euno-system
data:
  # -----------------------------------------------------------------------
  # Envoy static configuration.
  #
  # Key design decisions:
  #   - Lua HTTP filter runs inline (no external plugin binary).
  #   - JWT decoding is base64url-only; no signature verification is
  #     performed here.  Security is enforced by the gateway.
  #   - The Lua filter implements FNV-1a % SHARD_COUNT, EXACTLY matching
  #     computeAgentShardIndex() in packages/common/src/shard.ts.  The
  #     computed index is set as x-euno-shard-index.
  #   - One upstream cluster per StatefulSet pod (tool_gateway_pod_0, …)
  #     with a stable per-pod DNS hostname.  Envoy routes to the specific
  #     pod cluster whose index matches the computed shard index.
  #   - A fallback cluster resolves the headless Service (DNS round-robin
  #     across all pods) for requests with missing / malformed JWTs.
  # -----------------------------------------------------------------------
  envoy.yaml: |
    static_resources:
      listeners:
      - name: ingress
        address:
          socket_address:
            address: 0.0.0.0
            port_value: 8080
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: ingress_http
              http_filters:
              # ----------------------------------------------------------------
              # Lua filter: compute FNV-1a shard index from the JWT `sub` claim
              # and set x-euno-shard-index for header-based route matching.
              #
              # *** MUST match computeAgentShardIndex in shard.ts ***
              # When GATEWAY_SHARD_COUNT / spec.replicas change, update
              # SHARD_COUNT and the routes / clusters below in lockstep.
              #
              # Security: x-euno-shard-index is stripped from incoming
              # requests before being set here, so clients cannot influence
              # which pod receives their traffic.  The gateway independently
              # verifies the JWT and computes its own shard ownership check.
              # ----------------------------------------------------------------
              - name: envoy.filters.http.lua
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                  inline_code: |
                    -- *** Update SHARD_COUNT to match GATEWAY_SHARD_COUNT ***
                    local SHARD_COUNT = 3

                    -- Base64url decode helper (RFC 4648 §5, no padding required).
                    local function base64url_decode(s)
                      s = s:gsub("-", "+"):gsub("_", "/")
                      local pad = (4 - (#s % 4)) % 4
                      s = s .. string.rep("=", pad)
                      local out = {}
                      for i = 1, #s - 3, 4 do
                        local function lk(c)
                          if c == string.byte("=") then return 0 end
                          if c >= string.byte("A") and c <= string.byte("Z") then return c - string.byte("A") end
                          if c >= string.byte("a") and c <= string.byte("z") then return c - string.byte("a") + 26 end
                          if c >= string.byte("0") and c <= string.byte("9") then return c - string.byte("0") + 52 end
                          if c == string.byte("+") then return 62 end
                          if c == string.byte("/") then return 63 end
                          return 0
                        end
                        local n1 = lk(string.byte(s, i  ))
                        local n2 = lk(string.byte(s, i+1))
                        local n3 = lk(string.byte(s, i+2))
                        local n4 = lk(string.byte(s, i+3))
                        local b1 = n1 * 4 + math.floor(n2 / 16)
                        local b2 = (n2 % 16) * 16 + math.floor(n3 / 4)
                        local b3 = (n3 % 4) * 64 + n4
                        out[#out+1] = string.char(b1)
                        if string.byte(s, i+2) ~= string.byte("=") then out[#out+1] = string.char(b2) end
                        if string.byte(s, i+3) ~= string.byte("=") then out[#out+1] = string.char(b3) end
                      end
                      return table.concat(out)
                    end

                    -- FNV-1a 32-bit hash — identical algorithm to shard.ts.
                    -- 16777619 (FNV prime) = 2^24 + 403 = 0x01000193.
                    -- We decompose the multiply as:
                    --   hash * 16777619 = bit.lshift(hash, 24) + hash * 403
                    -- because:
                    --   a) bit.lshift performs exact 32-bit arithmetic, and
                    --   b) hash * 403 ≤ (2^32-1)*403 ≈ 1.7×10^12 < 2^53,
                    --      fitting exactly in Lua's 53-bit double mantissa.
                    -- Multiplying by 16777619 directly would overflow the
                    -- mantissa and produce wrong hash values.
                    -- bit.lshift gives a *signed* int32; we convert to
                    -- unsigned before modulo (mirrors TypeScript's `>>> 0`).
                    local function fnv1a32(str)
                      local hash = 2166136261  -- FNV-1a offset basis (0x811c9dc5)
                      for i = 1, #str do
                        hash = bit.bxor(hash, string.byte(str, i))
                        -- hash * 16777619 mod 2^32, split to avoid mantissa overflow.
                        hash = bit.band(
                          bit.lshift(hash, 24) + hash * 403,
                          0xFFFFFFFF
                        )
                      end
                      -- bit.band returns a signed int32; convert to unsigned so that
                      -- the modulo matches TypeScript's unsigned >>> 0 result.
                      -- 4294967296 = 2^32.
                      if hash < 0 then hash = hash + 4294967296 end
                      return hash
                    end

                    function envoy_on_request(request_handle)
                      -- Strip any client-supplied routing header to prevent
                      -- routing-header injection / shard-affinity spoofing.
                      request_handle:headers():remove("x-euno-shard-index")

                      -- Strip any client-supplied X-Target-Host header.
                      -- The gateway's createTargetHostCanonicalizeMiddleware
                      -- rewrites this from the URL path; forwarding a client-
                      -- controlled value would allow resource-label spoofing
                      -- in capability enforcement.
                      request_handle:headers():remove("x-target-host")

                      local auth = request_handle:headers():get("authorization")
                      if not auth then return end

                      -- Match "Bearer <token>" (case-insensitive prefix).
                      local token = auth:match("^[Bb][Ee][Aa][Rr][Ee][Rr]%s+(.+)$")
                      if not token then return end

                      -- Split on `.` to get header.payload.signature.
                      local parts = {}
                      for part in token:gmatch("([^%.]+)") do
                        parts[#parts+1] = part
                      end
                      if #parts < 2 then return end

                      -- Decode the payload (second part).
                      local ok, payload = pcall(base64url_decode, parts[2])
                      if not ok or not payload then return end

                      -- Extract `sub` claim.  DIDs and UUIDs never contain
                      -- embedded quotes so this regex is sufficient.
                      local sub = payload:match('"sub"%s*:%s*"([^"]+)"')
                      if not sub or #sub == 0 then return end

                      local idx = fnv1a32(sub) % SHARD_COUNT
                      request_handle:headers():add("x-euno-shard-index", tostring(idx))
                    end
              # ----------------------------------------------------------------
              # Router — header-based routes select the per-pod cluster.
              # Routes are evaluated top-to-bottom; the last route (no
              # x-euno-shard-index header) is the fallback for unauthenticated
              # or malformed-JWT requests.
              # *** Update routes and clusters when SHARD_COUNT changes ***
              # ----------------------------------------------------------------
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
              route_config:
                name: local_route
                virtual_hosts:
                - name: tool_gateway
                  domains: ["*"]
                  routes:
                  - match:
                      prefix: "/"
                      headers:
                      - name: x-euno-shard-index
                        string_match:
                          exact: "0"
                    route:
                      cluster: tool_gateway_pod_0
                  - match:
                      prefix: "/"
                      headers:
                      - name: x-euno-shard-index
                        string_match:
                          exact: "1"
                    route:
                      cluster: tool_gateway_pod_1
                  - match:
                      prefix: "/"
                      headers:
                      - name: x-euno-shard-index
                        string_match:
                          exact: "2"
                    route:
                      cluster: tool_gateway_pod_2
                  # Fallback: no valid JWT / sub claim → any healthy pod.
                  # The gateway falls back to the Redis call-counter store.
                  - match:
                      prefix: "/"
                    route:
                      cluster: tool_gateway_pods_fallback

      clusters:
      # -----------------------------------------------------------------
      # Per-pod clusters — one per StatefulSet replica.
      # Each resolves a stable pod-DNS hostname so the gateway receives
      # exactly the traffic hashed to it.
      # *** Add / remove clusters when SHARD_COUNT changes ***
      # -----------------------------------------------------------------
      - name: tool_gateway_pod_0
        type: STRICT_DNS
        lb_policy: ROUND_ROBIN
        load_assignment:
          cluster_name: tool_gateway_pod_0
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: gateway-0.gateway-headless.euno-system.svc.cluster.local
                    port_value: 3002
        health_checks:
        - timeout: 2s
          interval: 10s
          unhealthy_threshold: 3
          healthy_threshold: 2
          http_health_check:
            path: /health/live

      - name: tool_gateway_pod_1
        type: STRICT_DNS
        lb_policy: ROUND_ROBIN
        load_assignment:
          cluster_name: tool_gateway_pod_1
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: gateway-1.gateway-headless.euno-system.svc.cluster.local
                    port_value: 3002
        health_checks:
        - timeout: 2s
          interval: 10s
          unhealthy_threshold: 3
          healthy_threshold: 2
          http_health_check:
            path: /health/live

      - name: tool_gateway_pod_2
        type: STRICT_DNS
        lb_policy: ROUND_ROBIN
        load_assignment:
          cluster_name: tool_gateway_pod_2
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: gateway-2.gateway-headless.euno-system.svc.cluster.local
                    port_value: 3002
        health_checks:
        - timeout: 2s
          interval: 10s
          unhealthy_threshold: 3
          healthy_threshold: 2
          http_health_check:
            path: /health/live

      # Fallback cluster: any healthy pod (round-robin) for requests that
      # arrive without a valid JWT.  Uses the headless Service DNS which
      # resolves to all ready pod IPs.
      - name: tool_gateway_pods_fallback
        type: STRICT_DNS
        lb_policy: ROUND_ROBIN
        load_assignment:
          cluster_name: tool_gateway_pods_fallback
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: gateway-headless.euno-system.svc.cluster.local
                    port_value: 3002
        health_checks:
        - timeout: 2s
          interval: 10s
          unhealthy_threshold: 3
          healthy_threshold: 2
          http_health_check:
            path: /health/live

    admin:
      address:
        socket_address:
          address: 127.0.0.1
          port_value: 9901

---
# Deployment — stateless, scale independently of the gateway.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy-shard-router
  namespace: euno-system
  labels:
    app: envoy-shard-router
    component: data-plane-router
spec:
  replicas: 2
  selector:
    matchLabels:
      app: envoy-shard-router
  template:
    metadata:
      labels:
        app: envoy-shard-router
        component: data-plane-router
    spec:
      serviceAccountName: envoy-shard-router-sa
      containers:
      - name: envoy
        image: envoyproxy/envoy:v1.30.9
        args:
        - -c
        - /etc/envoy/envoy.yaml
        - --log-level
        - warn
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: admin
          containerPort: 9901
          protocol: TCP
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        securityContext:
          runAsNonRoot: true
          runAsUser: 101   # envoy default non-root user
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
        - name: envoy-config
          mountPath: /etc/envoy
          readOnly: true
        - name: tmp
          mountPath: /tmp
        livenessProbe:
          httpGet:
            path: /ready
            port: 9901
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 9901
          initialDelaySeconds: 3
          periodSeconds: 5
      volumes:
      - name: envoy-config
        configMap:
          name: envoy-shard-router-config
      - name: tmp
        emptyDir:
          medium: Memory
          sizeLimit: 32Mi

---
# Service — the external entry point that replaces the ClusterIP `gateway`
# service for agent traffic.  Internal consumers that don't need sharding
# (health checks, metrics) continue to use `gateway` directly.
apiVersion: v1
kind: Service
metadata:
  name: envoy-shard-router
  namespace: euno-system
  labels:
    app: envoy-shard-router
spec:
  type: ClusterIP
  ports:
  - port: 3002
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: envoy-shard-router

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: envoy-shard-router-sa
  namespace: euno-system
automountServiceAccountToken: false
