# Tool Gateway — StatefulSet for horizontal sharding (H-1).
#
# Using a StatefulSet instead of a Deployment gives every pod a stable
# ordinal suffix in the form `tool-gateway-<N>`.  The init container below
# extracts that ordinal and writes it to GATEWAY_SHARD_INDEX so each replica
# knows its position in the consistent-hash ring without any external
# coordination service.
#
# Combined with the Envoy shard router (k8s/envoy-shard-router.yaml) this
# eliminates Redis INCR hot-keys for `maxCalls` conditions: all traffic for
# a given agent consistently reaches the same pod, so that pod tracks the
# counter in its local memory instead of making a Redis round-trip.
#
# See docs/HORIZONTAL_SHARDING.md for the full architecture.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tool-gateway
  namespace: euno-system
  labels:
    app: tool-gateway
    component: data-plane
spec:
  # Keep in sync with GATEWAY_SHARD_COUNT and with the envoy-shard-router
  # configmap (SHARD_COUNT).  A mismatch between replica count and
  # GATEWAY_SHARD_COUNT causes counter drift until the slower end catches up.
  replicas: 3
  serviceName: tool-gateway-headless
  selector:
    matchLabels:
      app: tool-gateway
  template:
    metadata:
      labels:
        app: tool-gateway
        component: data-plane
    spec:
      serviceAccountName: tool-gateway
      # Init container: extract the pod ordinal from $POD_NAME
      # (e.g. "tool-gateway-2" → "2") and write it to a shared volume as
      # GATEWAY_SHARD_INDEX so the main container can read it via envFrom.
      # We use a tiny busybox rather than a custom image to keep the
      # dependency footprint minimal.
      initContainers:
      - name: shard-index-init
        image: busybox:1.36
        command:
        - /bin/sh
        - -c
        - |
          # Extract the numeric suffix from the pod name (StatefulSet ordinal).
          ORDINAL="${POD_NAME##*-}"
          echo "GATEWAY_SHARD_INDEX=${ORDINAL}" > /env/shard.env
          echo "Wrote GATEWAY_SHARD_INDEX=${ORDINAL} for pod ${POD_NAME}"
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        volumeMounts:
        - name: shard-env
          mountPath: /env
      containers:
      - name: tool-gateway
        image: eunoacr.azurecr.io/tool-gateway:v1.0.0
        imagePullPolicy: Always
        # Source the shard index written by the init container before
        # starting Node. The init container writes:
        #   GATEWAY_SHARD_INDEX=<ordinal>
        # to /env/shard.env as a plain shell assignment. Sourcing the file
        # exports it into the process environment so Node.js (and therefore
        # the gateway config schema) can read it via process.env. The `exec`
        # replaces the shell so signals (SIGTERM) propagate correctly and the
        # container PID 1 is Node, not sh.
        command:
        - sh
        - -c
        - |
          if [ -f /env/shard.env ]; then
            . /env/shard.env
            export GATEWAY_SHARD_INDEX
          fi
          exec node dist/index.js
        ports:
        - name: http
          containerPort: 3002
          protocol: TCP
        - name: admin
          containerPort: 3003
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3002"
        - name: ADMIN_PORT
          value: "3003"
        - name: ADMIN_HOST
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: EUNO_DEPLOYMENT_TIER
          value: "multi-replica"
        # Horizontal sharding (H-1).  GATEWAY_SHARD_COUNT must match the
        # StatefulSet replica count above and the SHARD_COUNT in the Envoy
        # shard router configmap.  GATEWAY_SHARD_INDEX is injected by the
        # init container from the pod ordinal.
        - name: GATEWAY_SHARD_COUNT
          value: "3"
        # GATEWAY_SHARD_INDEX is sourced from the init-container-written
        # /env/shard.env file via the container command wrapper above.
        # The default (0) applies when running outside a StatefulSet.
        - name: ISSUER_JWKS_URL
          value: "http://capability-issuer:3001/.well-known/jwks.json"
        - name: BACKEND_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: euno-config
              key: backend-service-url
        - name: POLICY_VERSION
          value: "1.0.0"
        - name: DPOP_REQUIRED
          value: "true"
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: euno-config
              key: redis-url
        - name: REVOCATION_FAIL_OPEN
          value: "false"
        - name: EVIDENCE_SIGNED_DECISIONS
          value: "deny"
        - name: EVIDENCE_SIGNING_KEY_FILE
          value: "/var/run/secrets/euno/evidence-signing-key.pem"
        - name: EVIDENCE_SIGNING_ALGORITHM
          value: "RS256"
        - name: ADMIN_API_KEY
          valueFrom:
            secretKeyRef:
              name: gateway-secrets
              key: admin-api-key
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 3002
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3002
          initialDelaySeconds: 5
          periodSeconds: 10
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: evidence-signing-key
          mountPath: /var/run/secrets/euno
          readOnly: true
        - name: shard-env
          mountPath: /env
          readOnly: true
      volumes:
      - name: tmp
        emptyDir: {}
      - name: evidence-signing-key
        secret:
          secretName: gateway-secrets
          items:
          - key: evidence-signing-key.pem
            path: evidence-signing-key.pem
          defaultMode: 0400
      - name: shard-env
        emptyDir: {}
---
# Headless Service required by StatefulSet for pod DNS (tool-gateway-0,
# tool-gateway-1, …).  The Envoy shard router targets individual pods by
# their ordinal-stable DNS name; this service makes those names resolvable.
apiVersion: v1
kind: Service
metadata:
  name: tool-gateway-headless
  namespace: euno-system
  labels:
    app: tool-gateway
spec:
  clusterIP: None
  ports:
  - port: 3002
    targetPort: 3002
    protocol: TCP
    name: http
  selector:
    app: tool-gateway
---
# ClusterIP Service for non-sharded consumers (health checks, metrics
# scrapers, admin API clients) that do not need pod affinity.
apiVersion: v1
kind: Service
metadata:
  name: tool-gateway
  namespace: euno-system
  labels:
    app: tool-gateway
spec:
  type: ClusterIP
  ports:
  - port: 3002
    targetPort: 3002
    protocol: TCP
    name: http
  selector:
    app: tool-gateway
---
# Admin API Service — internal ClusterIP only.
apiVersion: v1
kind: Service
metadata:
  name: tool-gateway-admin
  namespace: euno-system
  labels:
    app: tool-gateway
spec:
  type: ClusterIP
  ports:
  - port: 3003
    targetPort: 3003
    protocol: TCP
    name: admin
  selector:
    app: tool-gateway
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tool-gateway
  namespace: euno-system
