# AppArmor profile for Eunox services - Sprint 3 Sandbox Hardening
# This profile restricts dangerous syscalls and operations
#
# To install this profile on Kubernetes nodes:
# 1. Copy this file to /etc/apparmor.d/eunox-restricted on each node
# 2. Run: sudo apparmor_parser -r /etc/apparmor.d/eunox-restricted
# 3. Add annotation to pod: container.apparmor.security.beta.kubernetes.io/<container-name>: localhost/eunox-restricted

#include <tunables/global>

profile eunox-restricted flags=(attach_disconnected,mediate_deleted) {
  #include <abstractions/base>
  #include <abstractions/nameservice>
  #include <abstractions/openssl>

  # Allow network operations (required for HTTP services)
  network inet stream,
  network inet6 stream,
  network inet dgram,
  network inet6 dgram,

  # Allow reading application files
  /app/** r,
  /usr/** r,
  /lib/** r,
  /etc/** r,

  # Allow Node.js operations
  /usr/bin/node rix,

  # Allow temporary file operations (limited scope)
  owner /tmp/** rw,

  # Deny dangerous operations - Sprint 3 requirements
  deny /proc/sys/kernel/** w,  # Prevent kernel parameter modification
  deny /sys/** w,               # Prevent sysfs writes
  deny @{PROC}/[0-9]*/mem rw,  # Prevent process memory access
  deny ptrace,                  # Prevent process tracing
  deny mount,                   # Prevent mounting filesystems
  deny umount,                  # Prevent unmounting
  deny capability sys_admin,    # Prevent admin capabilities
  deny capability sys_module,   # Prevent kernel module loading
  deny capability sys_rawio,    # Prevent raw I/O
  deny capability sys_ptrace,   # Prevent ptrace capability
  deny capability sys_chroot,   # Prevent chroot
  deny capability setuid,       # Prevent UID changes
  deny capability setgid,       # Prevent GID changes
  deny capability dac_override, # Prevent DAC override
  deny capability dac_read_search, # Prevent DAC read search
}
