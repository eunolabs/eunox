# Kubernetes manifests for the partner-issuer-sim
#
# This is a *test harness* component used by the cross-org trust integration
# tests (`packages/integration-tests/tests/cross-org.test.ts`) and the
# `infra/docker-compose.cross-org.yml` developer workflow.
#
# It is intentionally provisioned in a SEPARATE namespace (`euno-partner-sim`)
# so that it cannot share secrets or service accounts with the gateway
# operator's own production namespace.  It is also denied egress to anything
# other than the gateway namespace via the NetworkPolicy below — a deliberate
# blast-radius limit even in test clusters.
#
# DO NOT install this in a production cluster.

---
apiVersion: v1
kind: Namespace
metadata:
  name: euno-partner-sim
  labels:
    name: euno-partner-sim
    purpose: test-harness
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted

---
apiVersion: v1
kind: Secret
metadata:
  name: partner-issuer-sim-seed
  namespace: euno-partner-sim
type: Opaque
stringData:
  # 32-byte hex seed.  Replace before deployment — committing the example
  # value would let anyone impersonate this DID.
  PARTNER_SEED: "REPLACE_ME_WITH_32_BYTE_HEX_SEED"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: partner-issuer-sim-config
  namespace: euno-partner-sim
data:
  PARTNER_ISSUER_DID: "did:web:partner-issuer-sim.euno-partner-sim.svc%3A4001"
  PARTNER_AUDIENCE: "tool-gateway"
  PARTNER_TOKEN_TTL: "900"
  PARTNER_TRUSTED_ISSUER_DIDS: "did:web:capability-issuer.euno-system.svc%3A3000"

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: partner-issuer-sim
  namespace: euno-partner-sim
automountServiceAccountToken: false

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: partner-issuer-sim
  namespace: euno-partner-sim
  labels:
    app: partner-issuer-sim
    purpose: test-harness
spec:
  replicas: 1
  selector:
    matchLabels:
      app: partner-issuer-sim
  template:
    metadata:
      labels:
        app: partner-issuer-sim
        purpose: test-harness
    spec:
      serviceAccountName: partner-issuer-sim
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: partner-issuer-sim
        # Built locally via `infra/docker-compose.cross-org.yml`; the test
        # cluster image registry path will vary by environment.
        image: euno/partner-issuer-sim:dev
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 4001
          protocol: TCP
        env:
        - name: PORT
          value: "4001"
        - name: PARTNER_ISSUER_DID
          valueFrom:
            configMapKeyRef:
              name: partner-issuer-sim-config
              key: PARTNER_ISSUER_DID
        - name: PARTNER_AUDIENCE
          valueFrom:
            configMapKeyRef:
              name: partner-issuer-sim-config
              key: PARTNER_AUDIENCE
        - name: PARTNER_TOKEN_TTL
          valueFrom:
            configMapKeyRef:
              name: partner-issuer-sim-config
              key: PARTNER_TOKEN_TTL
        - name: PARTNER_TRUSTED_ISSUER_DIDS
          valueFrom:
            configMapKeyRef:
              name: partner-issuer-sim-config
              key: PARTNER_TRUSTED_ISSUER_DIDS
        - name: PARTNER_SEED
          valueFrom:
            secretKeyRef:
              name: partner-issuer-sim-seed
              key: PARTNER_SEED
        # Test-mode HTTP exception so the partner can resolve our issuer's
        # DID without TLS termination inside the cluster.  Production
        # deployments MUST leave this unset.
        - name: DID_WEB_ALLOW_HTTP_FOR_HOSTS
          value: "capability-issuer.euno-system.svc:3000"
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "250m"
            memory: "128Mi"
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 2
          periodSeconds: 5
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: partner-issuer-sim
  namespace: euno-partner-sim
  labels:
    app: partner-issuer-sim
spec:
  type: ClusterIP
  selector:
    app: partner-issuer-sim
  ports:
  - name: http
    port: 4001
    targetPort: http
    protocol: TCP

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: partner-issuer-sim
  namespace: euno-partner-sim
spec:
  podSelector:
    matchLabels:
      app: partner-issuer-sim
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Only the gateway namespace may call the partner sim.
  - from:
    - namespaceSelector:
        matchLabels:
          name: euno-system
    ports:
    - protocol: TCP
      port: 4001
  egress:
  # Allow DNS so did:web resolution works.
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow HTTP/HTTPS to the gateway namespace (for the /validate flow that
  # resolves our issuer's DID document).
  - to:
    - namespaceSelector:
        matchLabels:
          name: euno-system
    ports:
    - protocol: TCP
      port: 3000
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 443
