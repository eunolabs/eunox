# Agent Runtime with Sandbox Security Constraints
#
# Baseline (Sprint 1):
# - Read-only root filesystem
# - Least-privilege Linux capabilities (all dropped)
# - Network egress restricted via NetworkPolicy
# - No sensitive host paths accessible
# - Runs as non-root user
#
# Hardening (see docs/security/agent-runtime-sandbox-architecture.md):
# - Custom seccomp allowlist (k8s/seccomp/agent-runtime.json) — ~90% syscall surface reduction
# - emptyDir volume size limits — prevents node-disk DoS from a compromised agent
# - automountServiceAccountToken: false — removes Kubernetes API credential from pod
# - runtimeClassName annotation (commented) — enable for gVisor or AKS Pod Sandboxing

apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-runtime
  namespace: euno-system
  labels:
    app: agent-runtime
    component: agent
    role: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-runtime
      role: agent
  template:
    metadata:
      labels:
        app: agent-runtime
        component: agent
        role: agent
    spec:
      serviceAccountName: agent-runtime
      # ── Kernel isolation (P0 recommendation) ──────────────────────────────────
      # Uncomment ONE of the following runtimeClassName lines to give the agent
      # a fully isolated kernel, eliminating the shared-kernel escape risk.
      #
      # AKS Pod Sandboxing (Kata / Microsoft HyperV) — recommended for AKS:
      #   Prerequisite: node pool created with --workload-runtime KataMshvVmIsolation
      #   https://learn.microsoft.com/en-us/azure/aks/use-pod-sandboxing
      #
      # runtimeClassName: kata-mshv-vm-isolation
      #
      # gVisor (self-managed K8s) — recommended for EKS/GKE/bare-metal:
      #   Prerequisite: node pool with gVisor runtime handler installed
      #   https://gvisor.dev/docs/user_guide/quick_start/kubernetes/
      #
      # runtimeClassName: gvisor
      #
      # Sprint 1: Security context for pod
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: agent
        image: eunoacr.azurecr.io/agent-runtime:v1.0.0
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 3003
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3003"
        - name: AGENT_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: GATEWAY_URL
          # Route agent traffic through the Envoy shard router (H-1) so each
          # agent's requests are consistently hashed to the correct gateway shard.
          # The Envoy Service maps port 3002 → envoy container port 8080.
          # To bypass sharding (e.g. when Envoy is unavailable), change this to
          # http://tool-gateway:3002 — sharding will be disabled and the gateway
          # will use Redis for all call-counter operations.
          value: "http://envoy-shard-router:3002"
        - name: ISSUER_URL
          value: "http://capability-issuer:3001"
        # Sprint 2: Token refresh interval
        - name: TOKEN_REFRESH_INTERVAL
          value: "600"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        # Sprint 1: Container security context
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          # Sprint 1: Drop all Linux capabilities
          capabilities:
            drop:
            - ALL
          # Sprint 1: Read-only root filesystem
          readOnlyRootFilesystem: true
          # Custom seccomp allowlist — Node.js 18 HTTPS client surface only.
          # Blocks ptrace, mount, clone(CLONE_NEWUSER), bpf, io_uring, keyctl,
          # perf_event_open, setuid, and kernel module syscalls.
          # The profile file must be deployed to each cluster node at:
          #   /var/lib/kubelet/seccomp/agent-runtime.json
          # See k8s/seccomp/agent-runtime.json and docs/security/agent-runtime-sandbox-architecture.md
          seccompProfile:
            type: Localhost
            localhostProfile: agent-runtime.json
        # Sprint 1: Mount only necessary volumes (ephemeral scratch)
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: app-tmp
          mountPath: /app/tmp
        - name: logs
          mountPath: /app/logs
      # Sprint 1: Ephemeral volumes only
      volumes:
      - name: tmp
        emptyDir:
          # Size limit prevents a compromised agent from exhausting node disk storage.
          sizeLimit: 64Mi
      - name: app-tmp
        emptyDir:
          sizeLimit: 64Mi
      - name: logs
        emptyDir:
          sizeLimit: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: agent-runtime
  namespace: euno-system
  labels:
    app: agent-runtime
spec:
  type: ClusterIP
  ports:
  - port: 3003
    targetPort: 3003
    protocol: TCP
    name: http
  selector:
    app: agent-runtime
    role: agent
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-runtime
  namespace: euno-system
# The agent-runtime process has no legitimate reason to call the Kubernetes API.
# Disabling automounting removes the projected token from the pod filesystem,
# eliminating it as an exfiltration target if the agent is compromised.
automountServiceAccountToken: false
