# Capability Issuer Deployment with Sprint 3 Sandbox Hardening
apiVersion: apps/v1
kind: Deployment
metadata:
  name: capability-issuer
  namespace: euno-system
  labels:
    app: capability-issuer
    version: v1.0.0
    component: control-plane
spec:
  replicas: 2
  selector:
    matchLabels:
      app: capability-issuer
  template:
    metadata:
      labels:
        app: capability-issuer
        version: v1.0.0
      annotations:
        # Sprint 3: AppArmor profile annotation
        container.apparmor.security.beta.kubernetes.io/capability-issuer: localhost/euno-restricted
    spec:
      # Sprint 3: Service account with no API token (config injected via env)
      serviceAccountName: capability-issuer-sa
      automountServiceAccountToken: false

      # Sprint 3: Security context at pod level
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        # SELinux options
        seLinuxOptions:
          level: "s0:c123,c456"
          type: "euno_restricted.process"
        seccompProfile:
          type: RuntimeDefault

      containers:
      - name: capability-issuer
        image: eunoacr.azurecr.io/capability-issuer:v1.0.0
        imagePullPolicy: Always

        ports:
        - name: http
          containerPort: 3001
          protocol: TCP

        # Sprint 3: Environment variable scrubbing - no sensitive data
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3001"

        # Declare the deployment availability tier so the issuer's
        # config schema enforces the matching infrastructure (REDIS_URL
        # is required for multi-replica). Switch to
        # "multi-region-active-active" and set ISSUER_REGION when adding
        # a second region — see docs/MULTI_REGION_ISSUER.md.
        - name: EUNO_DEPLOYMENT_TIER
          value: "multi-replica"

        # Signing Provider Selection
        # Options: azure-keyvault, aws-kms, gcp-cloudkms
        - name: SIGNING_PROVIDER
          valueFrom:
            configMapKeyRef:
              name: issuer-config
              key: signing-provider

        # Identity Provider Selection
        # Options: azure-ad, did
        - name: IDENTITY_PROVIDER
          valueFrom:
            configMapKeyRef:
              name: issuer-config
              key: identity-provider

        # Azure Key Vault Configuration (if SIGNING_PROVIDER=azure-keyvault)
        - name: AZURE_KEYVAULT_URL
          valueFrom:
            configMapKeyRef:
              name: issuer-config
              key: keyvault-url
              optional: true
        - name: AZURE_KEYVAULT_KEY_NAME
          value: "capability-signing-key"

        # Azure AD Configuration (if IDENTITY_PROVIDER=azure-ad)
        - name: AZURE_AD_TENANT_ID
          valueFrom:
            configMapKeyRef:
              name: issuer-config
              key: tenant-id
              optional: true
        - name: AZURE_AD_CLIENT_ID
          valueFrom:
            configMapKeyRef:
              name: issuer-config
              key: client-id
              optional: true

        # AWS KMS Configuration (if SIGNING_PROVIDER=aws-kms)
        - name: AWS_KMS_REGION
          valueFrom:
            configMapKeyRef:
              name: issuer-config
              key: aws-kms-region
              optional: true
        - name: AWS_KMS_KEY_ID
          valueFrom:
            configMapKeyRef:
              name: issuer-config
              key: aws-kms-key-id
              optional: true

        # GCP Cloud KMS Configuration (if SIGNING_PROVIDER=gcp-cloudkms)
        - name: GCP_PROJECT_ID
          valueFrom:
            configMapKeyRef:
              name: issuer-config
              key: gcp-project-id
              optional: true
        - name: GCP_LOCATION_ID
          valueFrom:
            configMapKeyRef:
              name: issuer-config
              key: gcp-location-id
              optional: true
        - name: GCP_KEYRING_ID
          valueFrom:
            configMapKeyRef:
              name: issuer-config
              key: gcp-keyring-id
              optional: true
        - name: GCP_CRYPTOKEY_ID
          valueFrom:
            configMapKeyRef:
              name: issuer-config
              key: gcp-cryptokey-id
              optional: true

        # Issuer Configuration
        - name: ISSUER_DID
          valueFrom:
            configMapKeyRef:
              name: issuer-config
              key: issuer-did
        - name: DEFAULT_TOKEN_TTL
          value: "900"
        - name: ENABLE_DETAILED_LOGGING
          value: "false"

        # Distributed coordination (Redis) — REQUIRED for multi-replica HA.
        # Without REDIS_URL, the per-subject issuance rate limiter falls
        # back to per-pod in-memory counters and the effective budget is
        # multiplied by the issuer replica count.  Defaults to the
        # in-cluster Redis shipped in `redis.yaml`; override the
        # `redis-url` ConfigMap key for managed Redis in production.
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: issuer-config
              key: redis-url
        # Issuance rate limiter (F-1) — enabled by default in production so
        # a single compromised principal cannot mint capabilities at line
        # rate.  Tune via the ConfigMap below.
        - name: ISSUANCE_RATE_LIMIT_ENABLED
          value: "true"
        - name: ISSUANCE_RATE_LIMIT_FAIL_CLOSED
          value: "true"

        # Sprint 3: Secrets via Kubernetes secrets, not environment variables
        # Azure credentials (if using Azure)
        - name: AZURE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: issuer-secrets
              key: azure-client-secret
              optional: true
        # AWS credentials (if using AWS)
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: issuer-secrets
              key: aws-access-key-id
              optional: true
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: issuer-secrets
              key: aws-secret-access-key
              optional: true

        # Sprint 3: Resource limits (CPU and memory via cgroups)
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi

        # Sprint 3: Security context at container level
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1001
          runAsGroup: 1001
          privileged: false
          procMount: Default

        # Sprint 3: Volume mounts - only necessary paths
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /app/.npm

        # Health checks
        livenessProbe:
          httpGet:
            path: /health/live
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3

      # Sprint 3: Volumes - writable tmpfs for temporary files only
      volumes:
      - name: tmp
        emptyDir:
          medium: Memory
          sizeLimit: 100Mi
      - name: cache
        emptyDir:
          medium: Memory
          sizeLimit: 50Mi

      # Sprint 3: Additional pod-level restrictions
      enableServiceLinks: false
      hostNetwork: false
      hostPID: false
      hostIPC: false

---
# Service Account without Kubernetes API access
apiVersion: v1
kind: ServiceAccount
metadata:
  name: capability-issuer-sa
  namespace: euno-system
automountServiceAccountToken: false

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: capability-issuer
  namespace: euno-system
  labels:
    app: capability-issuer
spec:
  type: ClusterIP
  ports:
  - port: 3001
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: capability-issuer

---
# ConfigMap for non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: issuer-config
  namespace: euno-system
data:
  # Signing Provider Selection
  # Options: azure-keyvault, aws-kms, gcp-cloudkms
  signing-provider: "azure-keyvault"

  # Identity Provider Selection
  # Options: azure-ad, did
  identity-provider: "azure-ad"

  # Azure Configuration (if using Azure)
  keyvault-url: "https://your-keyvault.vault.azure.net"
  tenant-id: "your-tenant-id"
  client-id: "your-client-id"

  # AWS KMS Configuration (if using AWS)
  # aws-kms-region: "us-east-1"
  # aws-kms-key-id: "arn:aws:kms:us-east-1:123456789012:key/12345678-1234-1234-1234-123456789012"

  # GCP Cloud KMS Configuration (if using GCP)
  # gcp-project-id: "your-project-id"
  # gcp-location-id: "us-central1"
  # gcp-keyring-id: "your-keyring"
  # gcp-cryptokey-id: "your-cryptokey"

  # Issuer DID
  issuer-did: "did:web:your-domain.com"

  # Distributed coordination (Redis) — REQUIRED so the per-subject
  # issuance rate limiter (F-1) shares state across all issuer replicas.
  # Defaults to the in-cluster Redis from `redis.yaml`; override with a
  # managed Redis URL for production / multi-region (see
  # docs/MULTI_REGION_ISSUER.md).
  redis-url: "redis://redis.euno-system.svc.cluster.local:6379"
