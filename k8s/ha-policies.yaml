# Sprint 5: High-availability hardening for the production pilot.
#
# Adds PodDisruptionBudgets and (for the Capability Issuer) a
# HorizontalPodAutoscaler.
#
# Apply *after* the base manifests:
#   - Capability Issuer: issuer-deployment.yaml  (Deployment)
#   - Tool Gateway:      gateway.yaml                  (StatefulSet + Envoy shard router)
#
# Rationale (from execution-plan.md, Sprint 5):
#   - "Capability Issuer as a highly-available service (two or more instances,
#     behind load balancer, with auto-scale)."
#   - "Tool Gateway close to agents (sidecar in AKS pod, DaemonSet, or dedicated
#     internal service)."  -> the sharded StatefulSet (gateway.yaml) runs
#     behind the Envoy shard router; its replica count is managed manually (see
#     note below) and `agent-runtime.yaml` targets the Envoy router endpoint.
#
# ## Why no HPA for the sharded gateway StatefulSet?
#
# The H-1 sharding topology is hard-coded for a fixed number of shards:
#   - spec.replicas in gateway.yaml
#   - GATEWAY_SHARD_COUNT env var on every pod
#   - SHARD_COUNT in the Envoy Lua inline_code
#   - Route entries and per-pod cluster stanzas in envoy-shard-router.yaml
# All four must be updated in lockstep.  If an HPA scaled the StatefulSet above
# the current shard count, the new pod would receive GATEWAY_SHARD_INDEX ≥
# GATEWAY_SHARD_COUNT, fail config validation, and crash-loop — and the Envoy
# router would have no route for the higher ordinal anyway.
#
# If you are using the non-sharded Deployment variant (gateway-deployment.yaml)
# you can safely add an HPA like this:
#
#   apiVersion: autoscaling/v2
#   kind: HorizontalPodAutoscaler
#   metadata:
#     name: gateway-hpa
#     namespace: euno-system
#   spec:
#     scaleTargetRef:
#       apiVersion: apps/v1
#       kind: Deployment
#       name: gateway
#     minReplicas: 3
#     maxReplicas: 20
#     metrics: [...]

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: issuer-pdb
  namespace: euno-system
  labels:
    app: issuer
    component: control-plane
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: issuer

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: issuer-hpa
  namespace: euno-system
  labels:
    app: issuer
    component: control-plane
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: issuer
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gateway-pdb
  namespace: euno-system
  labels:
    app: gateway
    component: data-plane
spec:
  # The gateway is on the hot path for every tool call; keep at least 2 pods
  # available during voluntary disruptions (node drain, cluster upgrade, etc.).
  minAvailable: 2
  selector:
    matchLabels:
      app: gateway
