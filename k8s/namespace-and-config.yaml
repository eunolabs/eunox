# Namespace and ConfigMap for Eunox System
apiVersion: v1
kind: Namespace
metadata:
  name: euno-system
  labels:
    name: euno-system
---
# ConfigMap for common configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: euno-config
  namespace: euno-system
data:
  # Azure Configuration
  keyvault-url: "https://euno-keyvault.vault.azure.net/"
  azure-tenant-id: "<AZURE_TENANT_ID>"
  azure-client-id: "<AZURE_CLIENT_ID>"
  issuer-did: "did:web:yourdomain.com"

  # Backend services
  backend-service-url: "https://api.example.com"

  # Policy version
  policy-version: "0.1.0"

  # Distributed coordination (Redis) — REQUIRED for multi-replica gateway
  # and issuer deployments.  Without it, revocation, kill-switch, maxCalls
  # counters, DPoP replay defense, and per-subject issuance rate-limit
  # state fall back to per-pod in-memory stores and split-brain across
  # replicas.  Defaults to the in-cluster Redis shipped in `redis.yaml`;
  # override with a managed Redis URL (e.g. Azure Cache for Redis,
  # ElastiCache, Memorystore) for production.
  redis-url: "redis://redis.euno-system.svc.cluster.local:6379"
---
# Secret placeholders (create these separately with actual values)
# kubectl create secret generic issuer-secrets \
#   --from-literal=azure-client-secret=<SECRET> \
#   -n euno-system
#
# kubectl create secret generic gateway-secrets \
#   --from-literal=admin-api-key=<SECRET> \
#   -n euno-system
