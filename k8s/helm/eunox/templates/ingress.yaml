{{/*
Ingress resources for the Eunox platform services.
Controlled by the top-level ingress.enabled value.
*/}}
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "eunox.fullname" . }}-gateway
  labels:
    {{- include "eunox.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
  {{- with (merge (.Values.ingress.gateway.annotations | default dict) (.Values.ingress.annotations | default dict)) }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if or .Values.ingress.gateway.tls .Values.ingress.tls }}
  tls:
    {{- range (default .Values.ingress.tls .Values.ingress.gateway.tls) }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.gateway.host | quote }}
      http:
        paths:
          - path: {{ .Values.ingress.gateway.path | default "/" }}
            pathType: {{ .Values.ingress.gateway.pathType | default "Prefix" }}
            backend:
              service:
                name: {{ include "eunox.fullname" . }}-gateway
                port:
                  number: {{ .Values.gateway.service.port }}
---
