{{/*
issuer Deployment
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "euno.fullname" . }}-issuer
  labels:
    {{- include "euno.labels" . | nindent 4 }}
    app.kubernetes.io/component: issuer
  {{- with .Values.issuer.serviceAccountAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "euno.fullname" . }}-issuer
  labels:
    {{- include "euno.labels" . | nindent 4 }}
    app.kubernetes.io/component: issuer
spec:
  replicas: {{ .Values.issuer.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: euno-issuer
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: euno-issuer
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: issuer
        {{- with .Values.issuer.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "euno.fullname" . }}-issuer
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 45
      containers:
        - name: issuer
          image: "{{ .Values.issuer.image.repository }}:{{ .Values.issuer.image.tag }}"
          imagePullPolicy: {{ .Values.issuer.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: {{ .Values.issuer.service.port }}
              protocol: TCP
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 0
            periodSeconds: 5
            failureThreshold: 2
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "5"]
          envFrom:
            - configMapRef:
                name: {{ include "euno.fullname" . }}-issuer-config
            {{- if .Values.issuer.secretEnv }}
            - secretRef:
                name: {{ include "euno.fullname" . }}-issuer-secret
            {{- end }}
          resources:
            {{- toYaml .Values.issuer.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "euno.fullname" . }}-issuer
  labels:
    {{- include "euno.labels" . | nindent 4 }}
    app.kubernetes.io/component: issuer
spec:
  type: {{ .Values.issuer.service.type }}
  ports:
    - name: http
      port: {{ .Values.issuer.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: euno-issuer
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "euno.fullname" . }}-issuer-config
  labels:
    {{- include "euno.labels" . | nindent 4 }}
    app.kubernetes.io/component: issuer
data:
  {{- range $key, $val := .Values.issuer.env }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
{{- if .Values.issuer.secretEnv }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "euno.fullname" . }}-issuer-secret
  labels:
    {{- include "euno.labels" . | nindent 4 }}
    app.kubernetes.io/component: issuer
type: Opaque
stringData:
  {{- range $key, $val := .Values.issuer.secretEnv }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
{{- end }}
{{- if .Values.issuer.pdb.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "euno.fullname" . }}-issuer
  labels:
    {{- include "euno.labels" . | nindent 4 }}
    app.kubernetes.io/component: issuer
spec:
  minAvailable: {{ .Values.issuer.pdb.minAvailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: euno-issuer
      app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
