{{/*
storage-grant-service Deployment
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "euno.fullname" . }}-storage-grant-service
  labels:
    {{- include "euno.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage-grant-service
spec:
  replicas: {{ .Values.storageGrantService.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: euno-storage-grant-service
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: euno-storage-grant-service
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: storage-grant-service
    spec:
      containers:
        - name: storage-grant-service
          image: "{{ .Values.storageGrantService.image.repository }}:{{ .Values.storageGrantService.image.tag }}"
          imagePullPolicy: {{ .Values.storageGrantService.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.storageGrantService.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          envFrom:
            - configMapRef:
                name: {{ include "euno.fullname" . }}-storage-grant-service-config
          resources: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "euno.fullname" . }}-storage-grant-service
  labels:
    {{- include "euno.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage-grant-service
spec:
  type: {{ .Values.storageGrantService.service.type }}
  ports:
    - name: http
      port: {{ .Values.storageGrantService.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: euno-storage-grant-service
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "euno.fullname" . }}-storage-grant-service-config
  labels:
    {{- include "euno.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage-grant-service
data:
  {{- range $key, $val := .Values.storageGrantService.env }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
