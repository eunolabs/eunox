{{/*
tool-gateway Deployment
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "euno.fullname" . }}-gateway
  labels:
    {{- include "euno.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: euno-gateway
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: euno-gateway
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: gateway
    spec:
      containers:
        - name: gateway
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.gateway.service.port }}
              protocol: TCP
            - name: admin
              containerPort: {{ .Values.gateway.service.adminPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          envFrom:
            - configMapRef:
                name: {{ include "euno.fullname" . }}-gateway-config
            {{- if .Values.gateway.secretEnv }}
            - secretRef:
                name: {{ include "euno.fullname" . }}-gateway-secret
            {{- end }}
          resources: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "euno.fullname" . }}-gateway
  labels:
    {{- include "euno.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: {{ .Values.gateway.service.type }}
  ports:
    - name: http
      port: {{ .Values.gateway.service.port }}
      targetPort: http
      protocol: TCP
    - name: admin
      port: {{ .Values.gateway.service.adminPort }}
      targetPort: admin
      protocol: TCP
  selector:
    app.kubernetes.io/name: euno-gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "euno.fullname" . }}-gateway-config
  labels:
    {{- include "euno.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
data:
  {{- range $key, $val := .Values.gateway.env }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
{{- if .Values.gateway.secretEnv }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "euno.fullname" . }}-gateway-secret
  labels:
    {{- include "euno.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
type: Opaque
stringData:
  {{- range $key, $val := .Values.gateway.secretEnv }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
{{- end }}
