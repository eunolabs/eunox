{{/*
gateway Deployment
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "euno.fullname" . }}-gateway
  labels:
    {{- include "euno.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
  {{- with .Values.gateway.serviceAccountAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "euno.fullname" . }}-gateway
  labels:
    {{- include "euno.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: euno-gateway
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: euno-gateway
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: gateway
        {{- with .Values.gateway.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "euno.fullname" . }}-gateway
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 45
      containers:
        - name: gateway
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: {{ .Values.gateway.service.port }}
              protocol: TCP
            - name: admin
              containerPort: {{ .Values.gateway.service.adminPort }}
              protocol: TCP
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 0
            periodSeconds: 5
            failureThreshold: 2
          envFrom:
            - configMapRef:
                name: {{ include "euno.fullname" . }}-gateway-config
            {{- if .Values.gateway.secretEnv }}
            - secretRef:
                name: {{ include "euno.fullname" . }}-gateway-secret
            {{- end }}
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "euno.fullname" . }}-gateway
  labels:
    {{- include "euno.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: {{ .Values.gateway.service.type }}
  ports:
    - name: http
      port: {{ .Values.gateway.service.port }}
      targetPort: http
      protocol: TCP
    - name: admin
      port: {{ .Values.gateway.service.adminPort }}
      targetPort: admin
      protocol: TCP
  selector:
    app.kubernetes.io/name: euno-gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "euno.fullname" . }}-gateway-config
  labels:
    {{- include "euno.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
data:
  {{- range $key, $val := .Values.gateway.env }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
{{- if .Values.gateway.secretEnv }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "euno.fullname" . }}-gateway-secret
  labels:
    {{- include "euno.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
type: Opaque
stringData:
  {{- range $key, $val := .Values.gateway.secretEnv }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
{{- end }}
{{- if .Values.gateway.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "euno.fullname" . }}-gateway
  labels:
    {{- include "euno.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "euno.fullname" . }}-gateway
  minReplicas: {{ .Values.gateway.hpa.minReplicas }}
  maxReplicas: {{ .Values.gateway.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.gateway.hpa.targetCPU }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.gateway.hpa.targetMemory }}
{{- end }}
{{- if .Values.gateway.pdb.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "euno.fullname" . }}-gateway
  labels:
    {{- include "euno.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  minAvailable: {{ .Values.gateway.pdb.minAvailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: euno-gateway
      app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
