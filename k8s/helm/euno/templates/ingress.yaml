{{/*
Ingress resources for the Eunox platform services.
Controlled by the top-level ingress.enabled value.
*/}}
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "euno.fullname" . }}-gateway
  labels:
    {{- include "euno.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.gateway.host | quote }}
      http:
        paths:
          - path: {{ .Values.ingress.gateway.path | default "/" }}
            pathType: {{ .Values.ingress.gateway.pathType | default "Prefix" }}
            backend:
              service:
                name: {{ include "euno.fullname" . }}-gateway
                port:
                  number: {{ .Values.gateway.service.port }}
---
