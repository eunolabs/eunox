{{/*
api-key-minter Deployment
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "euno.fullname" . }}-minter
  labels:
    {{- include "euno.labels" . | nindent 4 }}
    app.kubernetes.io/component: minter
  {{- with .Values.minter.serviceAccountAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "euno.fullname" . }}-minter
  labels:
    {{- include "euno.labels" . | nindent 4 }}
    app.kubernetes.io/component: minter
spec:
  replicas: {{ .Values.minter.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: euno-minter
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: euno-minter
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: minter
        {{- with .Values.minter.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "euno.fullname" . }}-minter
      containers:
        - name: minter
          image: "{{ .Values.minter.image.repository }}:{{ .Values.minter.image.tag }}"
          imagePullPolicy: {{ .Values.minter.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.minter.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          envFrom:
            - configMapRef:
                name: {{ include "euno.fullname" . }}-minter-config
            {{- if .Values.minter.secretEnv }}
            - secretRef:
                name: {{ include "euno.fullname" . }}-minter-secret
            {{- end }}
          resources: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "euno.fullname" . }}-minter
  labels:
    {{- include "euno.labels" . | nindent 4 }}
    app.kubernetes.io/component: minter
spec:
  type: {{ .Values.minter.service.type }}
  ports:
    - name: http
      port: {{ .Values.minter.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: euno-minter
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "euno.fullname" . }}-minter-config
  labels:
    {{- include "euno.labels" . | nindent 4 }}
    app.kubernetes.io/component: minter
data:
  {{- range $key, $val := .Values.minter.env }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
{{- if .Values.minter.secretEnv }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "euno.fullname" . }}-minter-secret
  labels:
    {{- include "euno.labels" . | nindent 4 }}
    app.kubernetes.io/component: minter
type: Opaque
stringData:
  {{- range $key, $val := .Values.minter.secretEnv }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
{{- end }}
