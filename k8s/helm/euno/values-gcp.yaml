# Euno umbrella chart — GCP / GKE overrides
# ---------------------------------------------------------------------------
# Apply this file on top of the base values.yaml when deploying on Google
# Kubernetes Engine (GKE):
#
#   helm install euno ./k8s/helm/euno \
#     --namespace euno \
#     -f k8s/helm/euno/values.yaml \
#     -f k8s/helm/euno/values-gcp.yaml
#
# All secrets (AUDIT_LEDGER_HMAC_SECRET, ADMIN_API_KEY, REDIS_URL, etc.)
# should be sourced from GCP Secret Manager rather than supplied here.
# See docs/secrets-gcp.md for External Secrets Operator and Secret Manager
# Add-on wiring.
#
# See docs/deploy-gke.md for the full GKE deployment guide, including:
#   - Workload Identity Federation setup
#   - Artifact Registry image push script
#   - GKE Ingress + Google-managed SSL certificate configuration
#   - Cloud Monitoring / Security Command Center observability
# ---------------------------------------------------------------------------

# ── Container images — Artifact Registry ────────────────────────────────────
# Replace my-gcp-project and us-central1 with your project and region.
# Euno images are published to ghcr.io; push to Artifact Registry with the
# script in docs/deploy-gke.md §4.3 (push-images-to-artifact-registry.sh).
gateway:
  image:
    repository: us-central1-docker.pkg.dev/my-gcp-project/euno/tool-gateway
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  # ── Workload Identity annotation ─────────────────────────────────────────
  # Annotate the gateway ServiceAccount with the GCP service account email so
  # the pod can call Cloud KMS and Secret Manager via Workload Identity.
  # Replace with your actual service account (see docs/deploy-gke.md §3.4).
  serviceAccountAnnotations:
    iam.gke.io/gcp-service-account: "euno-gateway@my-gcp-project.iam.gserviceaccount.com"

  # ── Non-sensitive configuration ──────────────────────────────────────────
  env:
    NODE_ENV: production
    EUNO_DEPLOYMENT_TIER: multi-replica
    GATEWAY_AUDIENCE: tool-gateway
    ADMIN_HOST: "127.0.0.1"

    # Cloud KMS-backed audit evidence signing.
    # Set SIGNING_PROVIDER=gcp-cloudkms and supply the KMS key resource name.
    SIGNING_PROVIDER: gcp-cloudkms
    GCP_PROJECT_ID: "my-gcp-project"
    GCP_KMS_KEY_RESOURCE: "projects/my-gcp-project/locations/global/keyRings/euno/cryptoKeys/gateway-signing-key/cryptoKeyVersions/1"
    GCP_REGION: us-central1

    # Cross-chain anchor to GCS with retention policy (optional; SOC 2 CC7.4).
    # ENABLE_CROSS_CHAIN_ANCHOR: "true"
    # AUDIT_LEDGER_GCS_BUCKET: "euno-audit-anchor-prod"
    # (GCP_PROJECT_ID is already set above)

    # Secret store provider: uncomment to enable SDK-based Secret Manager
    # lookup at startup instead of relying on env vars or ESO/Add-on injection.
    # SECRET_STORE_PROVIDER: gcp-secret-manager
    # GCP_SECRET_AUDIT_LEDGER_HMAC_SECRET: "projects/my-gcp-project/secrets/euno-prod-audit-ledger-hmac-secret/versions/latest"
    # GCP_SECRET_ADMIN_API_KEY: "projects/my-gcp-project/secrets/euno-prod-gateway-admin-api-key/versions/latest"

  # ── Sensitive values ─────────────────────────────────────────────────────
  # When using ESO or the Secret Manager Add-on (recommended), set
  # existingSecret instead and leave secretEnv empty.
  # existingSecret: euno-gateway-secret
  secretEnv: {}

# ── capability-issuer ─────────────────────────────────────────────────────────
issuer:
  image:
    repository: us-central1-docker.pkg.dev/my-gcp-project/euno/capability-issuer
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  serviceAccountAnnotations:
    iam.gke.io/gcp-service-account: "euno-issuer@my-gcp-project.iam.gserviceaccount.com"

  env:
    NODE_ENV: production
    EUNO_DEPLOYMENT_TIER: multi-replica

    # Identity provider: GCP Cloud Identity / Firebase Auth.
    # See docs/issuer-idp-setup.md §4 for GCP Cloud Identity setup
    # and §11 for Google Workspace SCIM bridge.
    IDENTITY_PROVIDER: gcp-identity
    GCP_PROJECT_ID: "my-gcp-project"
    GCP_IDENTITY_AUDIENCE: "https://issuer.euno.example.com"

    # Token signing via Cloud KMS.
    SIGNING_PROVIDER: gcp-cloudkms
    GCP_KMS_KEY_RESOURCE: "projects/my-gcp-project/locations/global/keyRings/euno/cryptoKeys/issuer-signing-key/cryptoKeyVersions/1"

    # Schema initialisation — run once on first deploy.
    ISSUER_DB_SCHEMA_INIT: "true"

    # SCIM 2.0 provisioning (Google Workspace SCIM bridge).
    # See docs/issuer-idp-setup.md §11 for the full SCIM bridge guide.
    # ISSUER_SCIM_GROUP_ROLE_MAP: '{"EunoReaders":"reader","EunoWriters":"writer","EunoAdmins":"admin"}'

  # existingSecret: euno-issuer-secret
  secretEnv: {}

# ── api-key-minter ────────────────────────────────────────────────────────────
minter:
  image:
    repository: us-central1-docker.pkg.dev/my-gcp-project/euno/api-key-minter
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  env:
    NODE_ENV: production

  secretEnv: {}

# ── db-token-service ──────────────────────────────────────────────────────────
dbTokenService:
  image:
    repository: us-central1-docker.pkg.dev/my-gcp-project/euno/db-token-service
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  env:
    NODE_ENV: production
    DB_TOKENS_ENABLED: "false"
    # GCP_PROJECT_ID: my-gcp-project   # required when DB_TOKENS_ENABLED=true

  secretEnv: {}

# ── storage-grant-service ─────────────────────────────────────────────────────
storageGrantService:
  image:
    repository: us-central1-docker.pkg.dev/my-gcp-project/euno/storage-grant-service
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  env:
    NODE_ENV: production
    STORAGE_GRANTS_ENABLED: "false"
    # GCP_PROJECT_ID: my-gcp-project   # required when STORAGE_GRANTS_ENABLED=true

  secretEnv: {}

# ── posture-emitter ───────────────────────────────────────────────────────────
postureEmitter:
  image:
    repository: us-central1-docker.pkg.dev/my-gcp-project/euno/posture-emitter
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  persistence:
    enabled: true
    size: 1Gi
    storageClass: premium-rwo   # GKE premium persistent disk (SSD)
    mountPath: /data

  env:
    NODE_ENV: production
    POSTURE_EMITTER_ENABLED: "false"
    POSTURE_EMITTER_PLUGINS: "stdout"
    POSTURE_DURABLE_QUEUE_PATH: "/data/posture.db"
    # Enable Security Command Center plugin when POSTURE_EMITTER_ENABLED=true:
    # POSTURE_EMITTER_PLUGINS: "security-command-center"
    # GCP_PROJECT_ID: my-gcp-project
    # GCP_SCC_SOURCE_NAME: "organizations/123456789/sources/987654321"

  secretEnv: {}

# ── Bitnami sub-charts (disabled — use Cloud SQL + Memorystore in production) ─
postgresql:
  enabled: false
  # Use Cloud SQL for PostgreSQL in production:
  #   AUDIT_LEDGER_PG_URL and ISSUER_DB_URL should point at Cloud SQL
  #   endpoints (via the Cloud SQL Auth Proxy sidecar or direct IP).
  # Minimum Cloud SQL configuration:
  #   database version: POSTGRES_14 or POSTGRES_15
  #   storage: SSD, 20 GiB minimum
  #   backup: automated daily backups enabled
  #   deletion protection: enabled
  #   high availability: enabled (production)

redis:
  enabled: false
  # Use Memorystore for Redis in production:
  #   REDIS_URL should point at the Memorystore instance's IP/port.
  # Minimum Memorystore configuration:
  #   tier: STANDARD_HA (production) or BASIC (staging)
  #   version: redis_7_0
  #   transit encryption: TLS enabled
  #   auth: enabled (set in REDIS_URL as rediss://:<auth-string>@<ip>:6380)
