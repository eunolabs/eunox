# Eunox umbrella chart — Azure / AKS overrides
# ---------------------------------------------------------------------------
# Apply this file on top of the base values.yaml when deploying on Azure
# Kubernetes Service (AKS):
#
#   helm install euno ./k8s/helm/euno \
#     --namespace euno \
#     -f k8s/helm/euno/values.yaml \
#     -f k8s/helm/euno/values-azure.yaml
#
# All secrets (AUDIT_LEDGER_HMAC_SECRET, ADMIN_API_KEY, REDIS_URL, etc.)
# should be sourced from Azure Key Vault rather than supplied here.
# See docs/DEPLOYMENT.md §"Stage-5 on-prem deployment" and
# docs/secrets-gcp.md (substitute Azure equivalents) for External Secrets
# Operator and Azure Key Vault Provider for Secrets Store CSI Driver wiring.
#
# See docs/DEPLOYMENT.md and infra/bicep/main.bicep for the full AKS
# deployment guide, including:
#   - Azure Workload Identity Federation setup
#   - Azure Container Registry (ACR) image push configuration
#   - Application Gateway Ingress Controller + App Service certificate
#   - Azure Monitor / Microsoft Sentinel observability
# ---------------------------------------------------------------------------

# ── Container images — Azure Container Registry ───────────────────────────────
# Replace myacr and adjust the tag.
# Eunox images are published to ghcr.io; push to ACR with:
#   az acr import --name myacr --source ghcr.io/edgeobs/eunox/gateway:1.0.0 \
#     --image eunox/gateway:1.0.0
gateway:
  image:
    repository: myacr.azurecr.io/eunox/gateway
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  # ── Azure Workload Identity annotation ───────────────────────────────────
  # Annotate the gateway ServiceAccount with the user-assigned managed identity
  # client ID so the pod can call Key Vault and Azure Monitor without a
  # client secret or certificate.
  # Replace with your actual managed identity client ID (see infra/bicep/).
  serviceAccountAnnotations:
    azure.workload.identity/client-id: "00000000-0000-0000-0000-000000000000"

  # ── Pod identity label (required by Azure Workload Identity webhook) ──────
  podLabels:
    azure.workload.identity/use: "true"

  # ── Non-sensitive configuration ──────────────────────────────────────────
  env:
    NODE_ENV: production
    EUNO_DEPLOYMENT_TIER: multi-replica
    GATEWAY_AUDIENCE: gateway
    ADMIN_HOST: "127.0.0.1"

    # Azure Key Vault-backed audit evidence signing.
    # Set SIGNING_PROVIDER=azure-keyvault and supply the Key Vault URL.
    SIGNING_PROVIDER: azure-keyvault
    AZURE_KEYVAULT_URL: "https://my-euno-keyvault.vault.azure.net/"
    AZURE_KEYVAULT_KEY_NAME: "capability-signing-key"

    # Cross-chain anchor to Azure Blob Storage (optional; SOC 2 CC7.4).
    # ENABLE_CROSS_CHAIN_ANCHOR: "true"
    # AUDIT_LEDGER_OBJECT_STORE_PROVIDER: azure-blob
    # AUDIT_LEDGER_AZURE_CONTAINER: "euno-audit-anchor-prod"
    # AUDIT_LEDGER_AZURE_ACCOUNT_NAME: "myeunosa"

    # Secret store provider: uncomment to enable SDK-based Key Vault lookup
    # at startup instead of relying on env vars or ESO/CSI injection.
    # Requires AZURE_KEYVAULT_URL (already set above); uses Managed Identity.
    # SECRET_STORE_PROVIDER: azure-keyvault

  # ── Sensitive values ─────────────────────────────────────────────────────
  # When using ESO (External Secrets Operator) or the Azure Key Vault
  # Provider for Secrets Store CSI Driver (recommended), set existingSecret
  # and leave secretEnv empty.
  # existingSecret: euno-gateway-secret
  secretEnv: {}

# ── issuer ─────────────────────────────────────────────────────────
issuer:
  image:
    repository: myacr.azurecr.io/eunox/issuer
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  serviceAccountAnnotations:
    azure.workload.identity/client-id: "00000000-0000-0000-0000-000000000000"

  podLabels:
    azure.workload.identity/use: "true"

  env:
    NODE_ENV: production
    EUNO_DEPLOYMENT_TIER: multi-replica

    # Identity provider: Azure Active Directory (Entra ID).
    # See docs/issuer-idp-setup.md §1 for Azure AD setup and §9 for SCIM.
    IDENTITY_PROVIDER: azure-ad
    AZURE_AD_TENANT_ID: "00000000-0000-0000-0000-000000000000"
    AZURE_AD_CLIENT_ID: "00000000-0000-0000-0000-000000000000"

    # Token signing via Azure Key Vault.
    SIGNING_PROVIDER: azure-keyvault
    AZURE_KEYVAULT_URL: "https://my-euno-keyvault.vault.azure.net/"
    AZURE_KEYVAULT_KEY_NAME: "capability-signing-key"

    # Schema initialisation — run once on first deploy.
    ISSUER_DB_SCHEMA_INIT: "true"

    # SCIM 2.0 provisioning (Entra ID SCIM endpoint).
    # See docs/issuer-idp-setup.md §9 for the full SCIM bridge guide.
    # ISSUER_SCIM_GROUP_ROLE_MAP: '{"EunoxReaders":"reader","EunoxWriters":"writer","EunoxAdmins":"admin"}'

  # existingSecret: euno-issuer-secret
  secretEnv: {}

# ── minter ────────────────────────────────────────────────────────────
minter:
  image:
    repository: myacr.azurecr.io/eunox/minter
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  serviceAccountAnnotations:
    azure.workload.identity/client-id: "00000000-0000-0000-0000-000000000000"

  podLabels:
    azure.workload.identity/use: "true"

  env:
    NODE_ENV: production

  secretEnv: {}

# ── db-token-service ──────────────────────────────────────────────────────────
dbTokenService:
  image:
    repository: myacr.azurecr.io/euno/db-token-service
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  env:
    NODE_ENV: production
    DB_TOKENS_ENABLED: "false"
    # AZURE_KEYVAULT_URL: https://my-euno-keyvault.vault.azure.net/   # required when DB_TOKENS_ENABLED=true

  secretEnv: {}

# ── storage-grant-service ─────────────────────────────────────────────────────
storageGrantService:
  image:
    repository: myacr.azurecr.io/euno/storage-grant-service
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  env:
    NODE_ENV: production
    STORAGE_GRANTS_ENABLED: "false"
    # AZURE_KEYVAULT_URL: https://my-euno-keyvault.vault.azure.net/   # required when STORAGE_GRANTS_ENABLED=true

  secretEnv: {}

# ── posture-emitter ───────────────────────────────────────────────────────────
postureEmitter:
  image:
    repository: myacr.azurecr.io/euno/posture-emitter
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  serviceAccountAnnotations:
    azure.workload.identity/client-id: "00000000-0000-0000-0000-000000000000"

  podLabels:
    azure.workload.identity/use: "true"

  persistence:
    enabled: true
    size: 1Gi
    storageClass: managed-csi   # Azure Disk (Standard SSD) via AKS CSI driver
    mountPath: /data

  env:
    NODE_ENV: production
    POSTURE_EMITTER_ENABLED: "false"
    POSTURE_EMITTER_PLUGINS: "stdout"
    POSTURE_DURABLE_QUEUE_PATH: "/data/posture.db"
    # Enable Microsoft Sentinel plugin when POSTURE_EMITTER_ENABLED=true:
    # POSTURE_EMITTER_PLUGINS: "sentinel"
    # AZURE_SENTINEL_WORKSPACE_ID: "00000000-0000-0000-0000-000000000000"
    # AZURE_SENTINEL_WORKSPACE_KEY: "<primary-key>"

  secretEnv: {}

# ── Bitnami sub-charts (disabled — use Azure Database + Azure Cache in production) ─
postgresql:
  enabled: false
  # Use Azure Database for PostgreSQL (Flexible Server) in production:
  #   AUDIT_LEDGER_PG_URL and ISSUER_DB_URL should point at the Flexible Server
  #   endpoint (private endpoint recommended; SSL required).
  # Minimum configuration:
  #   SKU: Standard_D2ds_v4 or higher (2 vCPU, 8 GiB RAM)
  #   storage: 32 GiB SSD
  #   backup: automated backups enabled (7-day retention)
  #   high availability: zone-redundant (production)
  #   SSL enforcement: enabled

redis:
  enabled: false
  # Use Azure Cache for Redis (Premium tier) in production:
  #   REDIS_URL should point at the Azure Cache for Redis TLS endpoint.
  # Minimum configuration:
  #   SKU: Premium P1 (6 GiB)
  #   TLS: enabled (port 6380)
  #   auth: enabled (set in REDIS_URL as rediss://:<auth-key>@<host>:6380)
  #   geo-replication: optional for disaster recovery
