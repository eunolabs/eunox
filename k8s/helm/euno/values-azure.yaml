# Euno umbrella chart — Azure / AKS overrides
# ---------------------------------------------------------------------------
# Apply this file on top of the base values.yaml when deploying on Azure
# Kubernetes Service (AKS):
#
#   helm install euno ./k8s/helm/euno \
#     --namespace euno \
#     -f k8s/helm/euno/values.yaml \
#     -f k8s/helm/euno/values-azure.yaml
#
# All secrets (AUDIT_LEDGER_HMAC_SECRET, ADMIN_API_KEY, REDIS_URL, etc.)
# should be sourced from Azure Key Vault rather than supplied here.
# See docs/secrets-azure.md for External Secrets Operator and Azure Key Vault
# Secrets Provider (CSI) wiring.
#
# See docs/deploy-aks.md for the full AKS deployment guide, including:
#   - Workload Identity Federation (azure.workload.identity) setup
#   - Azure Container Registry (ACR) image push script
#   - Azure Application Gateway Ingress Controller (AGIC) setup
#   - Azure Monitor / Microsoft Defender for Cloud observability
# ---------------------------------------------------------------------------

# ── Container images — Azure Container Registry ───────────────────────────────
# Replace myeunoregistry.azurecr.io with your ACR login server.
# Euno images are published to ghcr.io; push to ACR with the script in
# docs/deploy-aks.md §4.2 (push-images-to-acr.sh).
gateway:
  image:
    repository: myeunoregistry.azurecr.io/euno/tool-gateway
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  # ── Workload Identity annotation ─────────────────────────────────────────
  # Annotate the gateway ServiceAccount with the Azure Managed Identity
  # client ID so the pod can call Key Vault and ACR via Workload Identity.
  # Replace with your actual managed identity client ID
  # (see docs/deploy-aks.md §3.3).
  serviceAccountAnnotations:
    azure.workload.identity/client-id: "00000000-0000-0000-0000-000000000000"

  # ── Non-sensitive configuration ──────────────────────────────────────────
  env:
    NODE_ENV: production
    EUNO_DEPLOYMENT_TIER: multi-replica
    GATEWAY_AUDIENCE: tool-gateway
    ADMIN_HOST: "127.0.0.1"

    # Azure Key Vault-backed audit evidence signing.
    # Set SIGNING_PROVIDER=azure-keyvault and supply the Key Vault URI and
    # key name. The pod identity (Workload Identity above) must have
    # "Key Vault Crypto User" RBAC role on the key.
    SIGNING_PROVIDER: azure-keyvault
    AZURE_KEYVAULT_URI: "https://my-euno-kv.vault.azure.net/"
    AZURE_KEYVAULT_KEY_NAME: "capability-signing-key"
    AZURE_TENANT_ID: "00000000-0000-0000-0000-000000000000"

    # Cross-chain anchor to Azure Blob Storage with immutability policy
    # (optional; enables SOC 2 CC7.4).
    # ENABLE_CROSS_CHAIN_ANCHOR: "true"
    # AUDIT_LEDGER_AZURE_STORAGE_ACCOUNT: "myeunoauditstorage"
    # AUDIT_LEDGER_AZURE_CONTAINER: "audit-anchor"

    # Secret store provider: uncomment to enable SDK-based Key Vault
    # lookup at startup instead of relying on env vars or ESO/CSI injection.
    # SECRET_STORE_PROVIDER: azure-keyvault
    # AZURE_KEYVAULT_URI is already set above.

  # ── Sensitive values ─────────────────────────────────────────────────────
  # When using ESO or the Azure Key Vault Secrets Provider (recommended),
  # set existingSecret instead and leave secretEnv empty.
  # existingSecret: euno-gateway-secret
  secretEnv: {}

  # ── Pod labels required for Workload Identity ────────────────────────────
  podLabels:
    azure.workload.identity/use: "true"

# ── capability-issuer ─────────────────────────────────────────────────────────
issuer:
  image:
    repository: myeunoregistry.azurecr.io/euno/capability-issuer
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  serviceAccountAnnotations:
    azure.workload.identity/client-id: "00000000-0000-0000-0000-000000000001"

  podLabels:
    azure.workload.identity/use: "true"

  env:
    NODE_ENV: production
    EUNO_DEPLOYMENT_TIER: multi-replica

    # Identity provider: Microsoft Entra ID (formerly Azure AD).
    # See docs/issuer-idp-setup.md §5 for Entra ID setup
    # and §12 for Azure AD SCIM provisioning.
    IDENTITY_PROVIDER: azure-ad
    AZURE_TENANT_ID: "00000000-0000-0000-0000-000000000000"
    AZURE_AD_CLIENT_ID: "<entra-app-client-id>"

    # Token signing via Azure Key Vault.
    SIGNING_PROVIDER: azure-keyvault
    AZURE_KEYVAULT_URI: "https://my-euno-kv.vault.azure.net/"
    AZURE_KEYVAULT_KEY_NAME: "issuer-signing-key"

    # Schema initialisation — run once on first deploy.
    ISSUER_DB_SCHEMA_INIT: "true"

    # SCIM 2.0 provisioning (Azure AD Enterprise Application).
    # See docs/issuer-idp-setup.md §12 for the full SCIM bridge guide.
    # ISSUER_SCIM_GROUP_ROLE_MAP: '{"EunoReaders":"reader","EunoWriters":"writer","EunoAdmins":"admin"}'

  # existingSecret: euno-issuer-secret
  secretEnv: {}

# ── api-key-minter ────────────────────────────────────────────────────────────
minter:
  image:
    repository: myeunoregistry.azurecr.io/euno/api-key-minter
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  env:
    NODE_ENV: production

  secretEnv: {}

# ── db-token-service ──────────────────────────────────────────────────────────
dbTokenService:
  image:
    repository: myeunoregistry.azurecr.io/euno/db-token-service
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  env:
    NODE_ENV: production
    DB_TOKENS_ENABLED: "false"
    # AZURE_TENANT_ID: "00000000-0000-0000-0000-000000000000"  # required when DB_TOKENS_ENABLED=true

  secretEnv: {}

# ── storage-grant-service ─────────────────────────────────────────────────────
storageGrantService:
  image:
    repository: myeunoregistry.azurecr.io/euno/storage-grant-service
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  env:
    NODE_ENV: production
    STORAGE_GRANTS_ENABLED: "false"
    # AZURE_TENANT_ID: "00000000-0000-0000-0000-000000000000"  # required when STORAGE_GRANTS_ENABLED=true

  secretEnv: {}

# ── posture-emitter ───────────────────────────────────────────────────────────
postureEmitter:
  image:
    repository: myeunoregistry.azurecr.io/euno/posture-emitter
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  persistence:
    enabled: true
    size: 1Gi
    storageClass: managed-premium   # Azure Premium SSD (LRS)
    mountPath: /data

  env:
    NODE_ENV: production
    POSTURE_EMITTER_ENABLED: "false"
    POSTURE_EMITTER_PLUGINS: "stdout"
    POSTURE_DURABLE_QUEUE_PATH: "/data/posture.db"
    # Enable Microsoft Defender for Cloud plugin when POSTURE_EMITTER_ENABLED=true:
    # POSTURE_EMITTER_PLUGINS: "azure-defender"
    # AZURE_TENANT_ID: "00000000-0000-0000-0000-000000000000"
    # AZURE_SUBSCRIPTION_ID: "00000000-0000-0000-0000-000000000002"

  secretEnv: {}

# ── Bitnami sub-charts (disabled — use Azure Database + Azure Cache in production) ─
postgresql:
  enabled: false
  # Use Azure Database for PostgreSQL – Flexible Server in production:
  #   AUDIT_LEDGER_PG_URL and ISSUER_DB_URL should point at the Flexible
  #   Server endpoint (use Azure AD authentication or connection string).
  # Minimum Flexible Server configuration:
  #   compute tier: Burstable (dev) or General Purpose (production)
  #   storage: P10 SSD (128 GiB) minimum for production
  #   backups: geo-redundant backups enabled (retention: 7 days)
  #   high availability: zone-redundant (production)

redis:
  enabled: false
  # Use Azure Cache for Redis in production:
  #   REDIS_URL should point at the Azure Cache hostname and SSL port.
  # Minimum Azure Cache configuration:
  #   tier: Standard (staging) or Premium (production)
  #   version: Redis 7
  #   TLS: enabled (port 6380)
  #   Microsoft Entra authentication: enabled (recommended over access keys)
