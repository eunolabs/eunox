# Eunox umbrella chart — top-level values
# ---------------------------------------------------------------------------
# Each service is configured through two separate maps:
#
#   <service>.env        — non-sensitive configuration, stored in a ConfigMap.
#   <service>.secretEnv  — sensitive values (credentials, keys, tokens).
#                          Stored in a Kubernetes Secret.  In production,
#                          populate this via Helm secrets (e.g. helm-secrets,
#                          Vault, or --set-string from a CI secret store) or
#                          supply existingSecret instead.
#
# Minimal production override example:
#
#   gateway:
#     env:
#       NODE_ENV: production
#       EUNO_DEPLOYMENT_TIER: multi-replica
#       GATEWAY_AUDIENCE: my-org
#       AUDIT_LEDGER_BACKEND: per-replica-postgres
#       ADMIN_HOST: "127.0.0.1"
#     secretEnv:
#       REDIS_URL: "rediss://euno:secret@redis.internal:6380"
#       AUDIT_LEDGER_PG_URL: "postgres://euno_audit:secret@db.internal:5432/euno"
#       AUDIT_LEDGER_HMAC_SECRET: "<64-hex-chars>"
#       ADMIN_API_KEY: "<strong-admin-key>"
#
#   issuer:
#     env:
#       NODE_ENV: production
#       IDENTITY_PROVIDER: azure-ad
#       AZURE_AD_TENANT_ID: "<tenant>"
#       AZURE_AD_CLIENT_ID: "<client>"
#       SIGNING_PROVIDER: azure-keyvault
#       AZURE_KEYVAULT_URL: "https://your-vault.vault.azure.net/"
#       ISSUER_DB_SCHEMA_INIT: "true"
#       EUNO_DEPLOYMENT_TIER: multi-replica
#     secretEnv:
#       ISSUER_DB_URL: "postgres://euno:secret@db.internal:5432/euno"
#       ISSUER_SCIM_BEARER_TOKEN: "<scim-token>"
#
# See docs/DEPLOYMENT.md §"Stage-5 on-prem deployment" for the full
# production installation guide.

# ── gateway ─────────────────────────────────────────────────────────────
gateway:
  replicaCount: 2
  image:
    repository: ghcr.io/edgeobs/eunox/gateway
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3002
    adminPort: 3003
  serviceAccountAnnotations: {}
  podLabels: {}
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPU: 70
    targetMemory: 80
  pdb:
    enabled: true
    minAvailable: 1
  # Non-sensitive configuration — stored in a ConfigMap.
  env:
    NODE_ENV: production
    EUNO_DEPLOYMENT_TIER: multi-replica
    GATEWAY_AUDIENCE: gateway
    ADMIN_HOST: "127.0.0.1"
  # Sensitive values — stored in a Kubernetes Secret.
  # Override these at install time via --set gateway.secretEnv.KEY=value or
  # via a Helm secrets plugin / external secret manager.
  secretEnv: {}
  #   REDIS_URL: ""
  #   AUDIT_LEDGER_PG_URL: ""
  #   AUDIT_LEDGER_HMAC_SECRET: ""
  #   ADMIN_API_KEY: ""

# ── issuer ─────────────────────────────────────────────────────────
issuer:
  replicaCount: 2
  image:
    repository: ghcr.io/edgeobs/eunox/issuer
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3001
  serviceAccountAnnotations: {}
  podLabels: {}
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  pdb:
    enabled: true
    minAvailable: 1
  env:
    NODE_ENV: production
    EUNO_DEPLOYMENT_TIER: multi-replica
  secretEnv: {}
  #   ISSUER_DB_URL: ""
  #   ISSUER_SCIM_BEARER_TOKEN: ""

# ── minter ─────────────────────────────────────────────────────────
minter:
  replicaCount: 2
  image:
    repository: ghcr.io/edgeobs/eunox/minter
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3004
  serviceAccountAnnotations: {}
  podLabels: {}
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  pdb:
    enabled: true
    minAvailable: 1
  env:
    NODE_ENV: production
  secretEnv: {}
  #   MINTER_ADMIN_API_KEY: ""
  #   MINTER_PEPPER_HEX: ""
  #   MINTER_AUDIT_DB_URL: ""
  #   MINTER_API_KEY_DB_URL: ""

# ── db-token-service ─────────────────────────────────────────────────────────
dbTokenService:
  replicaCount: 1
  image:
    repository: ghcr.io/edgeobs/euno/db-token-service
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 5050
  env:
    NODE_ENV: production
    DB_TOKENS_ENABLED: "false"
  secretEnv: {}
  #   AWS_SECRET_ACCESS_KEY: ""
  #   AWS_SESSION_TOKEN: ""

# ── storage-grant-service ─────────────────────────────────────────────────────
storageGrantService:
  replicaCount: 1
  image:
    repository: ghcr.io/edgeobs/euno/storage-grant-service
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 5051
  env:
    NODE_ENV: production
    STORAGE_GRANTS_ENABLED: "false"
  secretEnv: {}
  #   AWS_SECRET_ACCESS_KEY: ""
  #   AWS_SESSION_TOKEN: ""

# ── posture-emitter ──────────────────────────────────────────────────────────
postureEmitter:
  # WARNING: must be 1 — SQLite durable queue is single-writer.
  # The chart will fail to render if replicaCount != 1.
  replicaCount: 1
  image:
    repository: ghcr.io/edgeobs/euno/posture-emitter
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  serviceAccountAnnotations: {}
  podLabels: {}
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""
    mountPath: /data
  env:
    NODE_ENV: production
    POSTURE_EMITTER_ENABLED: "false"
    POSTURE_EMITTER_PLUGINS: "stdout"
    POSTURE_DURABLE_QUEUE_PATH: "/data/posture.db"
  secretEnv: {}
  #   AZURE_SUBSCRIPTION_ID: ""    # required for defender-cspm plugin
  #   AWS_SECRET_ACCESS_KEY: ""    # required for security-hub plugin
  #   GCP_SCC_SOURCE_NAME: ""      # required for scc plugin

# ── Optional Postgres (bitnami — evaluation only; disabled by default) ───────
postgresql:
  enabled: false
  auth:
    database: euno
    username: euno
    # password: changeme  # override in production; do not commit passwords

# ── Optional Redis (bitnami — evaluation only; disabled by default) ──────────
redis:
  enabled: false
  auth:
    enabled: true
    # password: changeme  # override in production; do not commit passwords
