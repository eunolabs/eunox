#
# demo/opa-comparison/docker-compose.yml
#
# Three services:
#   server     — MCP tool server exposing all scenario tools (port 9090)
#   opa        — OPA policy server with scenario Rego loaded (port 8181)
#   eunox-mcp  — eunox enforcement proxy in front of server (port 3000)
#
# Set EUNOX_MANIFEST to select the active scenario manifest:
#   EUNOX_MANIFEST=scenario2.yaml docker compose up
#
# Normally managed via the scenario-* Makefile targets rather than directly.

services:

  # ── tool server ────────────────────────────────────────────────────────────
  # MCP tool server that exposes all tools used across scenarios 1–3.
  server:
    build:
      context: ../..
      dockerfile: demo/opa-comparison/server/Dockerfile
    ports:
      - "9090:9090"
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          wget -qO- --post-data='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{}}' \
            --header='Content-Type: application/json' \
            http://localhost:9090/mcp > /dev/null && echo ok
      interval: 5s
      timeout: 3s
      retries: 10

  # ── OPA ────────────────────────────────────────────────────────────────────
  # Open Policy Agent loaded with all three scenario policies.
  # Policies are mounted read-only from ./opa-policies/.
  #
  # Query pattern:
  #   curl -s http://localhost:8181/v1/data/scenario1/allow \
  #     -d '{"input":{"tool":"read_credentials"}}' -H 'Content-Type: application/json'
  opa:
    image: openpolicyagent/opa:0.70.0-debug
    command:
      - run
      - --server
      - --addr=:8181
      - --log-level=error
      - /policies
    volumes:
      - ./opa-policies:/policies:ro
    ports:
      - "8181:8181"
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          wget -qO- http://localhost:8181/health > /dev/null && echo ok
      interval: 5s
      timeout: 3s
      retries: 10

  # ── eunox-mcp ──────────────────────────────────────────────────────────────
  # Policy-enforcement proxy.  Set EUNOX_MANIFEST to switch scenarios without
  # rebuilding (default: scenario1.yaml).
  #
  # Run as root so it can write the audit log to the bind-mounted ./audit/ dir.
  # Demo only — production deployments use the nonroot (UID 65534) default.
  eunox-mcp:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.mcp
    user: "0:0"
    command:
      - proxy
      - --transport=http
      - --bind=0.0.0.0
      - --unsafe-bind-all
      - --upstream-url=http://server:9090
      - --policy=/manifests/${EUNOX_MANIFEST:-scenario1.yaml}
      - --audit-log=/audit/audit.jsonl
    volumes:
      - ./manifests:/manifests:ro
      - ./audit:/audit
    ports:
      - "3000:3000"
    depends_on:
      server:
        condition: service_healthy
      opa:
        condition: service_healthy
    restart: unless-stopped
