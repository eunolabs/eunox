#
# Scenario 3 — Short-lived cloud token reuse
#
# Each cloud-token tool is limited to a single call per hour.  A legitimate
# agent requests the token once; a misbehaving or compromised agent cannot
# accumulate a pool of live credentials by looping.
name: opa-comparison-scenario3
version: "1.0"

capabilities:
  - resource: get_aws_token
    actions: [call]
    conditions:
      - type: maxCalls
        count: 1
        windowSeconds: 3600

  - resource: get_github_token
    actions: [call]
    conditions:
      - type: maxCalls
        count: 1
        windowSeconds: 3600
