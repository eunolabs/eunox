#
# Scenario 1 — Credential exfiltration
#
# An agent may call read_credentials and write_external, but only ONCE each
# per rolling hour.  A second call is denied — even though the OPA policy
# above would have allowed it.
name: opa-comparison-scenario1
version: "1.0"

capabilities:
  - resource: read_credentials
    actions: [call]
    conditions:
      - type: maxCalls
        count: 1
        windowSeconds: 3600

  - resource: write_external
    actions: [call]
    conditions:
      - type: maxCalls
        count: 1
        windowSeconds: 3600
