#
# demo/docker-compose.yml — three-service demo stack for eunox-mcp.
#
# Quick start (from repo root):
#   make -C demo up
#   make -C demo allow    # → allowed tool call
#   make -C demo deny     # → policy denial
#   make -C demo audit    # → tail the audit log
#
# For JWT-mode (manifest + IdP-issued capability claims):
#   make -C demo up-jwt
#   make -C demo jwt       # → print a test JWT from Keycloak
#   make -C demo jwt-allow # → JWT-authenticated allowed call
#   make -C demo jwt-deny  # → denied by JWT capability

services:

  # ── mock-mcp-server ────────────────────────────────────────────────
  # Minimal MCP Streamable HTTP server that exposes three tools:
  # read_file, write_file, query_db.  Returns deterministic fake
  # responses — purpose-built for policy enforcement demos.
  mock-mcp-server:
    build:
      context: ..
      dockerfile: demo/mock-mcp-server/Dockerfile
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      # POST initialize; healthy when the server returns 200.
      test:
        - "CMD-SHELL"
        - |
          wget -qO- --post-data='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{}}' \
            --header='Content-Type: application/json' \
            http://localhost:8080/mcp > /dev/null && echo ok
      interval: 5s
      timeout: 3s
      retries: 10

  # ── keycloak ───────────────────────────────────────────────────────
  # Keycloak pre-seeded with the eunox-demo realm.  The demo-agent
  # client uses client-credentials flow and carries eunox.capabilities
  # claims in every access token (JWT mode only; run `make jwt`).
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command:
      - start-dev
      - --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    ports:
      - "8081:8080"
    restart: unless-stopped
    healthcheck:
      # bash is available in the Keycloak UBI image and supports /dev/tcp.
      # A successful TCP handshake on port 8080 is sufficient: Keycloak only
      # begins accepting connections *after* realm import completes, so
      # connectivity implies the eunox-demo realm is ready.
      # CMD-SHELL is run with bash explicitly (/dev/tcp is a bash-only feature
      # not available in the POSIX /bin/sh that CMD-SHELL uses by default).
      test:
        - "CMD-SHELL"
        - "bash -c 'exec 6<>/dev/tcp/localhost/8080'"
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  # ── eunox-mcp ──────────────────────────────────────────────────────
  # Policy-enforcement proxy in manifest-only mode.
  # Run `make up-jwt` to start in JWT + manifest intersection mode.
  eunox-mcp:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.mcp
    # Run as root so it can write the audit log to the bind-mounted ./audit/ dir.
    # Demo only — production deployments use the nonroot (UID 65534) default.
    user: "0:0"
    command:
      - proxy
      - --transport=http
      - --bind=0.0.0.0
      - --unsafe-bind-all
      - --upstream-url=http://mock-mcp-server:8080
      - --policy=/demo/manifest.yaml
      - --audit-log=/audit/audit.jsonl
      - --audit-key-path=/audit/audit.key
    volumes:
      - ./manifest.yaml:/demo/manifest.yaml:ro
      - ./audit:/audit
    ports:
      - "3000:3000"
    depends_on:
      mock-mcp-server:
        condition: service_healthy
    restart: unless-stopped
