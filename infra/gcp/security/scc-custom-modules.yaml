# Security Command Center custom modules — Euno Sprint-1 OBS parity
#
# These custom modules teach SCC to surface Euno-specific findings derived
# from the Pub/Sub topic populated by the Cloud Monitoring alert policies
# in `cloud-monitoring-alerts.tf`.  They are the GCP parity of the
# AWS Security Hub insights in `../../aws/security/security-hub-insights.json`
# and the Microsoft Sentinel rules in `infra/sentinel/analytic-rules.json`.
#
# Apply with — one create-call per entry under `modules:`:
#
#   for i in $(seq 0 4); do
#     yq ".modules[$i]" infra/gcp/security/scc-custom-modules.yaml > /tmp/m.yaml
#     gcloud scc custom-modules sha create \
#       --organization=$ORG_ID \
#       --display-name="$(yq '.displayName' /tmp/m.yaml)" \
#       --custom-config-from-file=/tmp/m.yaml
#   done
#
# Requires SCC Premium tier.  If your project does not have SCC Premium,
# the same coverage is achieved by the alert policies in
# `cloud-monitoring-alerts.tf` plus the Pub/Sub topic provisioned in
# `infra/terraform/gcp/main.tf` (var.enable_scc_notification = true).

modules:
  - displayName: "Euno - Capability denial spike"
    description: >
      Five or more capability-token denials within five minutes from the
      same agent or session.  Possible prompt-injection or runaway agent.
    severity: HIGH
    category: EUNO_DENIAL_SPIKE
    customConfig:
      predicate:
        # Triggered when the corresponding alert policy fires.
        expression: |
          resource.type == "k8s_container" &&
          (jsonPayload.message.contains("Action denied") ||
           jsonPayload.message.contains("AUTHORIZATION_FAILED") ||
           jsonPayload.message.contains("INVALID_TOKEN"))
      resourceSelector:
        resourceTypes:
          - k8s_container
      recommendation: >
        Inspect the offending sessionId via `kubectl logs`, revoke the
        capability via the admin API, and review the prompt for injection.

  - displayName: "Euno - Write attempt from a read-only session"
    description: >
      An agent issued only read scopes attempted a write/delete/update/create.
    severity: HIGH
    category: EUNO_WRITE_IN_READONLY
    customConfig:
      predicate:
        expression: |
          jsonPayload.logType == "audit" &&
          jsonPayload.decision == "deny" &&
          (jsonPayload.action == "write" || jsonPayload.action == "delete" ||
           jsonPayload.action == "update" || jsonPayload.action == "create")
      resourceSelector:
        resourceTypes: ["k8s_container"]

  - displayName: "Euno - Burst of invalid capability tokens"
    description: >
      More than 20 invalid-signature or expired-token errors in 5 minutes.
    severity: MEDIUM
    category: EUNO_INVALID_TOKEN_BURST
    customConfig:
      predicate:
        expression: |
          jsonPayload.message.contains("INVALID_TOKEN") ||
          jsonPayload.message.contains("EXPIRED_TOKEN") ||
          jsonPayload.message.contains("invalid signature")
      resourceSelector:
        resourceTypes: ["k8s_container"]

  - displayName: "Euno - Kill switch activated"
    description: >
      Operational event: an admin activated the kill switch.
    severity: MEDIUM
    category: EUNO_KILL_SWITCH
    customConfig:
      predicate:
        expression: |
          jsonPayload.message.contains("Kill switch activated") ||
          jsonPayload.message.contains("KILL_ALL_AGENTS") ||
          jsonPayload.message.contains("kill switch enabled")
      resourceSelector:
        resourceTypes: ["k8s_container"]

  - displayName: "Euno - Token revocation spike"
    description: >
      More than 10 admin-API token revocations in 5 minutes.
    severity: MEDIUM
    category: EUNO_TOKEN_REVOCATION_SPIKE
    customConfig:
      predicate:
        expression: |
          jsonPayload.message.contains("Token revoked via admin API")
      resourceSelector:
        resourceTypes: ["k8s_container"]

# ---------------------------------------------------------------------------
# Chronicle YARA-L parity (optional)
# ---------------------------------------------------------------------------
# Customers using Chronicle SIEM in addition to SCC can mirror the same
# detections as YARA-L 2.0 rules.  A minimal example for the denial-spike
# rule:
#
#   rule euno_denial_spike {
#     meta:
#       author = "Euno OBS"
#       severity = "High"
#     events:
#       $e.metadata.product_name = "k8s_container" and
#       (
#         $e.principal.process.command_line = /Action denied/ nocase or
#         $e.principal.process.command_line = /AUTHORIZATION_FAILED/ nocase or
#         $e.principal.process.command_line = /INVALID_TOKEN/ nocase
#       )
#     match:
#       $e.principal.user.userid over 5m
#     condition:
#       #e >= 5
#   }
#
# Build the remaining four rules by substituting the message patterns from
# the corresponding `cloud-logging-queries.json` filter.
