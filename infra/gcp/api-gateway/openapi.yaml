swagger: "2.0"
info:
  title: "Euno Tool Gateway (GCP API Gateway profile)"
  description: |
    Sprint-1 multi-cloud parity for the Azure APIM `validate-jwt` policy.
    This OpenAPI 2.0 (Swagger) document is consumable by GCP API Gateway
    (`gcloud api-gateway api-configs create ... --openapi-spec=...`) or
    by Apigee. It enforces capability-token verification at the edge using
    the built-in `securityDefinitions: jwt` (no Lambda-equivalent needed —
    GCP API Gateway has native JWT support backed by the JWKS endpoint
    published by the Capability Issuer).

    Flow:
      client → GCP API Gateway (jwt) → ESPv2 → Tool Gateway pod (GKE)

    Scope-based payload validation still happens in the Tool Gateway pod
    itself (so the policy lives in one place — the same boundary as Azure
    APIM and AWS API Gateway).
  version: "1.0.0"
  x-euno-parity: "infra/bicep/main.bicep + APIM validate-jwt"
schemes:
  - https
produces:
  - application/json
consumes:
  - application/json

securityDefinitions:
  euno_capability:
    # JWT auth backed by the Capability Issuer's JWKS endpoint.
    # API Gateway verifies signature + iss + aud + exp natively.
    authorizationUrl: ""
    flow: "implicit"
    type: "oauth2"
    x-google-issuer: "${ISSUER_URL}"
    x-google-jwks_uri: "${ISSUER_URL}/.well-known/jwks.json"
    x-google-audiences: "tool-gateway"

security:
  - euno_capability: []

x-google-backend:
  # Default backend — the in-cluster Tool Gateway, fronted by an internal
  # Network Endpoint Group (NEG) and an HTTPS Load Balancer.
  address: "${UPSTREAM_TOOL_GATEWAY_URL}"
  protocol: "h2"
  deadline: 29.0

paths:
  /api/v1/tools/invoke:
    post:
      summary: "Invoke a registered tool with a capability token"
      operationId: "invokeTool"
      x-google-backend:
        address: "${UPSTREAM_TOOL_GATEWAY_URL}/api/v1/tools/invoke"
      responses:
        "200":
          description: "Tool invocation succeeded"
        "401":
          description: "Missing/invalid/expired capability token"
        "403":
          description: "Token valid but lacks required scope"
  /proxy/{path}:
    x-google-backend:
      address: "${UPSTREAM_TOOL_GATEWAY_URL}/proxy"
      path_translation: APPEND_PATH_TO_ADDRESS
    get: &proxy_op
      summary: "Generic proxy for tool endpoints"
      operationId: "proxyGet"
      parameters:
        - name: path
          in: path
          required: true
          type: string
      responses:
        "200":
          description: "Proxied response"
        "401":
          description: "Missing/invalid/expired capability token"
        "403":
          description: "Token valid but lacks required scope"
    post:
      <<: *proxy_op
      operationId: "proxyPost"
    put:
      <<: *proxy_op
      operationId: "proxyPut"
    delete:
      <<: *proxy_op
      operationId: "proxyDelete"
    patch:
      <<: *proxy_op
      operationId: "proxyPatch"
  /health:
    get:
      summary: "Public health check (no auth)"
      operationId: "health"
      security: []
      x-google-backend:
        address: "${UPSTREAM_TOOL_GATEWAY_URL}/health"
        deadline: 5.0
      responses:
        "200":
          description: "OK"
