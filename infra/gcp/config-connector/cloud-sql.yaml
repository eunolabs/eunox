# Eunox — Cloud SQL for PostgreSQL
# ---------------------------------------------------------------------------
# Provisions the managed PostgreSQL instance used by capability-issuer and
# tool-gateway for the audit ledger and API key databases.
#
# Substitute:
#   <YOUR_PROJECT_ID>     — your GCP project ID
#   <YOUR_REGION>         — e.g. us-central1
#   <YOUR_VPC_NETWORK>    — full resource name of your VPC, e.g.
#                           projects/<YOUR_PROJECT_ID>/global/networks/eunox-vpc
# ---------------------------------------------------------------------------

# Cloud SQL instance — PostgreSQL 15, private IP, HA replica.
apiVersion: sql.cnrm.cloud.google.com/v1beta1
kind: SQLInstance
metadata:
  name: eunox-postgres
  namespace: config-connector
  annotations:
    cnrm.cloud.google.com/project-id: "<YOUR_PROJECT_ID>"
spec:
  region: "<YOUR_REGION>"
  databaseVersion: POSTGRES_15
  settings:
    tier: db-custom-2-7680
    availabilityType: REGIONAL
    diskAutoresize: true
    diskSize: 20
    diskType: PD_SSD
    backupConfiguration:
      enabled: true
      startTime: "03:00"
      pointInTimeRecoveryEnabled: true
      transactionLogRetentionDays: 7
      backupRetentionSettings:
        retainedBackups: 14
    ipConfiguration:
      ipv4Enabled: false
      privateNetworkRef:
        external: "<YOUR_VPC_NETWORK>"
      requireSsl: true
    maintenanceWindow:
      day: 7
      hour: 4
      updateTrack: stable
    databaseFlags:
      - name: cloudsql.iam_authentication
        value: "on"
    userLabels:
      product: eunox
      component: capability-governance

---

# eunox application database.
apiVersion: sql.cnrm.cloud.google.com/v1beta1
kind: SQLDatabase
metadata:
  name: eunox-db
  namespace: config-connector
  annotations:
    cnrm.cloud.google.com/project-id: "<YOUR_PROJECT_ID>"
spec:
  instanceRef:
    name: eunox-postgres
    namespace: config-connector
  charset: UTF8
  collation: en_US.UTF8

---

# eunox database user.
# Store the password in Secret Manager and reference it via the
# `passwordSecretRef` field rather than hard-coding it here.
apiVersion: sql.cnrm.cloud.google.com/v1beta1
kind: SQLUser
metadata:
  name: eunox-db-user
  namespace: config-connector
  annotations:
    cnrm.cloud.google.com/project-id: "<YOUR_PROJECT_ID>"
spec:
  instanceRef:
    name: eunox-postgres
    namespace: config-connector
  host: "%"
  # Reference the password from a Kubernetes Secret produced by ESO or
  # the Secret Manager Add-on — see docs/secrets-gcp.md.
  passwordRef:
    name: eunox-db-credentials
    key: password
