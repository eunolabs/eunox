# Euno Tool Gateway — canonical local stack
#
# Usage
# -----
#   # Dev mode (gateway + capability-issuer; all stores in-memory):
#   docker compose -f infra/docker-compose.yml --profile dev up --build
#
#   # Full stack (gateway + Redis + Postgres + capability-issuer):
#   docker compose -f infra/docker-compose.yml --profile full up --build
#
#   # Smoke test (full stack + health/functional checks, including issuance round-trip):
#   docker compose -f infra/docker-compose.yml -f infra/docker-compose.smoke.yml \
#     --profile smoke up --build --abort-on-container-exit
#   (The smoke override file wires capability-issuer to the local mock-oidc service.)
#
# Configurable backends
# ---------------------
# All backend selection is driven by environment variables.  The values below
# are the recommended defaults for a self-hosted local stack.  Override any
# variable by creating infra/.env and editing it, or by setting the variable
# in your shell before
# calling docker compose.
#
#   • Redis    — REDIS_URL=redis://redis:6379
#       Unset → safe in-memory fallbacks per store (single-replica dev only).
#
#   • Postgres — AUDIT_LEDGER_BACKEND=postgres + AUDIT_LEDGER_PG_URL=…
#       none     → no append-only ledger (default; safest for first boot).
#       in-memory → ephemeral; useful for smoke tests.
#       postgres  → durable; requires AUDIT_LEDGER_PG_URL + AUDIT_LEDGER_HMAC_SECRET.
#
#   • Evidence signing
#       ENABLE_CRYPTOGRAPHIC_AUDIT=false  → disabled (default).
#       ENABLE_CRYPTOGRAPHIC_AUDIT=true   → software HMAC; see EVIDENCE_SIGNING_KEY_*.
#       AUDIT_SIGNING_KMS_PROVIDER=…      → cloud-HSM; see this file for required vars.
#
# Production checklist
# --------------------
# Before exposing the gateway to the internet:
#   1. Set ADMIN_API_KEY and ADMIN_HOST (the admin API must NOT be internet-reachable).
#   2. Configure REDIS_URL pointing at a password-protected, TLS-enabled Redis.
#   3. Configure AUDIT_LEDGER_PG_URL with TLS mode=require.
#   4. Set ENABLE_CRYPTOGRAPHIC_AUDIT=true and provide a signing key.
#   5. See this file for the full reference.

version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Extension fields — YAML anchors for DRY service definitions
# ─────────────────────────────────────────────────────────────────────────────

# Common build + port + healthcheck config shared by both gateway variants.
# Merged into `gateway` (dev) and `gateway-full` (full/smoke) via <<: *anchor.
x-gateway-build: &gateway-build
  image: eunox/gateway:local
  restart: unless-stopped
  ports:
    - "${GATEWAY_EXPOSE_PORT:-3002}:${GATEWAY_PORT:-3002}"
    - "${ADMIN_EXPOSE_PORT:-3003}:${ADMIN_PORT:-3003}"
  healthcheck:
    test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-3002}/health || exit 1"]
    interval: 10s
    timeout: 3s
    retries: 5

# Base environment variables shared across both gateway profiles.
# Merged with per-profile backend overrides in each service's `environment:`.
x-gateway-env: &gateway-env
  NODE_ENV:    ${NODE_ENV:-development}
  PORT:        ${GATEWAY_PORT:-3002}
  ADMIN_PORT:  ${ADMIN_PORT:-3003}
  # In production, set ADMIN_HOST=127.0.0.1 (or the pod's internal cluster IP)
  # so the admin API is unreachable from the public load-balancer.
  # ADMIN_HOST: "127.0.0.1"
  ADMIN_API_KEY: ${ADMIN_API_KEY:-dev-admin-key}
  ISSUER_JWKS_URL: "http://capability-issuer:${ISSUER_PORT:-3001}/.well-known/jwks.json"
  GATEWAY_AUDIENCE: ${GATEWAY_AUDIENCE:-tool-gateway}
  # Evidence signing — disabled by default for first-boot ease.
  ENABLE_CRYPTOGRAPHIC_AUDIT: ${ENABLE_CRYPTOGRAPHIC_AUDIT:-false}
  EVIDENCE_SIGNING_KEY_PEM: ${EVIDENCE_SIGNING_KEY_PEM:-}
  BACKEND_SERVICE_URL: ${BACKEND_SERVICE_URL:-http://localhost:4000}
  ALLOWED_ORIGINS:     ${ALLOWED_ORIGINS:-}

# ─────────────────────────────────────────────────────────────────────────────
# Named volumes (persist data between container restarts)
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  posture-data:
    driver: local

# ─────────────────────────────────────────────────────────────────────────────
# Services
# ─────────────────────────────────────────────────────────────────────────────
services:

  # ── Redis ──────────────────────────────────────────────────────────────────
  # Backs: revocation store, kill-switch, call-counter store, DPoP-replay store.
  # All stores fall back to safe in-memory implementations when REDIS_URL is
  # absent, but those fallbacks are per-replica — do not use in multi-replica
  # or production deployments.
  redis:
    image: redis:7-alpine
    container_name: euno-redis
    profiles: ["full", "smoke"]
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis-data:/data
    ports:
      # Expose locally for debugging; remove in production or firewall accordingly.
      - "${REDIS_EXPOSE_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── Postgres ───────────────────────────────────────────────────────────────
  # Backs: AUDIT_LEDGER_BACKEND=postgres (append-only signed audit log).
  # The gateway runs AUDIT_LEDGER_RUN_MIGRATIONS=true on first start so the
  # schema is created automatically; no separate migration step required.
  postgres:
    image: postgres:16-alpine
    container_name: euno-postgres
    profiles: ["full", "smoke"]
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-euno_audit}
      POSTGRES_USER:     ${POSTGRES_USER:-euno}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-euno_dev_secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      # Expose locally for debugging; remove in production.
      - "${POSTGRES_EXPOSE_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-euno} -d ${POSTGRES_DB:-euno_audit}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ── Capability Issuer ──────────────────────────────────────────────────────
  # Issues short-lived capability JWTs that the gateway verifies.
  # In a real deployment this runs separately and is shared across gateway
  # replicas.  It is included here so the local stack is self-contained.
  #
  # Identity provider: set IDENTITY_PROVIDER (and the corresponding provider
  # variables) in your .env file or shell environment.  The smoke profile uses
  # infra/docker-compose.smoke.yml to pre-configure IDENTITY_PROVIDER=aws-cognito
  # against the local mock-oidc service; dev/full profiles leave it unset so the
  # issuer boots without attempting to reach an unavailable IdP.
  capability-issuer:
    image: eunox/issuer:local
    container_name: euno-capability-issuer
    restart: unless-stopped
    environment:
      PORT:        ${ISSUER_PORT:-3001}
      NODE_ENV:    ${NODE_ENV:-development}
      ISSUER_DID:  ${ISSUER_DID:-did:web:capability-issuer%3A3001}
      AUDIENCE:    ${GATEWAY_AUDIENCE:-tool-gateway}
      # A deterministic seed for local dev so the signing key survives restarts.
      # MUST be replaced in any internet-facing deployment — generate a fresh
      # value with: openssl rand -hex 32
      ISSUER_SEED: ${ISSUER_SEED:-a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2}
      # Identity provider — set in your .env or shell.  Unset → issuer boots
      # without an active IdP (OIDC token-exchange endpoints will return errors
      # until a provider is configured).  The smoke override sets aws-cognito.
      IDENTITY_PROVIDER: ${IDENTITY_PROVIDER:-}
      # Provider-specific variables — override in .env or shell.
      # The smoke override (docker-compose.smoke.yml) sets these to point at
      # the local mock-oidc container.  For a real Cognito pool, set here:
      #   AWS_COGNITO_USER_POOL_ID=<pool-id>
      #   AWS_COGNITO_CLIENT_ID=<client-id>
      #   AWS_COGNITO_REGION=<region>
      AWS_COGNITO_ISSUER:    ${AWS_COGNITO_ISSUER:-}
      AWS_COGNITO_CLIENT_ID: ${AWS_COGNITO_CLIENT_ID:-}
      AWS_COGNITO_JWKS_URI:  ${AWS_COGNITO_JWKS_URI:-}
      # Role-to-capability policy file (bind-mounted from infra/policies/).
      # Provides the smoke-test "developer" role and the default Sprint-1 roles.
      ROLE_POLICY_FILE: /app/policies/role-policy.json
      # Public URL — used to construct OIDC discovery endpoint URIs.
      ISSUER_PUBLIC_URL: ${ISSUER_PUBLIC_URL:-http://capability-issuer:${ISSUER_PORT:-3001}}
    volumes:
      # Seed role-to-capability policy (read-only).  Operators may replace this
      # file with a tenant-specific policy; set ROLE_POLICY_FILE to the new path.
      - ./policies:/app/policies:ro
    ports:
      - "${ISSUER_EXPOSE_PORT:-3001}:${ISSUER_PORT:-3001}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-3001}/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ── Tool Gateway — dev mode (in-memory backends, no Redis/Postgres) ─────────
  # Active when --profile dev is passed.  All control-surface stores use
  # in-memory fallbacks; suitable for local development and quick-start.
  # Use --profile full for a durable stack (Redis + Postgres).
  gateway:
    <<: *gateway-build
    container_name: euno-gateway
    profiles: ["dev"]
    depends_on:
      capability-issuer:
        condition: service_healthy
    environment:
      <<: *gateway-env
      # Redis — control-surface stores (revocation, kill-switch, call-counter,
      # DPoP-replay).  Leave blank to use safe in-memory fallbacks
      # (single-replica dev only).
      REDIS_URL: ${REDIS_URL:-}
      # Audit ledger — set to "postgres" + configure AUDIT_LEDGER_PG_URL to
      # persist the signed audit trail to the Postgres service.
      AUDIT_LEDGER_BACKEND: ${AUDIT_LEDGER_BACKEND:-none}
      AUDIT_LEDGER_PG_URL:  ${AUDIT_LEDGER_PG_URL:-}
      AUDIT_LEDGER_HMAC_SECRET: ${AUDIT_LEDGER_HMAC_SECRET:-}
      AUDIT_LEDGER_RUN_MIGRATIONS: ${AUDIT_LEDGER_RUN_MIGRATIONS:-false}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-3002}/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  # ── Tool Gateway — full stack with Redis + Postgres pre-wired ─────────────
  # Active when --profile full or --profile smoke is passed.  Adds Redis and
  # Postgres backends and auto-runs schema migrations.
  gateway-full:
    <<: *gateway-build
    container_name: euno-gateway-full
    profiles: ["full", "smoke"]
    depends_on:
      capability-issuer:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      <<: *gateway-env
      # Redis — backed by the redis service defined above.
      REDIS_URL: "redis://redis:6379"
      # Postgres audit ledger — backed by the postgres service defined above.
      AUDIT_LEDGER_BACKEND: postgres
      AUDIT_LEDGER_PG_URL: "postgresql://${POSTGRES_USER:-euno}:${POSTGRES_PASSWORD:-euno_dev_secret}@postgres:5432/${POSTGRES_DB:-euno_audit}"
      AUDIT_LEDGER_HMAC_SECRET: ${AUDIT_LEDGER_HMAC_SECRET:-dev-hmac-secret-change-in-production}
      AUDIT_LEDGER_RUN_MIGRATIONS: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-3002}/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  # ── Mock OIDC server (smoke profile only) ─────────────────────────────────
  # Provides a Cognito-compatible ID-token issuer for the smoke-test
  # issuance round-trip.  Issues signed JWTs with an ephemeral EC key that is
  # generated at startup; the JWKS endpoint exposes the corresponding public
  # key so the capability-issuer can validate the tokens.
  #
  # This service MUST NOT be used outside the smoke-test profile — it has no
  # authentication on its /token endpoint and is purely for integration testing.
  mock-oidc:
    build:
      context: mock-oidc
      dockerfile: Dockerfile
    image: eunox/mock-oidc:local
    container_name: euno-mock-oidc
    profiles: ["smoke"]
    restart: unless-stopped
    environment:
      PORT: 3003
      MOCK_OIDC_ISSUER:    "http://mock-oidc:3003"
      MOCK_OIDC_CLIENT_ID: "euno-smoke-client"
    ports:
      - "${MOCK_OIDC_EXPOSE_PORT:-3004}:3003"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/.well-known/jwks.json || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── DB Token Service ──────────────────────────────────────────────────────
  # Mints short-lived database IAM credentials from verified capability JWTs.
  # Active when --profile full or --profile smoke is passed.
  # See docs/self-host.md §12.6 for configuration reference.
  db-token-service:
    image: eunox/db-token-service:local
    container_name: euno-db-token-service
    profiles: ["full", "smoke"]
    restart: unless-stopped
    depends_on:
      capability-issuer:
        condition: service_healthy
    environment:
      NODE_ENV:        ${NODE_ENV:-development}
      PORT:            ${DB_TOKEN_SERVICE_PORT:-5050}
      ISSUER_DID:      ${ISSUER_DID:-did:web:capability-issuer%3A3001}
      ISSUER_JWKS_URI: "http://capability-issuer:${ISSUER_PORT:-3001}/.well-known/jwks.json"
      AUDIENCE:        ${GATEWAY_AUDIENCE:-tool-gateway}
      DB_TOKENS_ENABLED: ${DB_TOKENS_ENABLED:-false}
    ports:
      - "${DB_TOKEN_SERVICE_EXPOSE_PORT:-5050}:${DB_TOKEN_SERVICE_PORT:-5050}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${DB_TOKEN_SERVICE_PORT:-5050}/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  # ── Storage Grant Service ──────────────────────────────────────────────────
  # Mints short-lived cloud storage credentials (presigned URLs / SAS tokens)
  # from verified capability JWTs.
  # Active when --profile full or --profile smoke is passed.
  # See docs/self-host.md §12.7 for configuration reference.
  storage-grant-service:
    image: eunox/storage-grant-service:local
    container_name: euno-storage-grant-service
    profiles: ["full", "smoke"]
    restart: unless-stopped
    depends_on:
      capability-issuer:
        condition: service_healthy
    environment:
      NODE_ENV:              ${NODE_ENV:-development}
      PORT:                  ${STORAGE_GRANT_SERVICE_PORT:-5051}
      ISSUER_DID:            ${ISSUER_DID:-did:web:capability-issuer%3A3001}
      ISSUER_JWKS_URI:       "http://capability-issuer:${ISSUER_PORT:-3001}/.well-known/jwks.json"
      AUDIENCE:              ${GATEWAY_AUDIENCE:-tool-gateway}
      STORAGE_GRANTS_ENABLED: ${STORAGE_GRANTS_ENABLED:-false}
    ports:
      - "${STORAGE_GRANT_SERVICE_EXPOSE_PORT:-5051}:${STORAGE_GRANT_SERVICE_PORT:-5051}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${STORAGE_GRANT_SERVICE_PORT:-5051}/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  # ── Posture Emitter ──────────────────────────────────────────────────────
  # Single-writer SQLite drainer for the AI posture inventory feed.
  # IMPORTANT: Do NOT scale this service to more than 1 replica — the durable
  # queue uses a SQLite file on a named volume that must have a single writer.
  # Active when --profile full or --profile smoke is passed.
  # See docs/self-host.md §12.11 and §13 for configuration reference.
  posture-emitter:
    image: eunox/posture-emitter:local
    container_name: euno-posture-emitter
    profiles: ["full", "smoke"]
    restart: unless-stopped
    volumes:
      - posture-data:/data
    environment:
      NODE_ENV:                     ${NODE_ENV:-development}
      POSTURE_EMITTER_ENABLED:      ${POSTURE_EMITTER_ENABLED:-false}
      POSTURE_EMITTER_PLUGINS:      ${POSTURE_EMITTER_PLUGINS:-stdout}
      POSTURE_DURABLE_QUEUE_PATH:   /data/posture.db
      POSTURE_DURABLE_POLL_INTERVAL_MS: ${POSTURE_DURABLE_POLL_INTERVAL_MS:-5000}

  # ── Smoke test ─────────────────────────────────────────────────────────────
  # Lightweight container that exercises core gateway endpoints after the full
  # stack is healthy.  Exits 0 on success, 1 on failure.  Use with:
  #   docker compose --profile smoke up --abort-on-container-exit
  smoke-test:
    image: alpine/curl:latest
    container_name: euno-smoke-test
    profiles: ["smoke"]
    depends_on:
      gateway-full:
        condition: service_healthy
      mock-oidc:
        condition: service_healthy
      db-token-service:
        condition: service_healthy
      storage-grant-service:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/smoke-test.sh"]
    volumes:
      - ./smoke-test.sh:/smoke-test.sh:ro
    environment:
      GATEWAY_URL:              "http://gateway-full:${GATEWAY_PORT:-3002}"
      ISSUER_URL:               "http://capability-issuer:${ISSUER_PORT:-3001}"
      ISSUER_JWKS_URL:          "http://capability-issuer:${ISSUER_PORT:-3001}/.well-known/jwks.json"
      MOCK_OIDC_URL:            "http://mock-oidc:3003"
      DB_TOKEN_SERVICE_URL:     "http://db-token-service:${DB_TOKEN_SERVICE_PORT:-5050}"
      STORAGE_GRANT_SERVICE_URL: "http://storage-grant-service:${STORAGE_GRANT_SERVICE_PORT:-5051}"