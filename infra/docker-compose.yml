# Euno Tool Gateway — canonical local stack
#
# Usage
# -----
#   # Full stack (gateway + Redis + Postgres + capability-issuer):
#   docker compose -f infra/docker-compose.yml up --build
#
#   # Dev mode (gateway only; all backends in-memory, no external services):
#   docker compose -f infra/docker-compose.yml --profile dev up --build
#
#   # Smoke test (start full stack and run health/functional checks):
#   docker compose -f infra/docker-compose.yml --profile smoke up --build --abort-on-container-exit
#
# Configurable backends
# ---------------------
# All backend selection is driven by environment variables.  The values below
# are the recommended defaults for a self-hosted local stack.  Override any
# variable by copying .env.gateway.example to .env and editing it, or by
# setting the variable in your shell before calling docker compose.
#
#   • Redis    — REDIS_URL=redis://redis:6379
#       Unset → safe in-memory fallbacks per store (single-replica dev only).
#
#   • Postgres — AUDIT_LEDGER_BACKEND=postgres + AUDIT_LEDGER_PG_URL=…
#       none     → no append-only ledger (default; safest for first boot).
#       in-memory → ephemeral; useful for smoke tests.
#       postgres  → durable; requires AUDIT_LEDGER_PG_URL + AUDIT_LEDGER_HMAC_SECRET.
#
#   • Evidence signing
#       ENABLE_CRYPTOGRAPHIC_AUDIT=false  → disabled (default).
#       ENABLE_CRYPTOGRAPHIC_AUDIT=true   → software HMAC; see EVIDENCE_SIGNING_KEY_*.
#       AUDIT_SIGNING_KMS_PROVIDER=…      → cloud-HSM; see .env.example for required vars.
#
# Production checklist
# --------------------
# Before exposing the gateway to the internet:
#   1. Set ADMIN_API_KEY and ADMIN_HOST (the admin API must NOT be internet-reachable).
#   2. Configure REDIS_URL pointing at a password-protected, TLS-enabled Redis.
#   3. Configure AUDIT_LEDGER_PG_URL with TLS mode=require.
#   4. Set ENABLE_CRYPTOGRAPHIC_AUDIT=true and provide a signing key.
#   5. See euno-platform/packages/tool-gateway/.env.example for the full reference.

version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Named volumes (persist data between container restarts)
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

# ─────────────────────────────────────────────────────────────────────────────
# Services
# ─────────────────────────────────────────────────────────────────────────────
services:

  # ── Redis ──────────────────────────────────────────────────────────────────
  # Backs: revocation store, kill-switch, call-counter store, DPoP-replay store.
  # All stores fall back to safe in-memory implementations when REDIS_URL is
  # absent, but those fallbacks are per-replica — do not use in multi-replica
  # or production deployments.
  redis:
    image: redis:7-alpine
    container_name: euno-redis
    profiles: ["full", "smoke"]
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis-data:/data
    ports:
      # Expose locally for debugging; remove in production or firewall accordingly.
      - "${REDIS_EXPOSE_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── Postgres ───────────────────────────────────────────────────────────────
  # Backs: AUDIT_LEDGER_BACKEND=postgres (append-only signed audit log).
  # The gateway runs AUDIT_LEDGER_RUN_MIGRATIONS=true on first start so the
  # schema is created automatically; no separate migration step required.
  postgres:
    image: postgres:16-alpine
    container_name: euno-postgres
    profiles: ["full", "smoke"]
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-euno_audit}
      POSTGRES_USER:     ${POSTGRES_USER:-euno}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-euno_dev_secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      # Expose locally for debugging; remove in production.
      - "${POSTGRES_EXPOSE_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-euno} -d ${POSTGRES_DB:-euno_audit}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ── Capability Issuer ──────────────────────────────────────────────────────
  # Issues short-lived capability JWTs that the gateway verifies.
  # In a real deployment this runs separately and is shared across gateway
  # replicas.  It is included here so the local stack is self-contained.
  capability-issuer:
    build:
      context: ..
      dockerfile: euno-platform/packages/capability-issuer/Dockerfile
    image: euno/capability-issuer:local
    container_name: euno-capability-issuer
    restart: unless-stopped
    environment:
      PORT:        ${ISSUER_PORT:-3001}
      NODE_ENV:    ${NODE_ENV:-development}
      ISSUER_DID:  ${ISSUER_DID:-did:web:capability-issuer%3A3001}
      AUDIENCE:    ${GATEWAY_AUDIENCE:-tool-gateway}
      # A deterministic seed for local dev so the signing key survives restarts.
      # MUST be replaced in any internet-facing deployment — generate a fresh
      # value with: openssl rand -hex 32
      ISSUER_SEED: ${ISSUER_SEED:-a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2}
    ports:
      - "${ISSUER_EXPOSE_PORT:-3001}:${ISSUER_PORT:-3001}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-3001}/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ── Tool Gateway — full stack (Redis + Postgres) ───────────────────────────
  gateway:
    build:
      context: ..
      dockerfile: euno-platform/packages/tool-gateway/Dockerfile
    image: euno/tool-gateway:local
    container_name: euno-gateway
    restart: unless-stopped
    depends_on:
      capability-issuer:
        condition: service_healthy
    environment:
      NODE_ENV:    ${NODE_ENV:-development}
      PORT:        ${GATEWAY_PORT:-3002}
      ADMIN_PORT:  ${ADMIN_PORT:-3003}
      # In production, set ADMIN_HOST=127.0.0.1 (or the pod's internal cluster IP)
      # so the admin API is unreachable from the public load-balancer.
      # ADMIN_HOST: "127.0.0.1"
      ADMIN_API_KEY: ${ADMIN_API_KEY:-dev-admin-key}

      # JWKS endpoint — gateway fetches issuer public keys from here at startup.
      ISSUER_JWKS_URL: "http://capability-issuer:${ISSUER_PORT:-3001}/.well-known/jwks.json"
      GATEWAY_AUDIENCE: ${GATEWAY_AUDIENCE:-tool-gateway}

      # Redis — control-surface stores (revocation, kill-switch, call-counter,
      # DPoP-replay).  Remove or leave blank to use safe in-memory fallbacks
      # (single-replica dev only).
      REDIS_URL: ${REDIS_URL:-}

      # Audit ledger — set to "postgres" + configure AUDIT_LEDGER_PG_URL to
      # persist the signed audit trail to the Postgres service above.
      AUDIT_LEDGER_BACKEND: ${AUDIT_LEDGER_BACKEND:-none}
      AUDIT_LEDGER_PG_URL:  ${AUDIT_LEDGER_PG_URL:-}
      AUDIT_LEDGER_HMAC_SECRET: ${AUDIT_LEDGER_HMAC_SECRET:-}
      AUDIT_LEDGER_RUN_MIGRATIONS: ${AUDIT_LEDGER_RUN_MIGRATIONS:-false}

      # Evidence signing — disabled by default for first-boot ease.
      # Set to "true" and provide EVIDENCE_SIGNING_KEY_PEM for HMAC signing,
      # or set AUDIT_SIGNING_KMS_PROVIDER for cloud-HSM signing.
      ENABLE_CRYPTOGRAPHIC_AUDIT: ${ENABLE_CRYPTOGRAPHIC_AUDIT:-false}
      EVIDENCE_SIGNING_KEY_PEM: ${EVIDENCE_SIGNING_KEY_PEM:-}

      BACKEND_SERVICE_URL: ${BACKEND_SERVICE_URL:-http://localhost:4000}
      ALLOWED_ORIGINS:     ${ALLOWED_ORIGINS:-}
    ports:
      - "${GATEWAY_EXPOSE_PORT:-3002}:${GATEWAY_PORT:-3002}"
      - "${ADMIN_EXPOSE_PORT:-3003}:${ADMIN_PORT:-3003}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-3002}/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  # ── Tool Gateway — full stack with Redis + Postgres pre-wired ─────────────
  # Extends the base gateway service, enabling Redis + Postgres backends and
  # auto-running schema migrations.  Active when --profile full is passed.
  gateway-full:
    build:
      context: ..
      dockerfile: euno-platform/packages/tool-gateway/Dockerfile
    image: euno/tool-gateway:local
    container_name: euno-gateway-full
    profiles: ["full", "smoke"]
    restart: unless-stopped
    depends_on:
      capability-issuer:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:    ${NODE_ENV:-development}
      PORT:        ${GATEWAY_PORT:-3002}
      ADMIN_PORT:  ${ADMIN_PORT:-3003}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-dev-admin-key}

      ISSUER_JWKS_URL: "http://capability-issuer:${ISSUER_PORT:-3001}/.well-known/jwks.json"
      GATEWAY_AUDIENCE: ${GATEWAY_AUDIENCE:-tool-gateway}

      # Redis — backed by the redis service above.
      REDIS_URL: "redis://redis:6379"

      # Postgres audit ledger — backed by the postgres service above.
      AUDIT_LEDGER_BACKEND: postgres
      AUDIT_LEDGER_PG_URL: "postgresql://${POSTGRES_USER:-euno}:${POSTGRES_PASSWORD:-euno_dev_secret}@postgres:5432/${POSTGRES_DB:-euno_audit}"
      AUDIT_LEDGER_HMAC_SECRET: ${AUDIT_LEDGER_HMAC_SECRET:-dev-hmac-secret-change-in-production}
      AUDIT_LEDGER_RUN_MIGRATIONS: "true"

      ENABLE_CRYPTOGRAPHIC_AUDIT: ${ENABLE_CRYPTOGRAPHIC_AUDIT:-false}
      EVIDENCE_SIGNING_KEY_PEM: ${EVIDENCE_SIGNING_KEY_PEM:-}

      BACKEND_SERVICE_URL: ${BACKEND_SERVICE_URL:-http://localhost:4000}
      ALLOWED_ORIGINS:     ${ALLOWED_ORIGINS:-}
    ports:
      - "${GATEWAY_EXPOSE_PORT:-3002}:${GATEWAY_PORT:-3002}"
      - "${ADMIN_EXPOSE_PORT:-3003}:${ADMIN_PORT:-3003}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-3002}/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  # ── Smoke test ─────────────────────────────────────────────────────────────
  # Lightweight container that exercises core gateway endpoints after the full
  # stack is healthy.  Exits 0 on success, 1 on failure.  Use with:
  #   docker compose --profile smoke up --abort-on-container-exit
  smoke-test:
    image: alpine/curl:latest
    container_name: euno-smoke-test
    profiles: ["smoke"]
    depends_on:
      gateway-full:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/smoke-test.sh"]
    volumes:
      - ./smoke-test.sh:/smoke-test.sh:ro
    environment:
      GATEWAY_URL:     "http://gateway-full:${GATEWAY_PORT:-3002}"
      ISSUER_JWKS_URL: "http://capability-issuer:${ISSUER_PORT:-3001}/.well-known/jwks.json"
