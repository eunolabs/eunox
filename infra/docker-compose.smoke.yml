# Smoke-profile override — capability-issuer ↔ mock-oidc wiring
#
# This file is ONLY for the smoke test profile.  Apply it together with the
# base compose file when running end-to-end issuance smoke checks:
#
#   docker compose \
#     -f infra/docker-compose.yml \
#     -f infra/docker-compose.smoke.yml \
#     --profile smoke up --build --abort-on-container-exit
#
# What it does:
#   • Configures the capability-issuer with IDENTITY_PROVIDER=aws-cognito
#     and points the AWS_COGNITO_* variables at the local mock-oidc container
#     (which is only started by the smoke profile in docker-compose.yml).
#   • Adds a depends_on: mock-oidc (service_healthy) to the issuer so the
#     JWKS endpoint is ready before the issuer accepts OIDC token requests.
#
# Do NOT use this file for dev or full profiles — the mock-oidc container is
# not started in those profiles and the DNS names would fail to resolve.

services:
  capability-issuer:
    environment:
      # Wire the issuer to the smoke-profile mock OIDC server.
      # These values can be overridden via your .env file or shell environment
      # to point at a real Cognito user pool during manual smoke testing.
      IDENTITY_PROVIDER:     ${IDENTITY_PROVIDER:-aws-cognito}
      AWS_COGNITO_ISSUER:    ${AWS_COGNITO_ISSUER:-http://mock-oidc:3003}
      AWS_COGNITO_CLIENT_ID: ${AWS_COGNITO_CLIENT_ID:-euno-smoke-client}
      AWS_COGNITO_JWKS_URI:  ${AWS_COGNITO_JWKS_URI:-http://mock-oidc:3003/.well-known/jwks.json}
    depends_on:
      mock-oidc:
        condition: service_healthy
