      - "--label=org.opencontainers.image.title=eunox-storage-grant-svc"
      - "--build-arg=BINARY={{ .Binary }}"

  - id: storage-grant-svc-arm64
    ids: [storage-grant-svc]
    goos: linux
    goarch: arm64
    image_templates:
      - "ghcr.io/eunolabs/eunox-storage-grant-svc:{{ .Version }}-arm64"
    dockerfile: deploy/docker/Dockerfile.goreleaser
