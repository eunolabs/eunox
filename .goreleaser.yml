    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/eunolabs/eunox-posture-emitter:{{ .Version }}-amd64"
    dockerfile: deploy/docker/Dockerfile.goreleaser
    build_flag_templates:
      - "--label=org.opencontainers.image.source=https://github.com/eunolabs/eunox"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.title=eunox-posture-emitter"
      - "--build-arg=BINARY={{ .Binary }}"

  - id: posture-emitter-arm64
    ids: [posture-emitter]
    goos: linux
    goarch: arm64
    image_templates:
      - "ghcr.io/eunolabs/eunox-posture-emitter:{{ .Version }}-arm64"
    dockerfile: deploy/docker/Dockerfile.goreleaser
    build_flag_templates:
      - "--label=org.opencontainers.image.source=https://github.com/eunolabs/eunox"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.title=eunox-posture-emitter"
      - "--build-arg=BINARY={{ .Binary }}"

docker_manifests:
  # ── eunox-mcp ───────────────────────────────────────────────────────────────
  - name_template: "ghcr.io/eunolabs/eunox-mcp:{{ .Version }}"
    image_templates:
      - "ghcr.io/eunolabs/eunox-mcp:{{ .Version }}-amd64"
      - "ghcr.io/eunolabs/eunox-mcp:{{ .Version }}-arm64"
  - name_template: "ghcr.io/eunolabs/eunox-mcp:latest"
    image_templates:
      - "ghcr.io/eunolabs/eunox-mcp:{{ .Version }}-amd64"
      - "ghcr.io/eunolabs/eunox-mcp:{{ .Version }}-arm64"

  # ── Legacy platform services ─────────────────────────────────────────────
  - name_template: "ghcr.io/eunolabs/eunox-gateway:{{ .Version }}"
    image_templates:
      - "ghcr.io/eunolabs/eunox-gateway:{{ .Version }}-amd64"
      - "ghcr.io/eunolabs/eunox-gateway:{{ .Version }}-arm64"
  - name_template: "ghcr.io/eunolabs/eunox-gateway:latest"
    image_templates:
      - "ghcr.io/eunolabs/eunox-gateway:{{ .Version }}-amd64"
      - "ghcr.io/eunolabs/eunox-gateway:{{ .Version }}-arm64"

  - name_template: "ghcr.io/eunolabs/eunox-issuer:{{ .Version }}"
    image_templates:
      - "ghcr.io/eunolabs/eunox-issuer:{{ .Version }}-amd64"
      - "ghcr.io/eunolabs/eunox-issuer:{{ .Version }}-arm64"
  - name_template: "ghcr.io/eunolabs/eunox-issuer:latest"
    image_templates:
      - "ghcr.io/eunolabs/eunox-issuer:{{ .Version }}-amd64"
      - "ghcr.io/eunolabs/eunox-issuer:{{ .Version }}-arm64"

  - name_template: "ghcr.io/eunolabs/eunox-minter:{{ .Version }}"
    image_templates:
      - "ghcr.io/eunolabs/eunox-minter:{{ .Version }}-amd64"
      - "ghcr.io/eunolabs/eunox-minter:{{ .Version }}-arm64"
  - name_template: "ghcr.io/eunolabs/eunox-minter:latest"
    image_templates:
      - "ghcr.io/eunolabs/eunox-minter:{{ .Version }}-amd64"
      - "ghcr.io/eunolabs/eunox-minter:{{ .Version }}-arm64"

  - name_template: "ghcr.io/eunolabs/eunox-db-token-svc:{{ .Version }}"
    image_templates:
      - "ghcr.io/eunolabs/eunox-db-token-svc:{{ .Version }}-amd64"
      - "ghcr.io/eunolabs/eunox-db-token-svc:{{ .Version }}-arm64"
  - name_template: "ghcr.io/eunolabs/eunox-db-token-svc:latest"
    image_templates:
      - "ghcr.io/eunolabs/eunox-db-token-svc:{{ .Version }}-amd64"
      - "ghcr.io/eunolabs/eunox-db-token-svc:{{ .Version }}-arm64"

  - name_template: "ghcr.io/eunolabs/eunox-storage-grant-svc:{{ .Version }}"
    image_templates:
      - "ghcr.io/eunolabs/eunox-storage-grant-svc:{{ .Version }}-amd64"
      - "ghcr.io/eunolabs/eunox-storage-grant-svc:{{ .Version }}-arm64"
  - name_template: "ghcr.io/eunolabs/eunox-storage-grant-svc:latest"
    image_templates:
      - "ghcr.io/eunolabs/eunox-storage-grant-svc:{{ .Version }}-amd64"
      - "ghcr.io/eunolabs/eunox-storage-grant-svc:{{ .Version }}-arm64"

  - name_template: "ghcr.io/eunolabs/eunox-posture-emitter:{{ .Version }}"
    image_templates:
      - "ghcr.io/eunolabs/eunox-posture-emitter:{{ .Version }}-amd64"
      - "ghcr.io/eunolabs/eunox-posture-emitter:{{ .Version }}-arm64"
  - name_template: "ghcr.io/eunolabs/eunox-posture-emitter:latest"
    image_templates:
      - "ghcr.io/eunolabs/eunox-posture-emitter:{{ .Version }}-amd64"
      - "ghcr.io/eunolabs/eunox-posture-emitter:{{ .Version }}-arm64"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
  groups:
    - title: "🚀 Features"
      regexp: '^.*?feat(\([[:word:]]+\))?!?:.+$'
    - title: "🐛 Bug Fixes"
      regexp: '^.*?fix(\([[:word:]]+\))?!?:.+$'
    - title: "🔒 Security"
      regexp: '^.*?sec(\([[:word:]]+\))?!?:.+$'
    - title: "Others"
      order: 999

release:
  github:
    owner: eunolabs
    name: eunox
  prerelease: auto
  draft: false
  name_template: "v{{ .Version }}"
