# goreleaser configuration for eunox
# See https://goreleaser.com/customization/

version: 2

project_name: eunox

before:
  hooks:
    - make check-license

builds:
  # ── eunox-mcp (public, Apache-2.0) ─────────────────────────────────────────
  # The primary open-source binary.  Builds for 5 platforms including Windows
  # so Claude Desktop users on all platforms can install via `go install` or
  # a pre-built release binary.
  - id: mcp
    main: ./cmd/mcp
    binary: eunox-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # Exclude the unsupported darwin/arm64 + windows/arm64 combination —
    # goreleaser will still build linux/arm64 and darwin/arm64.
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

  # ── Legacy platform services (BUSL-1.1) ───────────────────────────────────
  - id: gateway
    main: ./cmd/gateway
    binary: eunox-gateway
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

  - id: issuer
    main: ./cmd/issuer
    binary: eunox-issuer
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

  - id: minter
    main: ./cmd/minter
    binary: eunox-minter
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

  - id: db-token-svc
    main: ./cmd/db-token-svc
    binary: eunox-db-token-svc
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

  - id: storage-grant-svc
    main: ./cmd/storage-grant-svc
    binary: eunox-storage-grant-svc
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

  - id: posture-emitter
    main: ./cmd/posture-emitter
    binary: eunox-posture-emitter
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  # eunox-mcp archive: include the Apache-2.0 license from cmd/mcp/LICENSE.
  - id: mcp
    ids: [mcp]
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "eunox-mcp_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - src: cmd/mcp/LICENSE
        dst: LICENSE
      - README.md

  # All other binaries.
  - id: default
    ids:
      - gateway
      - issuer
      - minter
      - db-token-svc
      - storage-grant-svc
      - posture-emitter
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - NOTICE
      - README.md
      - docs/deployment.md

dockers:
  # ── eunox-mcp ───────────────────────────────────────────────────────────────
  - id: mcp-amd64
    ids: [mcp]
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/eunolabs/eunox-mcp:{{ .Version }}-amd64"
    dockerfile: deploy/docker/Dockerfile.mcp
    build_flag_templates:
      - "--label=org.opencontainers.image.source=https://github.com/eunolabs/eunox"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.title=eunox-mcp"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"
      - "--build-arg=VERSION={{ .Version }}"
      - "--build-arg=TARGETARCH=amd64"

  - id: mcp-arm64
    ids: [mcp]
    goos: linux
    goarch: arm64
    image_templates:
      - "ghcr.io/eunolabs/eunox-mcp:{{ .Version }}-arm64"
    dockerfile: deploy/docker/Dockerfile.mcp
    build_flag_templates:
      - "--label=org.opencontainers.image.source=https://github.com/eunolabs/eunox"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.title=eunox-mcp"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"
      - "--build-arg=VERSION={{ .Version }}"
      - "--build-arg=TARGETARCH=arm64"

  # ── Legacy platform services ─────────────────────────────────────────────
  # Gateway
  - id: gateway-amd64
    ids: [gateway]
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/eunolabs/eunox-gateway:{{ .Version }}-amd64"
    dockerfile: deploy/docker/Dockerfile.goreleaser
    build_flag_templates:
      - "--label=org.opencontainers.image.source=https://github.com/eunolabs/eunox"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.title=eunox-gateway"
      - "--build-arg=BINARY={{ .Binary }}"

  - id: gateway-arm64
    ids: [gateway]
    goos: linux
    goarch: arm64
    image_templates:
      - "ghcr.io/eunolabs/eunox-gateway:{{ .Version }}-arm64"
    dockerfile: deploy/docker/Dockerfile.goreleaser
    build_flag_templates:
      - "--label=org.opencontainers.image.source=https://github.com/eunolabs/eunox"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.title=eunox-gateway"
      - "--build-arg=BINARY={{ .Binary }}"

  # Issuer
  - id: issuer-amd64
    ids: [issuer]
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/eunolabs/eunox-issuer:{{ .Version }}-amd64"
    dockerfile: deploy/docker/Dockerfile.goreleaser
    build_flag_templates:
      - "--label=org.opencontainers.image.source=https://github.com/eunolabs/eunox"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.title=eunox-issuer"
      - "--build-arg=BINARY={{ .Binary }}"

  - id: issuer-arm64
    ids: [issuer]
    goos: linux
    goarch: arm64
    image_templates:
      - "ghcr.io/eunolabs/eunox-issuer:{{ .Version }}-arm64"
    dockerfile: deploy/docker/Dockerfile.goreleaser
    build_flag_templates:
      - "--label=org.opencontainers.image.source=https://github.com/eunolabs/eunox"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.title=eunox-issuer"
      - "--build-arg=BINARY={{ .Binary }}"

  # Minter
  - id: minter-amd64
    ids: [minter]
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/eunolabs/eunox-minter:{{ .Version }}-amd64"
    dockerfile: deploy/docker/Dockerfile.goreleaser
    build_flag_templates:
      - "--label=org.opencontainers.image.source=https://github.com/eunolabs/eunox"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.title=eunox-minter"
      - "--build-arg=BINARY={{ .Binary }}"

  - id: minter-arm64
    ids: [minter]
    goos: linux
    goarch: arm64
    image_templates:
      - "ghcr.io/eunolabs/eunox-minter:{{ .Version }}-arm64"
    dockerfile: deploy/docker/Dockerfile.goreleaser
    build_flag_templates:
      - "--label=org.opencontainers.image.source=https://github.com/eunolabs/eunox"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.title=eunox-minter"
      - "--build-arg=BINARY={{ .Binary }}"

  # DB Token Service
  - id: db-token-svc-amd64
    ids: [db-token-svc]
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/eunolabs/eunox-db-token-svc:{{ .Version }}-amd64"
    dockerfile: deploy/docker/Dockerfile.goreleaser
    build_flag_templates:
      - "--label=org.opencontainers.image.source=https://github.com/eunolabs/eunox"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.title=eunox-db-token-svc"
      - "--build-arg=BINARY={{ .Binary }}"

  - id: db-token-svc-arm64
    ids: [db-token-svc]
    goos: linux
    goarch: arm64
    image_templates:
      - "ghcr.io/eunolabs/eunox-db-token-svc:{{ .Version }}-arm64"
    dockerfile: deploy/docker/Dockerfile.goreleaser
    build_flag_templates:
      - "--label=org.opencontainers.image.source=https://github.com/eunolabs/eunox"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.title=eunox-db-token-svc"
      - "--build-arg=BINARY={{ .Binary }}"

  # Storage Grant Service
  - id: storage-grant-svc-amd64
    ids: [storage-grant-svc]
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/eunolabs/eunox-storage-grant-svc:{{ .Version }}-amd64"
    dockerfile: deploy/docker/Dockerfile.goreleaser
    build_flag_templates:
      - "--label=org.opencontainers.image.source=https://github.com/eunolabs/eunox"
