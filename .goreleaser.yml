docker_manifests:
  - name_template: "ghcr.io/edgeobs/eunox-gateway:{{ .Version }}"
    image_templates:
      - "ghcr.io/edgeobs/eunox-gateway:{{ .Version }}-amd64"
      - "ghcr.io/edgeobs/eunox-gateway:{{ .Version }}-arm64"
  - name_template: "ghcr.io/edgeobs/eunox-gateway:latest"
    image_templates:
      - "ghcr.io/edgeobs/eunox-gateway:{{ .Version }}-amd64"
      - "ghcr.io/edgeobs/eunox-gateway:{{ .Version }}-arm64"

  - name_template: "ghcr.io/edgeobs/eunox-issuer:{{ .Version }}"
    image_templates:
      - "ghcr.io/edgeobs/eunox-issuer:{{ .Version }}-amd64"
      - "ghcr.io/edgeobs/eunox-issuer:{{ .Version }}-arm64"
  - name_template: "ghcr.io/edgeobs/eunox-issuer:latest"
    image_templates:
      - "ghcr.io/edgeobs/eunox-issuer:{{ .Version }}-amd64"
      - "ghcr.io/edgeobs/eunox-issuer:{{ .Version }}-arm64"

  - name_template: "ghcr.io/edgeobs/eunox-minter:{{ .Version }}"
    image_templates:
      - "ghcr.io/edgeobs/eunox-minter:{{ .Version }}-amd64"
      - "ghcr.io/edgeobs/eunox-minter:{{ .Version }}-arm64"
  - name_template: "ghcr.io/edgeobs/eunox-minter:latest"
    image_templates:
      - "ghcr.io/edgeobs/eunox-minter:{{ .Version }}-amd64"
      - "ghcr.io/edgeobs/eunox-minter:{{ .Version }}-arm64"

  - name_template: "ghcr.io/edgeobs/eunox-db-token-svc:{{ .Version }}"
    image_templates:
      - "ghcr.io/edgeobs/eunox-db-token-svc:{{ .Version }}-amd64"
      - "ghcr.io/edgeobs/eunox-db-token-svc:{{ .Version }}-arm64"
  - name_template: "ghcr.io/edgeobs/eunox-db-token-svc:latest"
    image_templates:
      - "ghcr.io/edgeobs/eunox-db-token-svc:{{ .Version }}-amd64"
      - "ghcr.io/edgeobs/eunox-db-token-svc:{{ .Version }}-arm64"

  - name_template: "ghcr.io/edgeobs/eunox-storage-grant-svc:{{ .Version }}"
    image_templates:
      - "ghcr.io/edgeobs/eunox-storage-grant-svc:{{ .Version }}-amd64"
      - "ghcr.io/edgeobs/eunox-storage-grant-svc:{{ .Version }}-arm64"
  - name_template: "ghcr.io/edgeobs/eunox-storage-grant-svc:latest"
    image_templates:
      - "ghcr.io/edgeobs/eunox-storage-grant-svc:{{ .Version }}-amd64"
      - "ghcr.io/edgeobs/eunox-storage-grant-svc:{{ .Version }}-arm64"

  - name_template: "ghcr.io/edgeobs/eunox-posture-emitter:{{ .Version }}"
    image_templates:
      - "ghcr.io/edgeobs/eunox-posture-emitter:{{ .Version }}-amd64"
      - "ghcr.io/edgeobs/eunox-posture-emitter:{{ .Version }}-arm64"
  - name_template: "ghcr.io/edgeobs/eunox-posture-emitter:latest"
    image_templates:
      - "ghcr.io/edgeobs/eunox-posture-emitter:{{ .Version }}-amd64"
      - "ghcr.io/edgeobs/eunox-posture-emitter:{{ .Version }}-arm64"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
  groups:
    - title: "🚀 Features"
      regexp: '^.*?feat(\([[:word:]]+\))?!?:.+$'
    - title: "🐛 Bug Fixes"
      regexp: '^.*?fix(\([[:word:]]+\))?!?:.+$'
    - title: "🔒 Security"
      regexp: '^.*?sec(\([[:word:]]+\))?!?:.+$'
    - title: "Others"
      order: 999

release:
  github:
    owner: edgeobs
    name: eunox
  prerelease: auto
  draft: false
  name_template: "v{{ .Version }}"
