# ─── euno Reference Policy — Filesystem MCP Server ──────────────────────────
#
# Upstream:  @modelcontextprotocol/server-filesystem ^0.6.0
#            https://github.com/modelcontextprotocol/servers/tree/main/src/filesystem
#
# Blocks:
#   • Write / delete operations on paths outside /data/ (blocked by argumentSchema)
#   • Executable and binary file types (.exe .sh .bat .cmd .ps1 .bin .so .dylib)
#     via allowedExtensions on write/delete tools
#   • Unlimited write bursts (maxCalls guard on destructive tools)
#
# Allows:
#   • read_file, get_file_info, list_directory, search_files on any path
#   • write_file, create_directory, delete_file, move_file — restricted to
#     /data/ prefix and safe text-only extensions (.txt .md .json .csv .yaml .yml)
#
# README: public/packages/mcp/policies/README.md
# ─────────────────────────────────────────────────────────────────────────────

agentId: filesystem-agent
name: "Filesystem Agent — Reference Policy"
version: 1.0.0
metadata:
  description: >-
    Read access is unrestricted by path but limited to safe text-based extensions.
    All write and delete operations are confined to the /data/ directory and to
    safe text-based extensions. Executable and binary types are globally blocked
    on mutating tools. A burst guard prevents runaway delete loops.
  tags: [filesystem, extension-allowlist, write-confined-to-data]

requiredCapabilities:
  # ── Read tools — safe extension allowlist ───────────────────────────────────
  - resource: read_file
    actions: [call]
    conditions:
      - type: allowedExtensions
        extensions: [.txt, .md, .json, .csv, .yaml, .yml, .log, .xml, .html, .toml, .ini]

  - resource: get_file_info
    actions: [call]

  - resource: list_directory
    actions: [call]

  - resource: search_files
    actions: [call]

  # ── Write tools — /data/ prefix + text-safe extensions ─────────────────────
  - resource: write_file
    actions: [call]
    argumentSchema:
      type: object
      properties:
        path:
          type: string
          pattern: "/data/.*"
        content:
          type: string
      required: [path, content]
      additionalProperties: false
    conditions:
      - type: allowedExtensions
        extensions: [.txt, .md, .json, .csv, .yaml, .yml]
      - type: maxCalls
        count: 100
        windowSeconds: 60

  - resource: create_directory
    actions: [call]
    argumentSchema:
      type: object
      properties:
        path:
          type: string
          pattern: "/data/.*"
      required: [path]
      additionalProperties: false

  # ── Destructive tools — /data/ prefix + text-safe extensions + burst guard ─
  - resource: delete_file
    actions: [call]
    argumentSchema:
      type: object
      properties:
        path:
          type: string
          pattern: "/data/.*"
      required: [path]
      additionalProperties: false
    conditions:
      - type: allowedExtensions
        extensions: [.txt, .md, .json, .csv, .yaml, .yml]
      - type: maxCalls
        count: 5
        windowSeconds: 60

  - resource: move_file
    actions: [call]
    argumentSchema:
      type: object
      properties:
        source:
          type: string
          pattern: "/data/.*"
        destination:
          type: string
          pattern: "/data/.*"
      required: [source, destination]
      additionalProperties: false
    conditions:
      - type: allowedExtensions
        extensions: [.txt, .md, .json, .csv, .yaml, .yml]
