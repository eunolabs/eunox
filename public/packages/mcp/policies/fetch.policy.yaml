# ─── euno Reference Policy — Fetch MCP Server ────────────────────────────────
#
# Upstream:  mcp-server-fetch ^0.6.0 / @modelcontextprotocol/server-fetch
#            https://github.com/modelcontextprotocol/servers/tree/main/src/fetch
#
# Blocks:
#   • Any URL that does not begin with https:// (HTTP is rejected)
#   • Requests to private / link-local / loopback IP ranges via URL pattern:
#       - 127.x.x.x  (loopback)
#       - 10.x.x.x   (RFC-1918 Class A)
#       - 192.168.x.x (RFC-1918 Class C)
#       - 172.16.x.x – 172.31.x.x (RFC-1918 Class B)
#       - 169.254.x.x (link-local / AWS+GCP metadata endpoint)
#       - localhost    (hostname alias for loopback)
#   • Non-safe HTTP methods (only GET, HEAD, OPTIONS are allowed)
#   • Runaway fetch bursts (maxCalls: 60 / 60 s)
#
# Allows:
#   • HTTPS GET/HEAD/OPTIONS to any public internet host
#
# Security note:
#   This policy guards against Server-Side Request Forgery (SSRF) by
#   constraining both the URL scheme and the target IP range at the
#   argumentSchema level, before the upstream fetch server is ever contacted.
#   A defense-in-depth deployment should also run the fetch server with
#   network-level egress controls.
#
# README: public/packages/mcp/policies/README.md
# ─────────────────────────────────────────────────────────────────────────────

agentId: fetch-agent
name: "Fetch Agent — Reference Policy (Public HTTPS Only / SSRF Guard)"
version: 1.0.0
metadata:
  description: >-
    Blocks SSRF attacks by requiring HTTPS and rejecting URLs whose host
    resolves to private RFC-1918 ranges, the loopback address, or the
    cloud-provider metadata endpoint (169.254.169.254). Only GET, HEAD, and
    OPTIONS methods are permitted. All constraints are enforced at the
    argumentSchema level before the upstream server is contacted.
  tags: [fetch, ssrf-protection, https-only, private-ip-blocklist, safe-methods-only]

requiredCapabilities:
  - resource: fetch
    actions: [call]
    argumentSchema:
      type: object
      properties:
        url:
          type: string
          # Require https:// AND block private/loopback/metadata IP ranges.
          # The validator wraps this with ^(?:...)$ so the pattern must match
          # the entire URL. The negative lookahead rejects hostnames that
          # match common private ranges and localhost.
          pattern: "https://(?!(?:localhost|127\\.|10\\.|192\\.168\\.|172\\.(?:1[6-9]|2[0-9]|3[01])\\.|169\\.254\\.)).*"
        method:
          type: string
          enum: [GET, HEAD, OPTIONS]
      required: [url]
      additionalProperties: false
    conditions:
      - type: maxCalls
        count: 60
        windowSeconds: 60
