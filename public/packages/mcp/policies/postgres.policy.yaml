# ─── euno Reference Policy — Postgres MCP Server ────────────────────────────
#
# Upstream:  @modelcontextprotocol/server-postgres ^0.5.0
#            https://github.com/modelcontextprotocol/servers/tree/main/src/postgres
#
# Blocks:
#   • Non-SELECT SQL verbs: INSERT, UPDATE, DELETE, DROP, ALTER, CREATE,
#     TRUNCATE, GRANT, REVOKE (blocked by allowedOperations)
#   • Access to credential and audit tables: users, auth_tokens, secrets,
#     audit_log, sessions (blocked by allowedTables)
#   • Runaway query bursts (maxCalls: 100 / 60 s)
#
# Allows:
#   • SELECT, EXPLAIN, SHOW on the listed business tables:
#     orders, products, customers, inventory, catalog
#   • Schema introspection: list_tables, describe_table (no conditions)
#
# README: public/packages/mcp/policies/README.md
# ─────────────────────────────────────────────────────────────────────────────

agentId: postgres-read-agent
name: "Postgres Read-Only Agent — Reference Policy"
version: 1.0.0
metadata:
  description: >-
    Restricts all SQL execution to SELECT, EXPLAIN, and SHOW against an
    explicit allowlist of business tables. DDL and DML write operations are
    blocked at the operation level. Credential and audit tables are excluded
    from the table allowlist so they are always denied regardless of SQL verb.
    Schema introspection tools are left unrestricted for developer ergonomics.
  tags: [postgres, read-only, select-only, table-allowlist, sql-guard]

requiredCapabilities:
  # ── Query execution — SELECT-only on approved business tables ───────────────
  - resource: query
    actions: [call]
    conditions:
      - type: allowedOperations
        operations: [SELECT, EXPLAIN, SHOW]
      - type: allowedTables
        tables: [orders, products, customers, inventory, catalog]
      - type: maxCalls
        count: 100
        windowSeconds: 60

  # ── Schema introspection — unrestricted ─────────────────────────────────────
  - resource: list_tables
    actions: [call]

  - resource: describe_table
    actions: [call]
