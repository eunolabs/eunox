# ─── euno Reference Policy — Slack MCP Server ────────────────────────────────
#
# Upstream:  @modelcontextprotocol/server-slack ^0.3.0
#            https://github.com/modelcontextprotocol/servers/tree/main/src/slack
#
# What this policy enforces:
#   • Direct messages (send_dm) are restricted to internal company.com addresses
#     via the recipientDomain condition.
#   • Message burst protection via maxCalls on send_dm and post_message.
#
# Note on unlisted tools (file uploads, workspace admin, channel management):
#   The euno-mcp PDP default is ALLOW for any tool with no matching constraint.
#   File uploads, channel management, and workspace admin tools are not listed
#   here and will therefore be allowed. Add explicit constraints to restrict
#   those tools if needed.
#
# Note on recipientDomain vs. post_message:
#   post_message uses a Slack channel ID (e.g. C12345) as its target, not an
#   email address, so the recipientDomain condition cannot meaningfully filter
#   it. Channel access control should be handled at the Slack workspace level
#   or via a custom condition. This policy applies recipientDomain only to
#   send_dm where the `to` field contains an email-style address.
#
# README: public/packages/mcp/policies/README.md
# ─────────────────────────────────────────────────────────────────────────────

agentId: slack-agent
name: "Slack Agent — Reference Policy (Internal Only)"
version: 0.1.0
metadata:
  description: >-
    Restricts outbound Slack messages so only internal company.com users can be
    direct-messaged. Channel posting is allowed with a burst guard. Tools not
    listed in the manifest (file uploads, channel deletion, workspace admin
    operations) are allowed by default — euno-mcp allows calls that match no
    constraint. Add explicit constraints to restrict additional tools.
  tags: [slack, internal-only, recipient-domain-allowlist, rate-limited]

requiredCapabilities:
  # ── Direct messages — internal addresses only ────────────────────────────────
  - resource: send_dm
    actions: [call]
    conditions:
      - type: recipientDomain
        domains: [company.com]
      - type: maxCalls
        count: 20
        windowSeconds: 3600

  # ── Channel posting — rate-limited, no domain gate (channel-ID addressed) ──
  - resource: post_message
    actions: [call]
    conditions:
      - type: maxCalls
        count: 50
        windowSeconds: 3600

  # ── Read tools — unrestricted ────────────────────────────────────────────────
  - resource: list_channels
    actions: [call]

  - resource: get_channel_history
    actions: [call]
    conditions:
      - type: maxCalls
        count: 100
        windowSeconds: 3600

  - resource: list_users
    actions: [call]
