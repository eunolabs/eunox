name: Go CI

on:
  push:
    branches: [main]
    paths:
      - 'euno-go/**'
      - '.github/workflows/go-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'euno-go/**'
      - '.github/workflows/go-ci.yml'

defaults:
  run:
    working-directory: euno-go

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: euno-go/go.sum

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.6
          working-directory: euno-go

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: euno-go/go.sum

      - name: Run tests with race detector
        run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      - name: Check coverage threshold (80% for pkg/)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}')
          echo "Total coverage: ${COVERAGE}%"
          PKG_COVERAGE=$(go tool cover -func=coverage.out | grep "^github.com/edgeobs/euno-platform/euno-go/pkg/" | awk '{sum += substr($3, 1, length($3)-1); n++} END {if (n>0) printf "%.1f", sum/n; else print "0"}')
          echo "pkg/ average coverage: ${PKG_COVERAGE}%"
          if [ "$(echo "$PKG_COVERAGE < 80" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage for pkg/ is below 80% threshold: ${PKG_COVERAGE}%"
            exit 1
          fi

  license-check:
    name: License Headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check BSL license headers
        working-directory: euno-go
        run: make check-license

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: euno-go/go.sum

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build ./...
