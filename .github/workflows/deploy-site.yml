name: Deploy to Cloudflare Pages

# Deploys the Astro site in site/ to Cloudflare Pages (free tier) whenever
# changes land on main inside the site/ directory, or when this workflow file
# is modified.
#
# Prerequisites:
#  1. Create a Cloudflare Pages project named "eunolabs-site" in the dashboard
#     and connect the custom domain eunolabs.ai (see site/wrangler.toml).
#  2. Add these repository SECRETS (Settings → Secrets and variables → Actions):
#       CLOUDFLARE_API_TOKEN   — API token with "Cloudflare Pages: Edit" permission
#       CLOUDFLARE_ACCOUNT_ID  — your Cloudflare account ID
#  3. Enable GitHub Discussions on this repository, install the Giscus GitHub App
#     (https://github.com/apps/giscus), then visit https://giscus.app/ to obtain
#     the repo ID and category ID.  Add these repository VARIABLES:
#       GISCUS_REPO_ID         — opaque repo ID from giscus.app
#       GISCUS_CATEGORY_ID     — opaque category ID from giscus.app

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy-site.yml"
  # Allow a manual redeploy from the Actions tab without a code push.
  workflow_dispatch:

# Least-privilege token — Cloudflare deployment uses its own credentials.
# `actions: write` is required for actions/upload-artifact (build job) and
# `actions: read` for actions/download-artifact (deploy job); an explicit
# permissions block sets all unspecified scopes to none, so we must list both.
permissions:
  contents: read
  actions: write

# Prevent concurrent deployments.
concurrency:
  group: cloudflare-pages
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # build: install Astro, compile to static HTML.
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      # Install only the site's own dependencies — avoids pulling the entire
      # platform monorepo for a static site build.
      - name: Install site dependencies
        run: npm install
        working-directory: site

      - name: Build Astro site
        run: npm run build
        working-directory: site
        env:
          # Giscus comment widget configuration.
          # Set GISCUS_REPO_ID and GISCUS_CATEGORY_ID as repository variables
          # in Settings → Secrets and variables → Actions → Variables.
          # If either ID is unset, the Giscus widget is suppressed entirely
          # (no comments section shown) rather than rendering with empty config.
          PUBLIC_GISCUS_REPO: eunolabs/eunox
          PUBLIC_GISCUS_REPO_ID: ${{ vars.GISCUS_REPO_ID }}
          PUBLIC_GISCUS_CATEGORY: Blog Comments
          PUBLIC_GISCUS_CATEGORY_ID: ${{ vars.GISCUS_CATEGORY_ID }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: site-dist
          path: site/dist
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────────────
  # deploy: publish the built artifact to Cloudflare Pages.
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Cloudflare Pages
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4.3.0
        with:
          name: site-dist
          # Download to ./dist so the wrangler command below can reference it
          # directly without a checkout step.
          path: dist

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Pass project name and output directory explicitly so this job does
          # not need a repository checkout.  wrangler.toml in site/ is used for
          # local development; CI uses these flags instead.
          command: pages deploy dist --project-name=eunolabs-site

