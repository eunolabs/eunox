#
# End-to-end integration tests for the OPA/Envoy comparison demo.
# Each scenario builds the Docker Compose stack, runs the scenario script
# that exercises both OPA and eunox-mcp, and tears everything down.
#
# Jobs run in parallel (one per scenario) on separate runners so there
# are no port conflicts and the suite finishes in ~scenario-1 time.
#
# Triggered on:
#   - push / PR touching demo code, enforcement engine, proxy, or Dockerfile
#   - manual dispatch (workflow_dispatch)
#
# All required tools are pre-installed on ubuntu-latest:
#   Docker Engine + Compose v2, jq, make, curl, bash

name: Demo Integration Tests

on:
  push:
    branches: [main, "copilot/**"]
    paths:
      - "demo/opa-comparison/**"
      - "pkg/enforcement/**"
      - "cmd/mcp/**"
      - "deploy/docker/**"
  pull_request:
    branches: [main]
    paths:
      - "demo/opa-comparison/**"
      - "pkg/enforcement/**"
      - "cmd/mcp/**"
      - "deploy/docker/**"
  workflow_dispatch: {}

concurrency:
  group: demo-integration-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  opa-comparison:
    name: "OPA comparison / ${{ matrix.scenario }}"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      # Keep running the other scenarios even if one fails so we see
      # all failures in a single CI run rather than one at a time.
      fail-fast: false
      matrix:
        scenario: [scenario-1, scenario-2, scenario-3]

    steps:
      - uses: actions/checkout@v4

      - name: Print toolchain versions
        run: |
          docker version --format 'Docker {{.Server.Version}}'
          docker compose version
          jq --version
          make --version | head -1

      - name: Run ${{ matrix.scenario }}
        run: make -C demo/opa-comparison ${{ matrix.scenario }}
        # CI=true is already set by GitHub Actions; common.sh reads it to
        # suppress ANSI colour codes so the log output is clean.

      # On failure, capture container logs before the Makefile cleanup
      # removes the stack.  The cleanup step in the Makefile always runs
      # (see the ;STATUS=$$?; pattern), but Docker may already be down
      # when this step fires — the "|| true" handles that gracefully.
      - name: Dump container logs on failure
        if: failure()
        run: |
          docker compose -f demo/opa-comparison/docker-compose.yml \
            logs --no-color --timestamps 2>/dev/null || true

      - name: Force cleanup on failure
        if: failure()
        run: |
          docker compose -f demo/opa-comparison/docker-compose.yml \
            down --remove-orphans --volumes 2>/dev/null || true
