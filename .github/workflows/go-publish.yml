name: Go Publish

# Disabled: set to false until ready for public release.
# To enable, change the `if: false` condition on the publish job below,
# then push a semver tag (e.g. v1.0.0) to trigger this workflow.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  publish:
    name: Publish Go Module
    runs-on: ubuntu-latest
    if: false # disabled until ready for public release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: go.sum

      - name: Verify module
        run: go mod verify

      - name: Build all targets
        run: go build ./...

      - name: Run tests
        run: go test -race -count=1 ./...

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true

      # pkg.go.dev indexes public modules automatically once a tag is pushed
      # and a release is created. No additional step is required.
