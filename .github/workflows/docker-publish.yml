name: Docker Publish

# Triggered by semver tags (e.g. v1.2.3). Pre-release tags (e.g. v1.0.0-rc.1)
# build and push but do NOT update the `latest` / `latest-windows` tags.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

jobs:
  # ── Linux: linux/amd64 + linux/arm64 via BuildKit + QEMU ────────────────────
  docker-linux:
    name: Linux image (amd64 + arm64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # QEMU enables cross-compilation emulation for arm64 on an amd64 runner.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Generates tags: 1.2.3 / 1.2 / 1 / latest (skips latest for pre-releases).
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: eunolabs/eunox-mcp
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push Linux image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.mcp
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Windows: windows/amd64 (requires Windows runner for Windows containers) ──
  docker-windows:
    name: Windows image (amd64)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Generates tags with a -windows suffix: 1.2.3-windows / 1.2-windows /
      # 1-windows / latest-windows (skips latest-windows for pre-releases).
      - name: Extract image metadata (Windows)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: eunolabs/eunox-mcp
          flavor: |
            latest=auto
            suffix=-windows,onlatest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push Windows image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.mcp.windows
          platforms: windows/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
