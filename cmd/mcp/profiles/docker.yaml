server: docker
description: "Docker — container and image management (Docker MCP)"
tools:
  # Containers — read
  list_containers: read
  get_container: read
  inspect_container: read
  get_container_logs: read
  get_container_stats: read
  # Containers — execute / lifecycle
  start_container: execute
  stop_container: execute
  restart_container: execute
  pause_container: execute
  unpause_container: execute
  exec_in_container: execute
  run_container: execute
  # Containers — write / delete
  create_container: write
  rename_container: write
  remove_container: delete
  kill_container: execute
  # Images
  list_images: read
  inspect_image: read
  pull_image: write
  build_image: write
  tag_image: write
  push_image: write
  remove_image: delete
  prune_images: delete
  # Volumes
  list_volumes: read
  inspect_volume: read
  create_volume: write
  remove_volume: delete
  prune_volumes: delete
  # Networks
  list_networks: read
  inspect_network: read
  create_network: write
  remove_network: delete
  connect_container_to_network: write
  disconnect_container_from_network: write
  # System
  docker_info: read
  docker_version: read
  docker_system_prune: delete
