server: puppeteer
description: "@modelcontextprotocol/server-puppeteer — headless browser automation via Puppeteer"
tools:
  # Page navigation / read
  puppeteer_navigate: execute
  puppeteer_screenshot: read
  puppeteer_get_content: read
  # DOM interactions (execute — mutates page state)
  puppeteer_click: execute
  puppeteer_fill: execute
  puppeteer_select: execute
  puppeteer_hover: execute
  puppeteer_type: execute
  puppeteer_press: execute
  puppeteer_scroll: execute
  puppeteer_wait_for_selector: execute
  puppeteer_wait_for_navigation: execute
  # JavaScript evaluation
  puppeteer_evaluate: execute
  # New tab / close
  puppeteer_new_tab: execute
  puppeteer_close_tab: execute
