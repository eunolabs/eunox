server: aws
description: "AWS — cloud infrastructure management (AWS MCP / Bedrock agent tools)"
tools:
  # EC2
  ec2_describe_instances: read
  ec2_describe_security_groups: read
  ec2_describe_vpcs: read
  ec2_describe_subnets: read
  ec2_describe_images: read
  ec2_start_instance: execute
  ec2_stop_instance: execute
  ec2_reboot_instance: execute
  ec2_terminate_instance: delete
  ec2_create_instance: write
  ec2_create_security_group: write
  ec2_authorize_security_group_ingress: admin
  ec2_revoke_security_group_ingress: admin
  # S3
  s3_list_buckets: read
  s3_list_objects: read
  s3_head_object: read
  s3_get_object: read
  s3_put_object: write
  s3_copy_object: write
  s3_delete_object: delete
  s3_delete_bucket: delete
  s3_create_bucket: write
  # IAM
  iam_list_roles: read
  iam_get_role: read
  iam_list_policies: read
  iam_get_policy: read
  iam_list_users: read
  iam_get_user: read
  iam_create_role: admin
  iam_delete_role: admin
  iam_attach_role_policy: admin
  iam_detach_role_policy: admin
  iam_create_policy: admin
  iam_delete_policy: admin
  # Lambda
  lambda_list_functions: read
  lambda_get_function: read
  lambda_invoke: execute
  lambda_update_function_code: write
  lambda_update_function_configuration: write
  lambda_create_function: write
  lambda_delete_function: delete
  # CloudWatch
  cloudwatch_list_metrics: read
  cloudwatch_get_metric_data: read
  cloudwatch_get_metric_statistics: read
  cloudwatch_describe_alarms: read
  cloudwatch_put_metric_alarm: write
  cloudwatch_delete_alarms: delete
  # CloudFormation
  cloudformation_list_stacks: read
  cloudformation_describe_stacks: read
  cloudformation_get_template: read
  cloudformation_create_stack: write
  cloudformation_update_stack: write
  cloudformation_delete_stack: delete
  # RDS
  rds_describe_db_instances: read
  rds_describe_db_clusters: read
  rds_start_db_instance: execute
  rds_stop_db_instance: execute
  rds_create_db_instance: write
  rds_delete_db_instance: delete
