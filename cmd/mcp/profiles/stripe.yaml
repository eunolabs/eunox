server: stripe
description: "Stripe — payment processing (stripe/agent-toolkit)"
tools:
  # Customers
  list_customers: read
  get_customer: read
  search_customers: read
  create_customer: write
  update_customer: write
  delete_customer: delete
  # Payment intents
  list_payment_intents: read
  get_payment_intent: read
  create_payment_intent: write
  update_payment_intent: write
  cancel_payment_intent: write
  confirm_payment_intent: write
  # Subscriptions
  list_subscriptions: read
  get_subscription: read
  create_subscription: write
  update_subscription: write
  cancel_subscription: write
  # Products and prices
  list_products: read
  get_product: read
  create_product: write
  update_product: write
  archive_product: delete
  list_prices: read
  get_price: read
  create_price: write
  update_price: write
  # Invoices
  list_invoices: read
  get_invoice: read
  create_invoice: write
  finalize_invoice: write
  pay_invoice: write
  void_invoice: write
  # Refunds and disputes
  list_refunds: read
  create_refund: write
  list_disputes: read
  update_dispute: write
  # Balance and transactions
  get_balance: read
  list_balance_transactions: read
  list_charges: read
  get_charge: read
