openapi: 3.0.3
info:
  title: Euno Tool Gateway API
  description: |
    The Tool Gateway is the policy enforcement point for AI-agent traffic.
    Every tool invocation and every proxied request must carry a capability
    token in the `Authorization: Bearer <token>` header; the gateway verifies
    the signature, checks revocation, evaluates the policy, and either
    forwards the request or returns 401/403.

    Admin endpoints under `/admin/*` are protected by an optional API key
    (`x-admin-api-key` header).  Set `ADMIN_API_KEY` in the gateway's
    environment to enable enforcement.
  version: "0.1.0"
  license:
    name: ISC
servers:
  - url: http://localhost:3002
    description: Local development
  - url: https://gateway.example.com
    description: Production (replace with your domain)

tags:
  - name: enforcement
    description: Capability validation and tool invocation
  - name: proxy
    description: Authenticated reverse-proxy passthrough
  - name: admin
    description: Operational endpoints (protected by API key)
  - name: audit
    description: SOC2 compliance audit-trail export (protected by admin API key)
  - name: ops
    description: Health and operational endpoints

paths:
  /health:
    get:
      tags: [ops]
      summary: Liveness / readiness probe
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /metrics:
    get:
      tags: [ops]
      summary: Prometheus / OpenMetrics scrape endpoint
      description: |
        Exposes process and request-level metrics in the Prometheus text
        exposition format. Standard series include
        `euno_http_request_duration_seconds` (latency histogram labelled
        by method / route / status_code), `euno_http_requests_total`
        (request counter with the same labels),
        `euno_gateway_decisions_total{decision}` (allow / deny counter
        emitted by the enforcement engine), and
        `euno_gateway_revocation_list_size` (gauge sampled from the
        in-process revocation store).

        The endpoint is unauthenticated and intentionally bypasses the
        global rate limit so Prometheus servers can scrape on a tight
        schedule.
      responses:
        '200':
          description: Metrics in Prometheus text format
          content:
            text/plain:
              schema:
                type: string
              example: |
                # HELP euno_http_requests_total Total HTTP requests handled, labelled by method, route and status code.
                # TYPE euno_http_requests_total counter
                euno_http_requests_total{service="tool-gateway",method="GET",route="/health",status_code="200"} 12

  /api/v1/validate:
    post:
      tags: [enforcement]
      summary: Validate a capability token against an action / resource
      description: |
        Useful for testing a token without actually invoking a tool.  The
        gateway runs the same policy evaluation it would for `/api/v1/tools/invoke`
        and returns the decision.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateActionRequest'
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResult'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/enforce:
    post:
      tags: [enforcement]
      summary: Evaluate a tool request against a capability token
      description: |
        Primary runtime enforcement endpoint used by the agent runtime. The
        request includes the capability token plus a structured tool request,
        and the gateway returns an allow / deny decision with any obligations.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, request]
              properties:
                token:
                  type: string
                request:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Enforcement decision
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/tools/invoke:
    post:
      tags: [enforcement]
      summary: Invoke a tool through the gateway
      description: |
        The agent runtime calls this endpoint instead of the underlying tool
        directly.  The gateway derives the required action from a server-side
        registry of known tools and validates the capability token before
        executing.
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: x-agent-id
          schema: { type: string }
          required: false
          description: Optional agent identifier for audit logging.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tool]
              properties:
                tool:
                  type: string
                  description: Name of the tool to invoke (e.g. `read_file`).
                  example: read_file
                args:
                  description: Tool-specific arguments.
                  nullable: true
                  oneOf:
                    - type: object
                    - type: array
                    - type: string
                    - type: number
                    - type: boolean
      responses:
        '200':
          description: Tool invoked successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  tool: { type: string }
                  result:
                    type: object
                    additionalProperties: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /proxy/{path}:
    description: |
      Authenticated reverse-proxy passthrough to the configured backend
      service.  The runtime route matches `/proxy/*` (any depth), but
      OpenAPI 3.0 path parameters cannot match more than one segment, so
      this operation models the backend subpath as a single `{path}`
      parameter.  When the proxied backend path contains nested segments,
      percent-encode `/` as `%2F` inside the parameter; for example
      `/proxy/foo%2Fbar` proxies to the backend subpath `/foo/bar`.
    x-euno-greedy-path-parameter: path
    parameters:
      - in: path
        name: path
        required: true
        schema: { type: string }
        description: |
          Backend subpath to proxy as a single path parameter.  For nested
          backend paths, percent-encode `/` as `%2F` (for example,
          `foo%2Fbar` for the backend path `/foo/bar`).
        example: foo%2Fbar
    get:
      tags: [proxy]
      summary: Authenticated GET passthrough
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Backend response (proxied)
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '502':
          description: Upstream backend error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    post:
      tags: [proxy]
      summary: Authenticated POST passthrough
      security: [{ bearerAuth: [] }]
      requestBody:
        required: false
        content:
          application/json: { schema: { type: object, additionalProperties: true } }
      responses:
        '200': { description: Backend response (proxied) }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    put:
      tags: [proxy]
      summary: Authenticated PUT passthrough
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Backend response (proxied) }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    delete:
      tags: [proxy]
      summary: Authenticated DELETE passthrough
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Backend response (proxied) }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/kill-switch/status:
    get:
      tags: [admin]
      summary: Get kill-switch status
      security: [{ adminApiKey: [] }]
      responses:
        '200':
          description: Status of the global / per-session / per-agent switches
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /admin/kill-switch/global/activate:
    post:
      tags: [admin]
      summary: Activate the global kill-switch (deny all traffic)
      security: [{ adminApiKey: [] }]
      responses:
        '200': { description: Activated }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /admin/kill-switch/global/deactivate:
    post:
      tags: [admin]
      summary: Deactivate the global kill-switch
      security: [{ adminApiKey: [] }]
      responses:
        '200': { description: Deactivated }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /admin/kill-switch/session/{sessionId}/kill:
    post:
      tags: [admin]
      summary: Kill all traffic for a specific session
      security: [{ adminApiKey: [] }]
      parameters:
        - in: path
          name: sessionId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Session killed }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /admin/kill-switch/session/{sessionId}/revive:
    post:
      tags: [admin]
      summary: Revive a previously killed session
      security: [{ adminApiKey: [] }]
      parameters:
        - in: path
          name: sessionId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Session revived }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /admin/kill-switch/agent/{agentId}/kill:
    post:
      tags: [admin]
      summary: Kill all traffic for a specific agent
      security: [{ adminApiKey: [] }]
      parameters:
        - in: path
          name: agentId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Agent killed }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /admin/kill-switch/agent/{agentId}/revive:
    post:
      tags: [admin]
      summary: Revive a previously killed agent
      security: [{ adminApiKey: [] }]
      parameters:
        - in: path
          name: agentId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Agent revived }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /admin/kill-switch/reset:
    post:
      tags: [admin]
      summary: Reset all kill-switches
      security: [{ adminApiKey: [] }]
      responses:
        '200': { description: Reset }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /admin/revoke:
    post:
      tags: [admin]
      summary: Revoke a capability token by JTI
      description: |
        Adds the supplied token id to the gateway's revocation list.  When a
        Redis-backed `RevocationStore` is configured (recommended for
        production), the revocation is propagated to all gateway instances.
      security: [{ adminApiKey: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tokenId]
              properties:
                tokenId:
                  type: string
                  description: JWT ID (`jti`) of the token to revoke.
                expiresAt:
                  type: integer
                  description: |
                    Unix timestamp (seconds) when the underlying token
                    naturally expires.  Used to bound the lifetime of the
                    revocation entry.  Defaults to 24h from now.
      responses:
        '200':
          description: Revocation accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  tokenId: { type: string }
                  expiresAt: { type: integer }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '501':
          description: Revocation not available (verifier not configured)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/audit/signing-keys:
    get:
      tags: [audit]
      summary: Evidence-signing JWKS
      description: |
        Returns the gateway's evidence-signing public key as a JWK Set.
        Compliance consumers can use this to verify `SignedAuditEvidence`
        records returned by `GET /api/v1/audit/export` offline.

        This endpoint is only available when the gateway is configured with
        a **software signer** (`ENABLE_CRYPTOGRAPHIC_AUDIT=true`,
        `AUDIT_SIGNING_KMS_PROVIDER` not set).  KMS-backed deployments must
        retrieve the public key from the KMS control plane directly.

        The JWK Set is stable for the lifetime of the signing key (no
        rotation at runtime); clients may cache for up to 1 hour.
      responses:
        '200':
          description: JWK Set containing the evidence-signing public key.
          headers:
            Cache-Control:
              description: Cache lifetime hint (`public, max-age=3600`).
              schema: { type: string }
          content:
            application/json:
              schema:
                type: object
                required: [keys]
                properties:
                  keys:
                    type: array
                    items:
                      type: object
                      required: [kty, kid, alg, use]
                      properties:
                        kty:   { type: string, description: 'Key type (e.g. RSA, EC)' }
                        kid:   { type: string, description: 'Key ID — matches SignedAuditEvidence.keyId' }
                        alg:   { type: string, description: 'Signing algorithm (e.g. RS256)' }
                        use:   { type: string, description: 'Key use — always "sig"' }
        '503':
          description: Signing key not yet available (rare transient state at startup).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/audit/export:
    get:
      tags: [audit]
      summary: Export SOC2 audit-trail records
      description: |
        Returns pages of `SignedAuditEvidence` records from the gateway's
        audit ledger, suitable for SOC2 compliance review and offline
        cryptographic verification.

        ### Compliance scope filter

        The `scope` parameter maps to OCSF `class_uid` values and SOC2
        Trust Service Criteria:

        | `scope`      | OCSF class      | `class_uid` | SOC2 criteria              |
        |--------------|-----------------|-------------|----------------------------|
        | `soc2-cc6`   | Authorization   | 3003        | CC6 — Logical Access       |
        | `soc2-cc7`   | API Activity    | 6003        | CC7 — System Operations    |
        | `all`        | Both            | 3003 + 6003 | All criteria               |

        Gateway enforcement decisions are always API Activity events
        (class_uid 6003 / CC7). Authorization events (class_uid 3003 / CC6)
        originate in the capability issuer's audit trail and are not stored
        in the gateway ledger; `scope=soc2-cc6` correctly returns an empty
        records array from this endpoint.

        See `docs/security/soc2-mapping.md` for the full OCSF-to-SOC2
        mapping and offline verification procedure.

        ### Cursor-based pagination

        The `cursor` value from a previous response can be passed to
        continue from where the previous page left off. Cursors expire
        24 hours after issue; presenting an expired cursor returns 400.

        `since` and `until` are only applied on the first page (when no
        `cursor` is provided); subsequent pages inherit the original time
        bounds from the cursor so the window stays consistent across pages.

        ### Offline verification

        Each record includes a `signature` over the canonical evidence
        fields signed with the gateway's evidence-signing key.  When the
        gateway uses a software signer, the public key is served as a JWK
        Set at `GET /api/v1/audit/signing-keys` — this path is returned in
        the `verificationUri` field of the response.  When using a
        KMS-backed signer, `verificationUri` is `null` and the public key
        must be retrieved from the KMS control plane.

        See `docs/security/soc2-mapping.md` §4 for the full offline
        verification procedure.
      security: [{ adminApiKey: [] }]
      parameters:
        - name: scope
          in: query
          description: Compliance scope filter (maps to OCSF class_uid).
          schema:
            type: string
            enum: [soc2-cc6, soc2-cc7, all]
            default: all
        - name: cursor
          in: query
          description: |
            Opaque continuation cursor from the previous response. Expires
            24 hours after issue; omit on the first page.
          schema:
            type: string
        - name: pageSize
          in: query
          description: Maximum records per page (1–1000, default 100).
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - name: since
          in: query
          description: |
            Include records at or after this ISO 8601 timestamp.
            Only applied on the first page (no `cursor`).
          schema:
            type: string
            format: date-time
        - name: until
          in: query
          description: |
            Include records before this ISO 8601 timestamp.
            Only applied on the first page (no `cursor`).
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Paginated audit-trail records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditExportPage'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404':
          description: Export endpoint not available (no audit ledger configured)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    adminApiKey:
      type: apiKey
      in: header
      name: x-admin-api-key

  schemas:
    HealthResponse:
      type: object
      required: [status, service]
      properties:
        status: { type: string, example: healthy }
        service: { type: string, example: tool-gateway }

    ValidateActionRequest:
      type: object
      required: [action, resource]
      properties:
        action:
          type: string
          enum: [read, write, delete, execute]
        resource:
          type: string
          example: api://service/data
        context:
          type: object
          additionalProperties: true

    ValidationResult:
      type: object
      required: [allowed]
      properties:
        allowed: { type: boolean }
        reason: { type: string }
        capabilityId: { type: string }
        evaluatedAt: { type: string, format: date-time }

    SignedAuditEvidence:
      type: object
      description: |
        A cryptographically-signed audit evidence record produced by the
        gateway's evidence signer. Each record is bound into a tamper-evident
        hash chain via `previousHash` and `seq`.
      required: [id, ts, agentId, resource, action, capabilityId, decision, signature, keyId, algorithm, previousHash, seq]
      properties:
        id:         { type: string, description: 'Unique evidence record ID (UUID)' }
        ts:         { type: string, format: date-time, description: 'ISO-8601 timestamp of the event' }
        agentId:    { type: string, description: 'AI agent that performed the action' }
        resource:   { type: string, description: 'Resource being accessed' }
        action:     { type: string, description: 'Action performed (read, write, execute, ...)' }
        capabilityId: { type: string, description: 'Capability token JTI' }
        decision:   { type: string, enum: [allow, deny], description: 'Enforcement outcome' }
        tenantId:   { type: string, description: 'Tenant identifier from the capability token (when present)' }
        conditionType: { type: string, description: 'Condition type that caused a deny (when present)' }
        denialCode: { type: string, description: 'Machine-readable denial code (when decision=deny)' }
        signature:  { type: string, description: 'Base64-encoded digital signature of the canonical evidence' }
        keyId:      { type: string, description: 'Key ID used for signing (matches a key in the JWKS served at /api/v1/audit/signing-keys for software signers)' }
        algorithm:  { type: string, description: 'Signing algorithm (e.g. RS256)' }
        previousHash: { type: string, description: 'SHA-256 hex digest of the previous record in the chain' }
        seq:        { type: integer, description: 'Monotonically increasing sequence number (1-based)' }

    AuditExportPage:
      type: object
      required: [cursor, hasMore, records, verificationUri]
      properties:
        cursor:
          type: string
          nullable: true
          description: |
            Opaque continuation cursor for the next page, or `null` when
            this is the last page. Expires 24 hours after issue.
        hasMore:
          type: boolean
          description: Whether additional pages are available after this one.
        records:
          type: array
          items: { $ref: '#/components/schemas/SignedAuditEvidence' }
          description: Page of signed audit evidence records.
        verificationUri:
          type: string
          nullable: true
          description: |
            URI of the gateway's evidence-signing JWKS endpoint.  When the
            gateway is configured with a software signer, this is
            `/api/v1/audit/signing-keys` — a JWK Set containing the public
            key needed for offline signature verification.  `null` when the
            gateway uses a KMS-backed signer; in that case retrieve the
            public key from the KMS control plane.
          example: /api/v1/audit/signing-keys

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: AUTHORIZATION_FAILED
            message:
              type: string

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Caller is authenticated but not authorised for the action
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
