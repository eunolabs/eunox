openapi: 3.0.3
info:
  title: Euno Capability Issuer API
  description: |
    The Capability Issuer issues, attenuates, and renews capability tokens
    (signed JWTs) that authorise AI agents to perform specific actions on
    specific resources.

    All token-bearing endpoints expect an Azure AD bearer token (for the
    initial issue) or an existing capability token (for attenuate / renew)
    in the `Authorization: Bearer <token>` header.
  version: "0.1.0"
  license:
    name: ISC
servers:
  - url: http://localhost:3001
    description: Local development
  - url: https://issuer.example.com
    description: Production (replace with your domain)

tags:
  - name: capabilities
    description: Issue, attenuate, and renew capability tokens
  - name: discovery
    description: Public-key and DID document discovery endpoints
  - name: ops
    description: Health and operational endpoints

paths:
  /health:
    get:
      tags: [ops]
      summary: Liveness / readiness probe
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /metrics:
    get:
      tags: [ops]
      summary: Prometheus / OpenMetrics scrape endpoint
      description: |
        Exposes process and request-level metrics in the Prometheus text
        exposition format. Standard series include
        `euno_http_request_duration_seconds`,
        `euno_http_requests_total`, and the issuer-specific
        `euno_issuer_issuance_total{operation,outcome}` counter that
        tracks `issue` / `attenuate` / `renew` calls labelled
        `success` or `error`.

        The endpoint is unauthenticated and intentionally bypasses the
        global rate limit so Prometheus servers can scrape on a tight
        schedule.
      responses:
        '200':
          description: Metrics in Prometheus text format
          content:
            text/plain:
              schema:
                type: string
              example: |
                # HELP euno_issuer_issuance_total Capability issuance attempts at the issuer.
                # TYPE euno_issuer_issuance_total counter
                euno_issuer_issuance_total{service="capability-issuer",operation="issue",outcome="success"} 42

  /api/v1/issue:
    post:
      tags: [capabilities]
      summary: Issue a new capability token
      description: |
        Issues a new capability token to an agent based on the requesting
        identity's permissions and the requested capabilities.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueCapabilityRequest'
      responses:
        '200':
          description: Capability token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilityTokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/v1/attenuate:
    post:
      tags: [capabilities]
      summary: Attenuate (narrow) an existing capability token
      description: |
        Produces a new token whose capabilities are a strict subset of the
        parent token supplied in the `Authorization` header.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttenuateCapabilityRequest'
      responses:
        '200':
          description: Attenuated token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilityTokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/v1/renew:
    post:
      tags: [capabilities]
      summary: Renew an existing capability token
      description: |
        Issues a fresh token with the same capabilities and a new expiry.
        The current (still valid) token must be supplied in the
        `Authorization` header.
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ttl:
                  type: integer
                  description: Lifetime of the new token in seconds.
                  minimum: 1
                  example: 900
      responses:
        '200':
          description: Renewed token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilityTokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/v1/public-key:
    get:
      tags: [discovery]
      summary: Get the issuer's public key
      description: |
        Returns the issuer's signing public key in PEM (SPKI) format so
        downstream services can verify capability token signatures.
      responses:
        '200':
          description: Public key retrieved
          content:
            application/json:
              schema:
                type: object
                required: [publicKey]
                properties:
                  publicKey:
                    type: string
                    description: PEM-encoded public key.

  /.well-known/did.json:
    get:
      tags: [discovery]
      summary: Get the issuer's DID document
      description: |
        Returns a simplified W3C DID document that publishes the issuer's
        public key so other parties can resolve `did:web:<host>` to it.
      responses:
        '200':
          description: DID document
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                properties:
                  '@context':
                    type: array
                    items: { type: string }
                  id:
                    type: string
                    example: did:web:issuer.example.com
                  verificationMethod:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        type: { type: string }
                        controller: { type: string }
                        publicKeyPem: { type: string }
                  authentication:
                    type: array
                    items: { type: string }
                  assertionMethod:
                    type: array
                    items: { type: string }

  /.well-known/capability-issuer:
    get:
      tags: [discovery]
      summary: Capability-issuer service discovery document
      description: |
        Returns a self-describing service-discovery document that lets
        relying parties (gateways, CLIs, partner organisations) learn
        the issuer's DID, the capability-token schema version it
        currently mints, the schema versions it accepts on attenuate /
        renew, the JWS signing algorithms it supports, and the URLs of
        its other discovery endpoints.

        This endpoint is unauthenticated and intentionally inexpensive
        so it can be polled by long-running clients.
      responses:
        '200':
          description: Issuer discovery document
          content:
            application/json:
              schema:
                type: object
                required: [issuer, schemaVersions, signingAlgorithms, endpoints]
                properties:
                  issuer:
                    type: string
                    description: The issuer's DID (matches the `iss` claim of issued tokens).
                    example: did:web:issuer.example.com
                  schemaVersions:
                    type: object
                    required: [current, supported]
                    properties:
                      current:
                        type: string
                        description: Schema version this issuer mints today.
                        example: "1.0"
                      supported:
                        type: array
                        description: All schema versions this issuer accepts on attenuate / renew.
                        items: { type: string }
                        example: ["1.0"]
                  signingAlgorithms:
                    type: array
                    description: JWS `alg` values this issuer can sign with.
                    items: { type: string }
                    example: ["RS256", "ES256"]
                  endpoints:
                    type: object
                    properties:
                      publicKey:
                        type: string
                        example: /api/v1/public-key
                      didDocument:
                        type: string
                        example: /.well-known/did.json
                  region:
                    type: string
                    description: |
                      Optional logical region tag for this issuer
                      instance (F-7, multi-region active/active). When
                      present, capability tokens minted by this
                      instance carry the same value in the `region`
                      claim. Omitted entirely on single-region
                      deployments. See `docs/MULTI_REGION_ISSUER.md`.
                    example: eastus2

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthResponse:
      type: object
      required: [status, service]
      properties:
        status: { type: string, example: healthy }
        service: { type: string, example: capability-issuer }

    Capability:
      type: object
      required: [resource, actions]
      properties:
        resource:
          type: string
          description: Canonical resource URI the capability applies to.
          example: api://service/data
        actions:
          type: array
          minItems: 1
          items:
            type: string
            enum: [read, write, delete, execute]
        conditions:
          type: object
          description: Optional caveats that further constrain the capability.
          additionalProperties: true

    AgentCapabilityManifest:
      type: object
      description: |
        Optional declarative manifest of the capabilities an agent declares
        it needs.  When supplied the issuer cross-checks the requested set
        against it.
      properties:
        agentId: { type: string }
        name: { type: string }
        version: { type: string }
        requiredCapabilities:
          type: array
          items: { $ref: '#/components/schemas/Capability' }
        optionalCapabilities:
          type: array
          items: { $ref: '#/components/schemas/Capability' }
        metadata:
          type: object
          additionalProperties: true

    IssueCapabilityRequest:
      type: object
      required: [agentId, requestedCapabilities]
      properties:
        agentId:
          type: string
          description: Identifier of the agent requesting the capability.
        requestedCapabilities:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/Capability' }
        manifest:
          $ref: '#/components/schemas/AgentCapabilityManifest'

    AttenuateCapabilityRequest:
      type: object
      required: [requestedCapabilities]
      properties:
        requestedCapabilities:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/Capability' }

    CapabilityTokenResponse:
      type: object
      required: [token, tokenId, expiresAt, capabilities]
      properties:
        token:
          type: string
          description: Signed JWT capability token (RS256 / ES256 / EdDSA).
        tokenId:
          type: string
          description: JWT ID (jti) – use this when revoking.
        expiresAt:
          type: integer
          description: Token expiry as a Unix timestamp (seconds).
        capabilities:
          type: array
          items: { $ref: '#/components/schemas/Capability' }

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: AUTHENTICATION_FAILED
            message:
              type: string

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Caller is authenticated but not authorised for the action
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    TooManyRequests:
      description: |
        The per-(tenant, user, agent) issuance rate limit was exceeded
        (F-1, error code `RATE_LIMIT_EXCEEDED`). The shared bucket
        covers `/api/v1/issue`, `/api/v1/attenuate`, and `/api/v1/renew`
        so a compromised account cannot evade the limit by switching
        mint paths. Clients SHOULD honour the `Retry-After` header
        (RFC 9110 §10.2.3) before retrying.
      headers:
        Retry-After:
          description: Number of seconds the client should wait before retrying.
          schema:
            type: integer
            minimum: 0
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
